        </select>
        <select value={filterCity} onChange={e=>{setFilterCity(e.target.value);setPage(0);}} className="field" style={{maxWidth:'150px', padding:'8px 12px', fontSize:'12px'}}>
          <option value="all">All Cities</option>
          {uniqueCities.map(c => <option key={c} value={c}>{c}</option>)}
        </select>
        <select value={filterPriority} onChange={e=>{setFilterPriority(e.target.value);setPage(0);}} className="field" style={{maxWidth:'120px', padding:'8px 12px', fontSize:'12px'}}>
          <option value="all">All Priority</option>
          <option value="HOT">HOT</option>
          <option value="HIGH">HIGH</option>
          <option value="MEDIUM">MEDIUM</option>
        </select>
        <select value={filterStatus} onChange={e=>{setFilterStatus(e.target.value);setPage(0);}} className="field" style={{maxWidth:'130px', padding:'8px 12px', fontSize:'12px'}}>

          {Object.entries(statusLabels).map(([k,v]) => <option key={k} value={k}>{v}</option>)}
        </select>
        <span style={{marginLeft:'auto', fontSize:'12px', color:'#555', fontFamily:'monospace'}}>{filtered.length} results</span>
      </div>

      {/* Filters Row 2 — Source + Batch + Range */}
      <div style={{display:'flex', gap:'8px', marginBottom:'14px', flexWrap:'wrap', alignItems:'center'}}>
        <select value={filterSource} onChange={e=>{setFilterSource(e.target.value);setPage(0);}} className="field" style={{maxWidth:'160px', padding:'8px 12px', fontSize:'12px'}}>
          <option value="all">All Sources</option>
          {uniqueSourceTags.map(t => <option key={t} value={t}>{t}</option>)}
        </select>
        <select value={filterBatch} onChange={e=>{setFilterBatch(e.target.value);setPage(0);}} className="field" style={{maxWidth:'200px', padding:'8px 12px', fontSize:'12px'}}>
          <option value="all">All Batches</option>
          {batches.map(b => <option key={b.id} value={b.id}>{b.label}</option>)}
        </select>
        <div style={{width:'1px', height:'20px', background:'#222', margin:'0 2px'}}/>
        <div style={{display:'flex', alignItems:'center', gap:'4px'}}>
          <input value={rangeInput} onChange={e=>setRangeInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')selectRange();}}

        </div>
        <button onClick={selectPage} style={{padding:'8px 14px', borderRadius:'6px', border:'1px solid #222', background:'transparent', color:'#555', fontSize:'11px', fontWeight:700, cursor:'pointer', whiteSpace:'nowrap'}}>Select Page</button>
        <button onClick={selectAllFiltered} style={{padding:'8px 14px', borderRadius:'6px', border:'1px solid #222', background:'transparent', color:'#555', fontSize:'11px', fontWeight:700, cursor:'pointer', whiteSpace:'nowrap'}}>Select All {filtered.length}</button>
      </div>

      {/* Lead Table */}
      <div style={{overflowX:'auto', border:'1px solid #333', borderRadius:'6px', maxHeight:'60vh', overflowY:'auto', background:'#0e0e0e'}}>
        <table style={{width:'100%', borderCollapse:'collapse', fontSize:'12px', minWidth:'900px'}}>
          <thead>
            <tr>
              <th style={{...thStyle, textAlign:'center', width:'32px'}}><input type="checkbox" className="assign-checkbox" onChange={()=>{if(selected.size===paged.length && paged.length>0){const ns=new Set(selected);paged.forEach(l=>ns.delete(l.id));setSelected(ns);}else selectPage();}} checked={paged.length>0 && paged.every(l=>selected.has(l.id))}/></th>
              <th style={{...thStyle, textAlign:'center', width:'40px'}}>#</th>
              <th style={thStyle}>Business</th>
              <th style={thStyle}>Niche</th>
              <th style={thStyle}>City</th>
              <th style={thStyle}>Phone</th>
              <th style={{...thStyle, textAlign:'center'}}>Reviews</th>
              <th style={{...thStyle, textAlign:'center'}}>Priority</th>
              <th style={{...thStyle, textAlign:'center'}}>Status</th>
              <th style={thStyle}>Assigned</th>
            </tr>
          </thead>
          <tbody>
            {paged.map((lead, idx) => {
              const globalIdx = page * PAGE_SIZE + idx + 1;
              const isEven = idx % 2 === 0;
              const isSelected = selected.has(lead.id);
              return (
                <tr key={lead.id} style={{background: isSelected ? 'rgba(0,240,255,.06)' : isEven ? '#0e0e0e' : '#131313', transition:'background .1s', cursor:'pointer'}}
                  onClick={()=>toggleSelect(lead.id)}
                  onMouseEnter={e=>{if(!isSelected)e.currentTarget.style.background='#1a1a1a';}}
                  onMouseLeave={e=>{if(!isSelected)e.currentTarget.style.background=isEven?'#0e0e0e':'#131313';}}>
                  <td style={{...tdStyle, textAlign:'center'}} onClick={e=>e.stopPropagation()}><input type="checkbox" className="assign-checkbox" checked={isSelected} onChange={()=>toggleSelect(lead.id)}/></td>
                  <td style={rowNumStyle}>{globalIdx}</td>
                  <td style={{...tdStyle, color:'#fff', fontWeight:600, maxWidth:'220px', overflow:'hidden', textOverflow:'ellipsis'}}>{lead.business_name}</td>
                  <td style={tdStyle}><span className="niche-badge">{lead.niche}</span></td>
                  <td style={{...tdStyle, color:'#ccc'}}>{lead.city || '—'}</td>
                  <td style={{...tdStyle, fontFamily:'monospace', fontSize:'11px'}}>{lead.phone ? <a href={`tel:${lead.phone}`} onClick={e=>e.stopPropagation()} style={{color:'#00F0FF', textDecoration:'none'}}>{lead.phone}</a> : <span style={{color:'#333'}}>—</span>}</td>
                  <td style={{...tdStyle, textAlign:'center', fontFamily:'monospace', fontWeight:600}}>{lead.google_reviews ?? '—'}</td>
                  <td style={{...tdStyle, textAlign:'center'}}><span className={`priority-${lead.priority?.toLowerCase()}`}>{lead.priority}</span></td>
                  <td style={{...tdStyle, textAlign:'center'}}><span style={{fontSize:'10px', padding:'2px 8px', borderRadius:'4px', fontWeight:700, background:'rgba(0,240,255,.08)', color:'#00F0FF'}}>{statusLabels[lead.status]||lead.status}</span></td>
                  <td style={{...tdStyle, color: lead.reps?.name ? '#00F0FF' : '#333', fontWeight:600, fontSize:'11px'}}>{lead.reps?.name || 'Unassigned'}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {/* Pagination */}
      {totalPages > 1 && (
        <div style={{display:'flex', alignItems:'center', justifyContent:'center', gap:'8px', marginTop:'14px'}}>
          <button onClick={()=>setPage(0)} disabled={page===0} style={{padding:'6px 10px', borderRadius:'5px', border:'1px solid #1e1e1e', background:'transparent', color: page===0?'#333':'#888', fontSize:'11px', fontWeight:700, cursor: page===0?'not-allowed':'pointer'}}>First</button>
          <button onClick={()=>setPage(p=>Math.max(0,p-1))} disabled={page===0} style={{padding:'6px 14px', borderRadius:'5px', border:'1px solid #1e1e1e', background:'transparent', color: page===0?'#333':'#888', fontSize:'11px', fontWeight:700, cursor: page===0?'not-allowed':'pointer'}}>Prev</button>
          <span style={{fontSize:'12px', color:'#555', fontFamily:'monospace'}}>Page {page+1} of {totalPages} · rows {page*PAGE_SIZE+1}-{Math.min((page+1)*PAGE_SIZE, filtered.length)}</span>
          <button onClick={()=>setPage(p=>Math.min(totalPages-1,p+1))} disabled={page>=totalPages-1} style={{padding:'6px 14px', borderRadius:'5px', border:'1px solid #1e1e1e', background:'transparent', color: page>=totalPages-1?'#333':'#888', fontSize:'11px', fontWeight:700, cursor: page>=totalPages-1?'not-allowed':'pointer'}}>Next</button>
          <button onClick={()=>setPage(totalPages-1)} disabled={page>=totalPages-1} style={{padding:'6px 10px', borderRadius:'5px', border:'1px solid #1e1e1e', background:'transparent', color: page>=totalPages-1?'#333':'#888', fontSize:'11px', fontWeight:700, cursor: page>=totalPages-1?'not-allowed':'pointer'}}>Last</button>
        </div>
      )}
    </div>
  );
};

/* ══════════════════════════════════════════════════════
   VIEW: DIRECTOR DASHBOARD
══════════════════════════════════════════════════════ */
const PipelineFunnelView = ({ leads, reps }) => {
  const [filterRep, setFilterRep] = useState('all');

  const filtered = filterRep === 'all' ? leads : leads.filter(l => l.assigned_rep_id === filterRep);
  const total = filtered.length;

  const stages = [
    { key: 'new', label: 'New Leads', color: '#00F0FF', statuses: ['new'] },
    { key: 'contacted', label: 'Contacted', color: '#F59E0B', statuses: ['contacted', 'voicemail'] },
    { key: 'callback', label: 'Callback', color: '#F59E0B', statuses: ['callback'] },
    { key: 'booked', label: 'Booked', color: '#22c55e', statuses: ['booked'] },
    { key: 'discovery', label: 'Discovery Done', color: '#00F0FF', statuses: ['discovery_completed'] },
    { key: 'noshow', label: 'No Show', color: '#ff8800', statuses: ['no_show'] },
  ];
  const dropoffs = [
    { key: 'not_interested', label: 'Not Interested', color: '#ff6060', statuses: ['not_interested'] },
    { key: 'wrong_number', label: 'Wrong Number', color: '#ff6060', statuses: ['wrong_number'] },
  ];

  const counts = {};
  stages.concat(dropoffs).forEach(s => {
    counts[s.key] = filtered.filter(l => s.statuses.includes(l.status)).length;
  });

  const maxCount = Math.max(...stages.map(s => counts[s.key]), 1);

  return (
    <div className="fadein">
      {/* Rep Filter */}
      <div style={{display:'flex', alignItems:'center', gap:'12px', marginBottom:'20px'}}>
        <label style={{fontSize:'11px', fontWeight:700, color:'#444', letterSpacing:'.1em', textTransform:'uppercase'}}>Filter by Rep</label>
        <select value={filterRep} onChange={e => setFilterRep(e.target.value)}
          style={{padding:'6px 12px', borderRadius:'6px', background:'#0a0a0a', border:'1px solid #1e1e1e', color:'#ccc', fontSize:'12px', fontFamily:'Inter,sans-serif'}}>
          <option value="all">All Reps</option>
          {reps.map(r => <option key={r.id} value={r.id}>{r.name}</option>)}
        </select>
        <span style={{marginLeft:'auto', fontSize:'12px', color:'#555', fontFamily:'monospace'}}>{total} total leads</span>
      </div>

      {/* Funnel */}
      <div style={{display:'flex', flexDirection:'column', gap:'0', marginBottom:'24px'}}>
        {stages.map((stage, i) => {
          const count = counts[stage.key];
          const pct = total > 0 ? ((count / total) * 100).toFixed(1) : '0.0';
          const barWidth = maxCount > 0 ? Math.max((count / maxCount) * 100, 8) : 8;
          const prevCount = i > 0 ? counts[stages[i-1].key] : total;
          const convRate = prevCount > 0 && i > 0 ? ((count / prevCount) * 100).toFixed(0) : null;

          return (
            <div key={stage.key}>
              <div style={{display:'flex', alignItems:'center', gap:'16px', padding:'12px 0'}}>
                <div style={{width:'130px', flexShrink:0, textAlign:'right'}}>
                  <p style={{margin:0, fontSize:'12px', fontWeight:700, color: stage.color}}>{stage.label}</p>
                  {convRate !== null && (
                    <p style={{margin:'2px 0 0', fontSize:'9px', color:'#444', fontFamily:'monospace'}}>{convRate}% from prev</p>
                  )}
                </div>
                <div style={{flex:1, position:'relative'}}>
                  <div style={{height:'36px', background:'#111', borderRadius:'6px', overflow:'hidden', position:'relative'}}>
                    <div style={{
                      height:'100%', borderRadius:'6px',
                      background: `linear-gradient(90deg, ${stage.color}22, ${stage.color}44)`,
                      border: `1px solid ${stage.color}55`,
                      width: `${barWidth}%`,
                      transition: 'width .7s ease',
                      display:'flex', alignItems:'center', justifyContent:'flex-end', paddingRight:'12px',
                      minWidth:'60px',
                    }}>
                      <span style={{fontSize:'14px', fontWeight:800, color: stage.color, fontFamily:'monospace'}}>{count}</span>
                    </div>
                  </div>
                </div>
                <div style={{width:'60px', flexShrink:0, textAlign:'right'}}>
                  <span style={{fontSize:'11px', color:'#555', fontFamily:'monospace'}}>{pct}%</span>
                </div>
              </div>
              {i < stages.length - 1 && (
                <div style={{display:'flex', justifyContent:'center', paddingLeft:'130px'}}>
                  <div style={{width:'2px', height:'12px', background:'#1a1a1a'}}/>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Drop-offs */}
      <div className="card" style={{padding:'16px 20px', borderColor:'#1a1a1a'}}>
        <p style={{fontSize:'10px', fontWeight:700, letterSpacing:'.15em', textTransform:'uppercase', color:'#ff6060', margin:'0 0 12px'}}>Drop-offs</p>
        <div style={{display:'flex', gap:'20px'}}>
          {dropoffs.map(d => (
            <div key={d.key} style={{display:'flex', alignItems:'center', gap:'8px'}}>
              <span style={{fontSize:'18px', fontWeight:800, color: d.color, fontFamily:'monospace'}}>{counts[d.key]}</span>
              <span style={{fontSize:'11px', color:'#555'}}>{d.label}</span>
            </div>
          ))}
        </div>
      </div>

      {/* Conversion Summary */}
      <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(160px, 1fr))', gap:'10px', marginTop:'16px'}}>
        {(() => {
          const contacted = counts.contacted + counts.callback;
          const booked = counts.booked;
          const discovery = counts.discovery;
          const contactRate = total > 0 ? ((contacted / total) * 100).toFixed(0) : 0;
          const bookRate = contacted > 0 ? ((booked / contacted) * 100).toFixed(0) : 0;
          const showRate = (booked + counts.noshow) > 0 ? ((discovery / (booked + counts.noshow + discovery)) * 100).toFixed(0) : 0;
          return [
            { label: 'Contact Rate', value: `${contactRate}%`, sub: `${contacted} of ${total} leads`, color: '#F59E0B' },
            { label: 'Book Rate', value: `${bookRate}%`, sub: `${booked} of ${contacted} contacted`, color: '#22c55e' },
            { label: 'Show Rate', value: `${showRate}%`, sub: `${discovery} of ${discovery + counts.noshow} scheduled`, color: '#00F0FF' },
          ];
        })().map(m => (
          <div key={m.label} className="card-glow" style={{padding:'14px 16px'}}>
            <p style={{fontSize:'9px', fontWeight:700, letterSpacing:'.15em', textTransform:'uppercase', color: m.color, margin:'0 0 6px'}}>{m.label}</p>
            <p style={{fontSize:'24px', fontWeight:900, color:'#fff', margin:0, fontFamily:'monospace'}}>{m.value}</p>
            <p style={{fontSize:'10px', color:'#444', margin:'4px 0 0'}}>{m.sub}</p>
          </div>
        ))}
      </div>

      {/* Lead Source Attribution */}
      <div className="card" style={{padding:'16px 20px', borderColor:'#1a1a1a', marginTop:'16px'}}>
        <p style={{fontSize:'10px', fontWeight:700, letterSpacing:'.15em', textTransform:'uppercase', color:'#a855f7', margin:'0 0 14px'}}>Lead Sources</p>
        <div style={{display:'flex', flexDirection:'column', gap:'8px'}}>
          {(() => {
            const sourceMap = {};
            filtered.forEach(l => { const s = l.source || 'unknown'; sourceMap[s] = (sourceMap[s] || 0) + 1; });
            const sourceLabels = { warm_import:'Warm Import', cold_import:'Cold Import', csv_import:'CSV Import', website:'Website', manual:'Manual Entry', cold_call:'Cold Call', dm:'DM Outreach', referral:'Referral', unknown:'Unknown' };
            const sourceColors = { warm_import:'#F59E0B', cold_import:'#00F0FF', csv_import:'#00F0FF', website:'#22c55e', manual:'#888', cold_call:'#a855f7', dm:'#ec4899', referral:'#22c55e', unknown:'#444' };
            const sorted = Object.entries(sourceMap).sort((a,b) => b[1] - a[1]);
            const maxSrc = sorted.length > 0 ? sorted[0][1] : 1;
            return sorted.map(([src, count]) => (
              <div key={src} style={{display:'flex', alignItems:'center', gap:'12px'}}>
                <span style={{width:'100px', flexShrink:0, fontSize:'11px', fontWeight:600, color: sourceColors[src] || '#888', textAlign:'right'}}>{sourceLabels[src] || src}</span>
                <div style={{flex:1, height:'20px', background:'#111', borderRadius:'4px', overflow:'hidden'}}>
                  <div style={{height:'100%', borderRadius:'4px', background: `${sourceColors[src] || '#888'}33`, border: `1px solid ${sourceColors[src] || '#888'}44`, width: `${Math.max((count / maxSrc) * 100, 8)}%`, display:'flex', alignItems:'center', justifyContent:'flex-end', paddingRight:'8px', minWidth:'40px'}}>
                    <span style={{fontSize:'11px', fontWeight:800, color: sourceColors[src] || '#888', fontFamily:'monospace'}}>{count}</span>
                  </div>
                </div>
                <span style={{width:'40px', fontSize:'10px', color:'#444', fontFamily:'monospace', textAlign:'right'}}>{total > 0 ? ((count / total) * 100).toFixed(0) : 0}%</span>
              </div>
            ));
          })()}
        </div>
      </div>

      {/* Niche Breakdown */}
      <div className="card" style={{padding:'16px 20px', borderColor:'#1a1a1a', marginTop:'12px'}}>
        <p style={{fontSize:'10px', fontWeight:700, letterSpacing:'.15em', textTransform:'uppercase', color:'#00F0FF', margin:'0 0 14px'}}>By Niche</p>
        <div style={{display:'flex', flexWrap:'wrap', gap:'8px'}}>
          {(() => {
            const nicheMap = {};
            filtered.forEach(l => { const n = l.niche || 'Unknown'; nicheMap[n] = (nicheMap[n] || 0) + 1; });
            return Object.entries(nicheMap).sort((a,b) => b[1] - a[1]).map(([niche, count]) => (
              <div key={niche} style={{padding:'8px 14px', borderRadius:'8px', background:'#0a0a0a', border:'1px solid #1e1e1e', display:'flex', alignItems:'center', gap:'8px'}}>
                <span style={{fontSize:'11px', fontWeight:600, color:'#888'}}>{niche}</span>
                <span style={{fontSize:'14px', fontWeight:800, color:'#fff', fontFamily:'monospace'}}>{count}</span>
              </div>
            ));
          })()}
        </div>
      </div>
    </div>
  );
};

          <p style={{fontSize:'9px', fontWeight:700, letterSpacing:'.15em', textTransform:'uppercase', color:'#F59E0B', margin:'0 0 6px'}}>Today</p>
          <p style={{fontSize:'26px', fontWeight:900, color:'#F59E0B', margin:0, fontFamily:'monospace'}}>{todayCalls}</p>
        </div>
        <div className="card-glow" style={{padding:'16px 18px'}}>
          <p style={{fontSize:'9px', fontWeight:700, letterSpacing:'.15em', textTransform:'uppercase', color:'#22c55e', margin:'0 0 6px'}}>Interested</p>
          <p style={{fontSize:'26px', fontWeight:900, color:'#22c55e', margin:0, fontFamily:'monospace'}}>{interestedCalls}</p>
        </div>
        <div className="card-glow" style={{padding:'16px 18px'}}>
          <p style={{fontSize:'9px', fontWeight:700, letterSpacing:'.15em', textTransform:'uppercase', color:'#00F0FF', margin:'0 0 6px'}}>Calls Booked</p>

      <button onClick={() => setShowForm(!showForm)} style={{

          <h3 style={{fontSize:'14px', fontWeight:800, color:'#fff', margin:'0 0 16px'}}>Log Call</h3>

const DirectorView = ({ userName, userEmail, onHome, onLogout, totalCloses, totalPoints, addClose, undoClose, repId }) => {
  const [reps, setReps] = useState([]);
  const [handoffs, setHandoffs] = useState([]);
  const [allLeads, setAllLeads] = useState([]);
  const [callLogs, setCallLogs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState('pipeline');
  const [selectedRepId, setSelectedRepId] = useState('all');

  useEffect(() => { loadData(); }, []);

  const loadData = async () => {
    const { data: repsData } = await sb.from('reps').select('*').order('created_at', { ascending: true });
    const { data: closesData } = await sb.from('closes').select('*').order('created_at', { ascending: false });
    const { data: handoffsData } = await sb.from('handoffs').select('*, reps(name)').order('created_at', { ascending: false }).limit(30);
    let leadsData = [], lf = 0;
    while (true) {
      const { data: ld } = await sb.from('leads').select('id, status, assigned_rep_id, niche, source, created_at').order('created_at', { ascending: false }).range(lf, lf + 999);
      if (!ld || ld.length === 0) break;
      leadsData = leadsData.concat(ld);
      if (ld.length < 1000) break;
      lf += 1000;
    }
    const { data: callLogsData } = await sb.from('call_logs').select('*, reps(name)').order('created_at', { ascending: false }).limit(50);
    setAllLeads(leadsData);
    setCallLogs(callLogsData || []);
    const closesMap = {};
    (closesData || []).forEach(c => { if (!closesMap[c.rep_id]) closesMap[c.rep_id] = []; closesMap[c.rep_id].push(c); });
    const enriched = (repsData || []).filter(r => r.role !== 'director').map(rep => {
      const rc = closesMap[rep.id] || [];
      const pts = rc.reduce((s, c) => s + c.pts, 0);
      return { ...rep, totalCloses: rc.length, totalPoints: pts, tier: getTierInfo(pts), lastClose: rc.length > 0 ? rc[0].created_at : null, closesDetail: rc };
    });
    setReps(enriched);
    setHandoffs(handoffsData || []);
    setLoading(false);
  };

  const fmtAgo = (d) => {
    if (!d) return '—';
    const ms = Date.now() - new Date(d).getTime();
    if (ms < 3600000) return Math.floor(ms / 60000) + 'm ago';
    if (ms < 86400000) return Math.floor(ms / 3600000) + 'h ago';
    if (ms < 604800000) return Math.floor(ms / 86400000) + 'd ago';
    return new Date(d).toLocaleDateString();
  };

  // Filtered data based on selectedRepId
  const filteredCallLogs = selectedRepId === 'all' ? callLogs : callLogs.filter(cl => cl.rep_id === selectedRepId);
  const filteredLeads = selectedRepId === 'all' ? allLeads : allLeads.filter(l => l.assigned_rep_id === selectedRepId);
  const filteredHandoffs = selectedRepId === 'all' ? handoffs : handoffs.filter(h => h.rep_id === selectedRepId);

  // Filtered stats
  const today = new Date().toISOString().split('T')[0];
  const filteredTotalCalls = filteredCallLogs.length;
  const filteredCallsToday = filteredCallLogs.filter(cl => cl.created_at && cl.created_at.startsWith(today)).length;
  const filteredConnects = filteredCallLogs.filter(cl => cl.outcome && cl.outcome !== 'no_answer' && cl.outcome !== 'wrong_number').length;
  const filteredConnectRate = filteredTotalCalls > 0 ? Math.round((filteredConnects / filteredTotalCalls) * 100) : 0;
  const filteredBookings = filteredCallLogs.filter(cl => cl.outcome === 'booked_call' || cl.outcome === 'booked' || cl.outcome === 'discovery_completed').length;
  const filteredBookingRate = filteredTotalCalls > 0 ? Math.round((filteredBookings / filteredTotalCalls) * 100) : 0;

  const teamCloses = reps.reduce((s, r) => s + r.totalCloses, 0);
  const teamPoints = reps.reduce((s, r) => s + r.totalPoints, 0);
  const teamRevenue = reps.reduce((s, r) => {
    return s + (r.closesDetail || []).reduce((rs, c) => {
      if (c.pts === 1) return rs + 1000;
      if (c.pts === 2) return rs + 1599;
      if (c.pts === 3) return rs + 2999;
      if (c.pts === 4) return rs + 5999;
      return rs;
    }, 0);
  }, 0);

  return (
    <div style={{display:'flex', flexDirection:'column', height:'100vh', background:'#000'}}>
      <TopBar title="Director Dashboard" subtitle="Team Performance Overview"
        userName={userName} userEmail={userEmail} onHome={onHome} onLogout={onLogout}
        totalCloses={totalCloses} totalPoints={totalPoints} addClose={addClose} undoClose={undoClose}/>
      <main className="section-main" style={{flex:1, overflowY:'auto', padding:'28px 32px', maxWidth:'1100px', width:'100%', margin:'0 auto'}}>
        <div style={{marginBottom:'6px'}}><span className="tag">Director</span></div>
        <h2 style={{fontSize:'26px', fontWeight:900, color:'#fff', margin:'8px 0 4px'}}>Team Command Center</h2>
        <Body>Real-time performance across all reps. Data syncs from Supabase.</Body>
        <div className="divider" style={{margin:'16px 0'}}/>

        {loading ? (
          <div style={{display:'flex', alignItems:'center', justifyContent:'center', padding:'60px 0'}}>
            <svg style={{animation:'spin 1s linear infinite'}} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#00F0FF" strokeWidth="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
          </div>
        ) : (
          <>
            {/* Summary Cards */}
            <div className="dir-summary-grid" style={{display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(180px, 1fr))', gap:'12px', marginBottom:'24px'}}>
              <div className="card-glow" style={{padding:'18px 20px'}}>
                <p style={{fontSize:'10px', fontWeight:700, letterSpacing:'.15em', textTransform:'uppercase', color:'#00F0FF', margin:'0 0 8px'}}>Active Reps</p>
                <p style={{fontSize:'28px', fontWeight:900, color:'#fff', margin:0, fontFamily:'monospace'}}>{reps.length}</p>
              </div>
              <div className="card-glow" style={{padding:'18px 20px'}}>
                <p style={{fontSize:'10px', fontWeight:700, letterSpacing:'.15em', textTransform:'uppercase', color:'#00F0FF', margin:'0 0 8px'}}>Team Closes</p>
                <p style={{fontSize:'28px', fontWeight:900, color:'#fff', margin:0, fontFamily:'monospace'}}>{teamCloses}</p>
              </div>
              <div className="card-glow" style={{padding:'18px 20px'}}>
                <p style={{fontSize:'10px', fontWeight:700, letterSpacing:'.15em', textTransform:'uppercase', color:'#00F0FF', margin:'0 0 8px'}}>Team Points</p>
                <p style={{fontSize:'28px', fontWeight:900, color:'#fff', margin:0, fontFamily:'monospace'}}>{teamPoints}</p>
              </div>
              <div className="card-glow" style={{padding:'18px 20px'}}>
                <p style={{fontSize:'10px', fontWeight:700, letterSpacing:'.15em', textTransform:'uppercase', color:'#22c55e', margin:'0 0 8px'}}>Revenue Generated</p>
                <p style={{fontSize:'28px', fontWeight:900, color:'#22c55e', margin:0, fontFamily:'monospace'}}>${teamRevenue.toLocaleString()}</p>
              </div>
            </div>

            {/* Tab Switcher */}
            <div style={{display:'flex', gap:'6px', marginBottom:'20px'}}>
              {[['pipeline','Pipeline'],['outreach','Outreach Tracker'],['calllog','Call Log'],['activity','Activity Feed'],['reps','Rep Roster'],['handoffs','Recent Handoffs'],['allleads','All Leads'],['assignments','Lead Assignment'],['import','Lead Import']].map(([key, label]) => (

                onMouseEnter={e => { e.currentTarget.style.borderColor='rgba(0,240,255,.3)'; e.currentTarget.style.color='#00F0FF'; }}
                onMouseLeave={e => { e.currentTarget.style.borderColor='#1e1e1e'; e.currentTarget.style.color='#444'; }}>

              </button>

                      <div className="dir-rep-stats" style={{display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:'10px', marginBottom:'12px'}}>

                            padding:'4px 8px', borderRadius:'5px', fontSize:'10px', fontWeight:700, fontFamily:'Inter,sans-serif',
                            background: `${fsColors[fs]}12`, border: `1px solid ${fsColors[fs]}44`, color: fsColors[fs],
                            cursor:'pointer', outline:'none', appearance:'none', WebkitAppearance:'none',

                            {Object.entries(fsLabels).map(([k,v]) => <option key={k} value={k} style={{background:'#111', color:'#ccc'}}>{v}</option>)}

                          <p style={{margin:'2px 0 0', fontSize:'12px', color:'#888'}}>{h.reps?.name || '—'}</p>

                          <p style={{margin:'2px 0 0', fontSize:'12px', color:'#888'}}>{h.pain_point}</p>
                        </div>
                        <div>
                          <span style={{fontSize:'9px', fontWeight:700, color:'#444', letterSpacing:'.12em', textTransform:'uppercase'}}>Next Step</span>
                          <p style={{margin:'2px 0 0', fontSize:'12px', color: h.next_step === 'Closed — Won' ? '#22c55e' : '#00F0FF', fontWeight:600}}>{h.next_step}</p>

                      </div>
                      {h.notes && <p style={{margin:'8px 0 0', fontSize:'11px', color:'#333', fontStyle:'italic'}}>"{h.notes}"</p>}
                    </div>
                  );
                })}
              </div>
            )}

            {/* All Leads — Spreadsheet View */}

              <AllLeadsTable reps={[...reps, { id: repId, name: userName, role: 'director' }]}/>

            )}

            {tab === 'pipeline' && (
              <PipelineFunnelView leads={filteredLeads} reps={[...reps, { id: repId, name: userName, role: 'director' }]}/>

              <div className="fadein">
                <p style={{fontSize:'10px', fontWeight:700, letterSpacing:'.15em', textTransform:'uppercase', color:'#00F0FF', margin:'0 0 16px'}}>Recent Activity</p>
                {(() => {
                  // Merge call logs, handoffs, and recent leads into a single timeline
                  const events = [];
                  filteredCallLogs.forEach(cl => {
                    const outcomeLabels = { no_answer:'No Answer', voicemail_left:'Voicemail', callback_requested:'Callback', not_interested:'Not Interested', booked_call:'Booked Call', discovery_completed:'Discovery Done', no_show:'No Show', wrong_number:'Wrong Number' };
                    const outcomeColors = { no_answer:'#555', voicemail_left:'#888', callback_requested:'#F59E0B', not_interested:'#ff6060', booked_call:'#22c55e', discovery_completed:'#00F0FF', no_show:'#ff8800', wrong_number:'#ff6060' };
                    events.push({
                      type: 'call',
                      time: cl.created_at,
                      icon: '☎',
                      color: outcomeColors[cl.outcome] || '#555',
                      title: `${cl.reps?.name || 'Rep'} called ${cl.business_name || 'Unknown'}`,
                      detail: outcomeLabels[cl.outcome] || cl.outcome || '',
                      sub: cl.notes || '',
                    });
                  });
                  filteredHandoffs.forEach(h => {
                    events.push({
                      type: 'handoff',
                      time: h.created_at,
                      icon: '→',
                      color: '#a855f7',
                      title: `${h.reps?.name || 'Rep'} handed off ${h.company}`,
                      detail: h.next_step,
                      sub: h.pain_point || '',
                    });
                  });
                  // Sort by time descending
                  events.sort((a, b) => new Date(b.time).getTime() - new Date(a.time).getTime());
                  if (events.length === 0) {
                    return (
                      <div className="card" style={{padding:'32px', textAlign:'center'}}>
                        <p style={{color:'#444', fontSize:'14px', margin:0}}>No activity yet. Call logs and handoffs will appear here.</p>
                      </div>
                    );
                  }
                  return events.slice(0, 40).map((ev, i) => {
                    const time = new Date(ev.time);
                    const timeStr = time.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
                    const dateStr = time.toLocaleDateString('en-CA', { month:'short', day:'numeric' });
                    return (
                      <div key={i} style={{display:'flex', gap:'12px', padding:'10px 0', borderBottom:'1px solid #111'}}>
                        <div style={{width:'32px', height:'32px', borderRadius:'50%', background:`${ev.color}12`, border:`1px solid ${ev.color}33`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:'13px', flexShrink:0, color: ev.color}}>

                        <div style={{flex:1, minWidth:0}}>
                          <div style={{display:'flex', alignItems:'center', gap:'8px', marginBottom:'2px'}}>
                            <span style={{fontSize:'12px', fontWeight:700, color:'#fff'}}>{ev.title}</span>
                            <span style={{fontSize:'9px', fontWeight:700, padding:'2px 6px', borderRadius:'3px', background:`${ev.color}12`, border:`1px solid ${ev.color}33`, color: ev.color}}>{ev.detail}</span>
                          </div>
                          {ev.sub && <p style={{margin:0, fontSize:'11px', color:'#444', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{ev.sub}</p>}
                        </div>
                        <div style={{flexShrink:0, textAlign:'right'}}>
                          <p style={{margin:0, fontSize:'10px', color:'#555', fontFamily:'monospace'}}>{timeStr}</p>
                          <p style={{margin:0, fontSize:'9px', color:'#333', fontFamily:'monospace'}}>{dateStr}</p>
                        </div>
                      </div>
                    );
                  });
                })()}
              </div>
            )}

              <div className="fadein">
                {(() => {
                  const total = filteredLeads.length;
                  const contacted = filteredLeads.filter(l => l.status === 'contacted' || l.status === 'replied' || l.status === 'interested' || l.status === 'opted_out' || l.status === 'booked' || l.status === 'closed').length;
                  const replied = filteredLeads.filter(l => l.status === 'replied' || l.status === 'interested' || l.status === 'booked' || l.status === 'closed').length;
                  const interested = filteredLeads.filter(l => l.status === 'interested' || l.status === 'booked' || l.status === 'closed').length;
                  const optedOut = filteredLeads.filter(l => l.status === 'opted_out').length;
                  const booked = filteredLeads.filter(l => l.status === 'booked' || l.status === 'closed').length;
                  const closed = filteredLeads.filter(l => l.status === 'closed').length;
                  const contactedPct = total > 0 ? Math.round((contacted / total) * 100) : 0;
                  const replyRate = contacted > 0 ? Math.round((replied / contacted) * 100) : 0;
                  const closeRate = booked > 0 ? Math.round((closed / booked) * 100) : 0;

                  // Group by niche
                  const byNiche = {};
                  filteredLeads.forEach(l => {
                    const n = l.niche || 'Other';
                    if (!byNiche[n]) byNiche[n] = { total: 0, contacted: 0, replied: 0, interested: 0, optedOut: 0 };
                    byNiche[n].total++;
                    if (['contacted','replied','interested','opted_out','booked','closed'].includes(l.status)) byNiche[n].contacted++;
                    if (['replied','interested','booked','closed'].includes(l.status)) byNiche[n].replied++;
                    if (['interested','booked','closed'].includes(l.status)) byNiche[n].interested++;
                    if (l.status === 'opted_out') byNiche[n].optedOut++;

                          <p style={{fontSize:'9px', fontWeight:700, letterSpacing:'.15em', textTransform:'uppercase', color:'#00F0FF', margin:'0 0 6px'}}>Total Leads</p>
                          <p style={{fontSize:'26px', fontWeight:900, color:'#fff', margin:0, fontFamily:'monospace'}}>{total.toLocaleString()}</p>
                        </div>
                        <div className="card-glow" style={{padding:'16px 18px'}}>
                          <p style={{fontSize:'9px', fontWeight:700, letterSpacing:'.15em', textTransform:'uppercase', color:'#F59E0B', margin:'0 0 6px'}}>Contacted</p>
                          <p style={{fontSize:'26px', fontWeight:900, color:'#F59E0B', margin:0, fontFamily:'monospace'}}>{contacted}</p>
                          <p style={{fontSize:'10px', color:'#555', margin:'2px 0 0'}}>{contactedPct}% of total</p>
                        </div>
                        <div className="card-glow" style={{padding:'16px 18px'}}>
                          <p style={{fontSize:'9px', fontWeight:700, letterSpacing:'.15em', textTransform:'uppercase', color:'#a855f7', margin:'0 0 6px'}}>Replied</p>
                          <p style={{fontSize:'26px', fontWeight:900, color:'#a855f7', margin:0, fontFamily:'monospace'}}>{replied}</p>
                          <p style={{fontSize:'10px', color:'#555', margin:'2px 0 0'}}>{replyRate}% reply rate</p>
                        </div>
                        <div className="card-glow" style={{padding:'16px 18px'}}>
                          <p style={{fontSize:'9px', fontWeight:700, letterSpacing:'.15em', textTransform:'uppercase', color:'#22c55e', margin:'0 0 6px'}}>Interested</p>
                          <p style={{fontSize:'26px', fontWeight:900, color:'#22c55e', margin:0, fontFamily:'monospace'}}>{interested}</p>
                        </div>
                        <div className="card-glow" style={{padding:'16px 18px'}}>
                          <p style={{fontSize:'9px', fontWeight:700, letterSpacing:'.15em', textTransform:'uppercase', color:'#ef4444', margin:'0 0 6px'}}>Opted Out</p>
                          <p style={{fontSize:'26px', fontWeight:900, color:'#ef4444', margin:0, fontFamily:'monospace'}}>{optedOut}</p>
                        </div>
                        <div className="card-glow" style={{padding:'16px 18px'}}>
                          <p style={{fontSize:'9px', fontWeight:700, letterSpacing:'.15em', textTransform:'uppercase', color:'#22c55e', margin:'0 0 6px'}}>Calls Booked</p>
                          <p style={{fontSize:'26px', fontWeight:900, color:'#22c55e', margin:0, fontFamily:'monospace'}}>{booked}</p>
                          <p style={{fontSize:'10px', color:'#555', margin:'2px 0 0'}}>{closeRate}% close rate</p>
                        </div>
                      </div>

                      {/* Overall Progress Bar */}
                      <div className="card" style={{padding:'20px', marginBottom:'20px'}}>
                        <div style={{display:'flex', justifyContent:'space-between', marginBottom:'10px'}}>
                          <span style={{fontSize:'12px', fontWeight:700, color:'#fff'}}>Outreach Progress</span>
                          <span style={{fontSize:'12px', fontWeight:700, color:'#00F0FF', fontFamily:'monospace'}}>{contacted} / {total} contacted</span>

                        <div style={{height:'10px', background:'#1a1a1a', borderRadius:'5px', overflow:'hidden'}}>
                          <div style={{height:'100%', borderRadius:'5px', background:'linear-gradient(90deg, #00F0FF, #a855f7)', width:`${contactedPct}%`, transition:'width .7s ease'}}/>
                        </div>
                      </div>

                      {/* By Niche Breakdown */}
                      <h3 style={{fontSize:'14px', fontWeight:800, color:'#fff', marginBottom:'12px'}}>By Niche</h3>
                      <div style={{display:'flex', flexDirection:'column', gap:'8px'}}>
                        {Object.entries(byNiche).sort((a,b) => b[1].total - a[1].total).map(([niche, data]) => {
                          const nichePct = data.total > 0 ? Math.round((data.contacted / data.total) * 100) : 0;
                          return (
                            <div key={niche} className="card" style={{padding:'14px 18px'}}>
                              <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'8px'}}>
                                <span style={{fontSize:'13px', fontWeight:700, color:'#fff'}}>{niche}</span>
                                <div style={{display:'flex', gap:'14px', fontSize:'11px', fontFamily:'monospace'}}>
                                  <span style={{color:'#555'}}>{data.total} total</span>
                                  <span style={{color:'#F59E0B'}}>{data.contacted} contacted</span>
                                  <span style={{color:'#a855f7'}}>{data.replied} replied</span>
                                  <span style={{color:'#22c55e'}}>{data.interested} interested</span>
                                  <span style={{color:'#ef4444'}}>{data.optedOut} opted out</span>
                                </div>
                              </div>
                              <div style={{height:'4px', background:'#1a1a1a', borderRadius:'2px', overflow:'hidden'}}>
                                <div style={{height:'100%', borderRadius:'2px', background:'#00F0FF', width:`${nichePct}%`, transition:'width .5s ease'}}/>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                })()}
              </div>
            )}

            {/* ═══ CALL LOG ═══ */}
            {tab === 'calllog' && (
              <div className="fadein">
                <CallLogTab callLogs={filteredCallLogs} repId={repId}/>
              </div>
            )}

            {tab === 'import' && (
              <LeadImportTool/>
            )}
          </>
        )}
      </main>
    </div>
  );
};

/* ══════════════════════════════════════════════════════
   ROOT APP — STATE MACHINE
══════════════════════════════════════════════════════ */
const App = () => {
  const [view, setView]               = useState('login');
  const [appLoading, setAppLoading]   = useState(true);
  const [userName, setUserName]       = useState('');
  const [userEmail, setUserEmail]     = useState('');
  const [userRole, setUserRole]       = useState('rep');
  const [repId, setRepId]             = useState(null);
  const [totalCloses, setTotalCloses] = useState(0);
  const [totalPoints, setTotalPoints] = useState(0);
  const [lastClosePts, setLastClosePts] = useState(1);
  const [closeHistory, setCloseHistory] = useState([]);
  const [scriptTab, setScriptTab]     = useState('openers');
  const [showShortcuts, setShowShortcuts] = useState(false);
  const [globalSidebarOpen, setGlobalSidebarOpen] = useState(false);
  const [viewAsRep, setViewAsRep] = useState(() => { try { return localStorage.getItem('pmss_viewAsRep') === 'true'; } catch { return false; } });
  useEffect(() => { try { localStorage.setItem('pmss_viewAsRep', viewAsRep); } catch {} }, [viewAsRep]);

  // Helper: load closes from Supabase for a given rep
  const loadCloses = async (rid) => {
    const { data } = await sb.from('closes').select('*').eq('rep_id', rid).order('created_at', { ascending: true });
    if (data) {
      setCloseHistory(data.map(c => ({ pts: c.pts, id: c.id })));
      setTotalCloses(data.length);
      setTotalPoints(data.reduce((s, c) => s + c.pts, 0));
      if (data.length > 0) setLastClosePts(data[data.length - 1].pts);
      try { localStorage.setItem('pmss_closes', data.length); localStorage.setItem('pmss_points', data.reduce((s, c) => s + c.pts, 0)); } catch {}
    }
  };

  // Auto-login: check Supabase session
  useEffect(() => {
    const init = async () => {
      try {
        const { data: { session } } = await sb.auth.getSession();
        if (session?.user) {
          const { data: repData } = await sb.from('reps').select('*').eq('auth_id', session.user.id).single();
          if (repData) {
            setUserName(repData.name); setUserEmail(repData.email);
            setUserRole(repData.role); setRepId(repData.id);
            await loadCloses(repData.id);
            try { localStorage.setItem('pmss_user', repData.name); localStorage.setItem('pmss_email', repData.email); } catch {}
            setView('home');
          }
        }
      } catch {}
      setAppLoading(false);
    };
    init();
  }, []);

  // Keyboard Shortcuts
  useEffect(() => {
    const handle = (e) => {
      if (['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName)) return;
      if (e.metaKey || e.ctrlKey || e.altKey) return;
      if (e.key === '?') { setShowShortcuts(s => !s); return; }
      if (e.key === 'Escape') { if (showShortcuts) { setShowShortcuts(false); return; } setView(v => (v !== 'login' && v !== 'home') ? 'home' : v); return; }
      if (e.key === 'h' || e.key === 'H') { setView(v => (v !== 'login' && v !== 'home') ? 'home' : v); return; }
      if (e.shiftKey && e.code && e.code.startsWith('Digit')) {
        const num = e.code.replace('Digit', '');
        setView(v => {
          if (v === 'home') {
            const m = {'1':'coldcall','2':'scripts','3':'foundation','4':'dms','5':'postcall','6':'ladder','7':'handoff','8':'aitools','9':'director'};
            if (num === '9' && userRole !== 'director') return v;
            return m[num] || v;
          }
          if (v === 'scripts') {
            const t = {'1':'openers','2':'hooks','3':'objections','4':'missteps','5':'close'};
            if (t[num]) setScriptTab(t[num]);
          }
          return v;
        });
      }
    };
    window.addEventListener('keydown', handle);
    return () => window.removeEventListener('keydown', handle);
  }, [userRole, showShortcuts]);

  const addClose = async (pts) => {
    setTotalCloses(c => c + 1); setTotalPoints(p => p + pts); setLastClosePts(pts);
    const label = PRODUCT_LABELS[pts] || 'Unknown';
    if (repId) {
      const { data } = await sb.from('closes').insert({ rep_id: repId, pts, product_label: label }).select().single();
      setCloseHistory(h => { const n = [...h, { pts, id: data?.id }]; try { localStorage.setItem('pmss_history', JSON.stringify(n)); } catch {} return n; });
    } else {
      setCloseHistory(h => { const n = [...h, { pts }]; try { localStorage.setItem('pmss_history', JSON.stringify(n)); } catch {} return n; });
    }
    try { localStorage.setItem('pmss_last_pts', pts); } catch {};
  };

  const undoClose = async () => {
    if (totalCloses > 0) {
      const last = closeHistory[closeHistory.length - 1];
      setTotalCloses(c => Math.max(0, c - 1)); setTotalPoints(p => Math.max(0, p - (last?.pts || lastClosePts)));
      if (last?.id && repId) { await sb.from('closes').delete().eq('id', last.id); }
      setCloseHistory(h => { const n = h.slice(0, -1); try { localStorage.setItem('pmss_history', JSON.stringify(n)); } catch {} return n; });
    }
  };

  const handleLogin = (name, email, code, id, role) => {
    setUserName(name); setUserEmail(email || ''); setRepId(id); setUserRole(role || 'rep');
    if (id) loadCloses(id);
    try { localStorage.setItem('pmss_user', name); localStorage.setItem('pmss_email', email || ''); if (code) localStorage.setItem('pmss_code', code); } catch {}
    setView('home');
  };

  const handleLogout = async () => {
    await sb.auth.signOut();
    setUserName(''); setUserEmail(''); setRepId(null); setUserRole('rep');
    setTotalCloses(0); setTotalPoints(0); setCloseHistory([]);
    try { localStorage.removeItem('pmss_user'); localStorage.removeItem('pmss_email'); } catch {}
    setView('login');
  };

  const handleHome = () => setView('home');
  const handleNav  = (key) => setView(key);
  const actuallyDirector = userRole === 'director';
  const isDirector = actuallyDirector && !viewAsRep;

  const toggleSidebar = () => setGlobalSidebarOpen(s => !s);
  const shared = { userName, userEmail, onHome: handleHome, onLogout: handleLogout, totalCloses, setTotalCloses, totalPoints, addClose, undoClose, closeHistory, repId, isDirector, onToggleSidebar: toggleSidebar, actuallyDirector, viewAsRep, onToggleView: () => setViewAsRep(v => !v) };
  const chat   = <ChatWidget userName={userName} userEmail={userEmail} currentView={view} repId={repId} userRole={userRole} />;
  const shortcuts = showShortcuts ? <ShortcutsModal onClose={() => setShowShortcuts(false)} /> : null;
  const sidebar = view !== 'login' ? <GlobalSidebar open={globalSidebarOpen} onClose={()=>setGlobalSidebarOpen(false)} onNav={handleNav} currentView={view} isDirector={isDirector}/> : null;


  if (appLoading) return (
    <div style={{minHeight:'100vh', background:'#000', display:'flex', alignItems:'center', justifyContent:'center'}}>
      <div style={{display:'flex', flexDirection:'column', alignItems:'center', gap:'16px'}}>
        <Logo height={48}/>
        <svg style={{animation:'spin 1s linear infinite'}} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#00F0FF" strokeWidth="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
      </div>
    </div>
  );

  if (view === 'login')      return <LoginView      onLogin={handleLogin}/>;
  const bottomNav = <BottomNav currentView={view} onNav={handleNav} addClose={addClose}/>;
  if (view === 'home')       return <>{sidebar}{<HomeView       {...shared} onNav={handleNav} onShortcuts={() => setShowShortcuts(true)}/>}{bottomNav}{chat}{shortcuts}</>;
  if (view === 'coldcall')   return <>{sidebar}{<ColdCallView   {...shared}/>}{bottomNav}{chat}</>;
  if (view === 'foundation') return <>{sidebar}{<FoundationView {...shared}/>}{bottomNav}{chat}</>;
  if (view === 'scripts')    return <>{sidebar}{<ScriptsView    {...shared} scriptTab={scriptTab} setScriptTab={setScriptTab}/>}{bottomNav}{chat}</>;
  if (view === 'postcall')   return <>{sidebar}{<PostCallView   {...shared}/>}{bottomNav}{chat}</>;
  if (view === 'ladder')     return <>{sidebar}{<LadderView     {...shared}/>}{bottomNav}{chat}</>;
  if (view === 'handoff')    return <>{sidebar}{<HandoffView    {...shared}/>}{bottomNav}{chat}</>;
  if (view === 'dms')        return <>{sidebar}{<DMView         {...shared}/>}{bottomNav}{chat}</>;
  if (view === 'email')      return <>{sidebar}{<EmailView      {...shared}/>}{bottomNav}{chat}</>;
  if (view === 'sms')        return <>{sidebar}{<SMSView        {...shared}/>}{bottomNav}{chat}</>;
  if (view === 'offerstack') return <>{sidebar}{<OfferStackView {...shared}/>}{bottomNav}{chat}</>;
  if (view === 'aitools')    return <>{sidebar}{<AIToolsView    {...shared}/>}{bottomNav}{chat}</>;
  if (view === 'training')   return <>{sidebar}{<TrainingView   {...shared}/>}{bottomNav}{chat}</>;
  if (view === 'voicemail')  return <>{sidebar}{<div style={{display:'flex', flexDirection:'column', height:'100vh', background:'#000'}}><TopBar title="Voicemail Scripts" subtitle="VM — Leave the Right Message" userName={userName} userEmail={userEmail} onHome={handleHome} onLogout={handleLogout} onPrint={()=>downloadPDF('Voicemail-Scripts')} totalCloses={totalCloses} setTotalCloses={setTotalCloses} totalPoints={totalPoints} addClose={addClose} undoClose={undoClose}/><main className="print-area section-main" style={{flex:1, overflowY:'auto', padding:'28px 32px', maxWidth:'900px', width:'100%', margin:'0 auto'}}><VoicemailPanel/></main></div>}{bottomNav}{chat}</>;
  if (view === 'discovery')  return <>{sidebar}{<div style={{display:'flex', flexDirection:'column', height:'100vh', background:'#000'}}><TopBar title="Discovery Call Framework" subtitle="DC — The 15-Minute Close" userName={userName} userEmail={userEmail} onHome={handleHome} onLogout={handleLogout} onPrint={()=>downloadPDF('Discovery-Call')} totalCloses={totalCloses} setTotalCloses={setTotalCloses} totalPoints={totalPoints} addClose={addClose} undoClose={undoClose}/><main className="print-area section-main" style={{flex:1, overflowY:'auto', padding:'28px 32px', maxWidth:'900px', width:'100%', margin:'0 auto'}}><DiscoveryCallPanel/></main></div>}{bottomNav}{chat}</>;
  if (view === 'upsell')     return <>{sidebar}{<div style={{display:'flex', flexDirection:'column', height:'100vh', background:'#000'}}><TopBar title="0.5 → 1.0 Upsell" subtitle="UP — Turn Websites Into Retainers" userName={userName} userEmail={userEmail} onHome={handleHome} onLogout={handleLogout} onPrint={()=>downloadPDF('Upsell-Script')} totalCloses={totalCloses} setTotalCloses={setTotalCloses} totalPoints={totalPoints} addClose={addClose} undoClose={undoClose}/><main className="print-area section-main" style={{flex:1, overflowY:'auto', padding:'28px 32px', maxWidth:'900px', width:'100%', margin:'0 auto'}}><UpsellPanel/></main></div>}{bottomNav}{chat}</>;
  if (view === 'noshow')     return <>{sidebar}{<div style={{display:'flex', flexDirection:'column', height:'100vh', background:'#000'}}><TopBar title="No-Show Recovery" subtitle="NS — Don't Chase. Replace." userName={userName} userEmail={userEmail} onHome={handleHome} onLogout={handleLogout} onPrint={()=>downloadPDF('No-Show-Recovery')} totalCloses={totalCloses} setTotalCloses={setTotalCloses} totalPoints={totalPoints} addClose={addClose} undoClose={undoClose}/><main className="print-area section-main" style={{flex:1, overflowY:'auto', padding:'28px 32px', maxWidth:'900px', width:'100%', margin:'0 auto'}}><NoShowPanel/></main></div>}{bottomNav}{chat}</>;
  if (view === 'proofpoints') return <>{sidebar}{<div style={{display:'flex', flexDirection:'column', height:'100vh', background:'#000'}}><TopBar title="Proof Points & Ammo" subtitle="PP — Confidence Arsenal" userName={userName} userEmail={userEmail} onHome={handleHome} onLogout={handleLogout} onPrint={()=>downloadPDF('Proof-Points')} totalCloses={totalCloses} setTotalCloses={setTotalCloses} totalPoints={totalPoints} addClose={addClose} undoClose={undoClose}/><main className="print-area section-main" style={{flex:1, overflowY:'auto', padding:'28px 32px', maxWidth:'900px', width:'100%', margin:'0 auto'}}><ProofPointsPanel/><NotesPad storageKey="notes_proofpoints" /></main></div>}{bottomNav}{chat}</>;
  if (view === 'director' && isDirector) return <>{sidebar}{<DirectorView {...shared}/>}{bottomNav}{chat}</>;
  if (view === 'newupdates' && actuallyDirector) return <>{sidebar}{<div style={{display:'flex', flexDirection:'column', height:'100vh', background:'#000'}}><TopBar title="New Updates" subtitle="Features built — activate when ready" userName={userName} userEmail={userEmail} onHome={handleHome} onLogout={handleLogout} totalCloses={totalCloses} setTotalCloses={setTotalCloses} totalPoints={totalPoints} addClose={addClose} undoClose={undoClose} actuallyDirector={actuallyDirector} viewAsRep={viewAsRep} onToggleView={() => setViewAsRep(v => !v)}/><main className="print-area section-main" style={{flex:1, overflowY:'auto', padding:'28px 32px', maxWidth:'900px', width:'100%', margin:'0 auto'}}><div style={{marginBottom:'8px'}}><span className="tag">NEW UPDATES</span></div><h2 style={{fontSize:'26px',fontWeight:900,color:'#fff',margin:'8px 0 4px'}}>Features Built — Not Yet Active</h2><p style={{color:'#666',fontSize:'14px',lineHeight:1.6,margin:'0 0 24px'}}>Build these once the current sales portal is up to speed. Click any to open.</p><div style={{display:'flex',flexDirection:'column',gap:'12px'}}>{[{key:'upsell',title:'0.5 → 1.0 Upsell',desc:'Post-delivery upsell script — turn websites into recurring revenue'},{key:'voicemail',title:'Voicemail Scripts',desc:'4 voicemail templates under 20 seconds each'},{key:'discovery',title:'Discovery Call Framework',desc:'15-minute discovery call agenda with 5 phases'},{key:'noshow',title:'No-Show Recovery',desc:'3-touch SMS recovery sequence'},{key:'proofpoints',title:'Proof Points & Ammo',desc:'Social proof, competitor ammunition, credibility builders'}].map(f=>(<button key={f.key} onClick={()=>handleNav(f.key)} className="card" style={{padding:'18px 20px',textAlign:'left',cursor:'pointer',border:'1px solid #1e1e1e',font:'inherit',display:'flex',justifyContent:'space-between',alignItems:'center'}}><div><p style={{margin:0,fontWeight:700,color:'#fff',fontSize:'15px'}}>{f.title}</p><p style={{margin:'4px 0 0',color:'#555',fontSize:'12px'}}>{f.desc}</p></div><span style={{color:'#00F0FF',fontSize:'12px',fontWeight:700}}>Open →</span></button>))}</div></main></div>}{bottomNav}{chat}</>;
  // Fallback — any invalid view goes home instead of blank screen
  return <>{sidebar}{<HomeView {...shared} onNav={handleNav} onShortcuts={() => setShowShortcuts(true)}/>}{bottomNav}{chat}{shortcuts}</>;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
