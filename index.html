    if (!CALENDAR_ENDPOINT) { setCalendarEvents([]); return; }
    try {
      const res = await fetch(CALENDAR_ENDPOINT);
      const data = await res.json();
      setCalendarEvents(data || []);
    } catch { setCalendarEvents([]); }
  };

  useEffect(() => { loadLeads(); loadStats(); loadCalendar(); }, []);

  const handleLogged = (leadId, outcome, newStatus) => {
    setLeads(prev => prev.map(l => l.id === leadId ? { ...l, status: newStatus } : l));
    setCallLogs(prev => {
      const newLog = { id: Date.now().toString(), lead_id: leadId, rep_id: repId, outcome, created_at: new Date().toISOString() };
      return { ...prev, [leadId]: [newLog, ...(prev[leadId] || [])] };
    });
    loadStats();
  };

  const priorityOrder = { HOT: 0, HIGH: 1, MEDIUM: 2 };
  const today = new Date().toISOString().split('T')[0];
  const callbackLeads = leads.filter(l => {
    const logs = callLogs[l.id] || [];
    return logs.some(log => log.callback_date && log.callback_date <= today);
  });

  const filteredLeads = leads
    .filter(l => {
      if (!searchQuery) return true;
      const q = searchQuery.toLowerCase();
      return (l.business_name || '').toLowerCase().includes(q)
        || (l.city || '').toLowerCase().includes(q)
        || (l.phone || '').toLowerCase().includes(q)
        || (l.niche || '').toLowerCase().includes(q)
        || (l.contact_name || '').toLowerCase().includes(q)
        || (l.email || '').toLowerCase().includes(q);
    })
    .filter(l => {
      if (quickFilter === 'all') return true;
      if (quickFilter === 'HOT') return l.priority === 'HOT';
      if (quickFilter === 'HIGH') return l.priority === 'HIGH';
      if (quickFilter === 'MEDIUM') return l.priority === 'MEDIUM';
      if (quickFilter === 'callbacks') return callbackLeads.some(cb => cb.id === l.id);
      if (quickFilter === 'new') return l.status === 'new';
      return true;
    })
    .filter(l => filterNiche === 'all' || l.niche === filterNiche)
    .filter(l => filterPriority === 'all' || l.priority === filterPriority)
    .filter(l => filterStatus === 'all' || l.status === filterStatus)
    .sort((a, b) => (priorityOrder[a.priority] || 2) - (priorityOrder[b.priority] || 2));

  const bookingRate = stats.today > 0 ? Math.round((stats.booked / stats.week) * 100) : 0;

  return (
    <div style={{display:'flex', flexDirection:'column', height:'100vh', background:'#000'}}>
      <TopBar title="Call Center" subtitle="Your calling command center"
        userName={userName} userEmail={userEmail} onHome={onHome} onLogout={onLogout}
        totalCloses={totalCloses} totalPoints={totalPoints} addClose={addClose} undoClose={undoClose}/>
      <main className="section-main" style={{flex:1, overflowY:'auto', padding:'28px 32px', maxWidth:'1100px', width:'100%', margin:'0 auto'}}>
        <div style={{marginBottom:'6px'}}><span className="tag">Command Center</span></div>
        <h2 style={{fontSize:'26px', fontWeight:900, color:'#fff', margin:'8px 0 4px'}}>Call Center</h2>
        <p style={{color:'#555', fontSize:'13px', margin:'0 0 16px'}}>Your leads, your calls, your numbers. All in one place.</p>
        <div className="divider" style={{margin:'16px 0'}}/>

        {/* Tab Switcher */}
        <div style={{display:'flex', gap:'6px', marginBottom:'20px', flexWrap:'wrap'}}>
          {[['list','Today\'s List'],['quicklog','Quick Log'],['callbacks','Callbacks Due'],['calendar','Calendar'],['stats','My Stats']].map(([key, label]) => (
            <button key={key} className={`call-tab${tab===key?' active':''}`} onClick={()=>setTab(key)}>
              {label}
              {key === 'callbacks' && callbackLeads.length > 0 && (
                <span style={{marginLeft:'6px', background:'#ff6060', color:'#fff', borderRadius:'10px', padding:'1px 6px', fontSize:'10px', fontWeight:800}}>{callbackLeads.length}</span>
              )}
            </button>
          ))}
          <button onClick={()=>{ loadLeads(); loadStats(); loadCalendar(); }} style={{marginLeft:'auto', padding:'8px 14px', borderRadius:'7px', cursor:'pointer', border:'1px solid #1e1e1e', background:'transparent', color:'#444', fontSize:'11px', fontWeight:700, fontFamily:'Inter,sans-serif', transition:'all .15s'}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor='rgba(0,240,255,.3)';e.currentTarget.style.color='#00F0FF';}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor='#1e1e1e';e.currentTarget.style.color='#444';}}>
            Refresh
          </button>
        </div>

        {loading ? (
          <div style={{display:'flex', alignItems:'center', justifyContent:'center', padding:'60px 0'}}>
            <svg style={{animation:'spin 1s linear infinite'}} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#00F0FF" strokeWidth="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
          </div>
        ) : (
          <>
            {/* TODAY'S LIST */}
            {tab === 'list' && (
              <div className="fadein">
                {/* Search Bar */}
                <div style={{position:'relative', marginBottom:'14px'}}>
                  <input value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} placeholder="Search leads — name, city, phone, niche..."
                    className="field" style={{width:'100%', padding:'12px 16px 12px 40px', fontSize:'14px', background:'rgba(255,255,255,.03)', border:'1px solid #1e1e1e', borderRadius:'10px', color:'#fff', fontFamily:'Inter,sans-serif'}}/>
                  <span style={{position:'absolute', left:'14px', top:'50%', transform:'translateY(-50%)', fontSize:'16px', color:'#333', pointerEvents:'none'}}>🔍</span>
                  {searchQuery && <button onClick={()=>setSearchQuery('')} style={{position:'absolute', right:'12px', top:'50%', transform:'translateY(-50%)', background:'none', border:'none', color:'#555', cursor:'pointer', fontSize:'14px', fontFamily:'Inter'}}>✕</button>}
                </div>

                {/* Quick Filter Buttons */}
                <div style={{display:'flex', gap:'6px', marginBottom:'14px', flexWrap:'wrap'}}>
                  {[['all','All'],['HOT','HOT'],['HIGH','HIGH'],['MEDIUM','MEDIUM'],['callbacks','Callbacks'],['new','New']].map(([key, label]) => {
                    const isActive = quickFilter === key;
                    const colors = { HOT:'#ff6060', HIGH:'#F59E0B', MEDIUM:'#3B82F6', callbacks:'#A855F7', new:'#22c55e' };
                    const accentColor = colors[key] || '#00F0FF';
                    const count = key === 'all' ? leads.length
                      : key === 'HOT' ? leads.filter(l=>l.priority==='HOT').length
                      : key === 'HIGH' ? leads.filter(l=>l.priority==='HIGH').length
                      : key === 'MEDIUM' ? leads.filter(l=>l.priority==='MEDIUM').length
                      : key === 'callbacks' ? callbackLeads.length
                      : key === 'new' ? leads.filter(l=>l.status==='new').length : 0;
                    return (
                      <button key={key} onClick={()=>setQuickFilter(key)}
                        style={{padding:'7px 16px', borderRadius:'8px', cursor:'pointer', fontSize:'11px', fontWeight:700, fontFamily:'Inter,sans-serif', transition:'all .15s',
                          background: isActive ? `${accentColor}15` : 'transparent',
                          border: `1px solid ${isActive ? accentColor+'55' : '#1e1e1e'}`,
                          color: isActive ? accentColor : '#555',
                        }}>
                        {label}
                        <span style={{marginLeft:'6px', fontSize:'10px', opacity:0.7}}>{count}</span>
                      </button>
                    );
                  })}
                </div>

                {/* Advanced Filters */}
                <div className="cc-filter-bar" style={{display:'flex', gap:'10px', marginBottom:'16px', flexWrap:'wrap'}}>
                  <select value={filterNiche} onChange={e=>setFilterNiche(e.target.value)} className="field" style={{maxWidth:'180px', padding:'8px 12px', fontSize:'12px'}}>
                    <option value="all">All Niches</option>
                    {NICHE_LIST.map(n => <option key={n} value={n}>{n}</option>)}
                  </select>
                  <select value={filterPriority} onChange={e=>setFilterPriority(e.target.value)} className="field" style={{maxWidth:'140px', padding:'8px 12px', fontSize:'12px'}}>
                    <option value="all">All Priority</option>
                    <option value="HOT">HOT (0-19)</option>
                    <option value="HIGH">HIGH (20-59)</option>
                    <option value="MEDIUM">MEDIUM (60-100)</option>
                  </select>
                  <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} className="field" style={{maxWidth:'160px', padding:'8px 12px', fontSize:'12px'}}>
                    <option value="all">All Status</option>
                    <option value="new">New</option>
                    <option value="contacted">Contacted</option>
                    <option value="callback">Callback</option>
                    <option value="booked">Booked</option>
                    <option value="discovery_completed">Discovery Done</option>
                    <option value="no_show">No Show</option>
                    <option value="not_interested">Not Interested</option>
                  </select>
                  <span style={{marginLeft:'auto', fontSize:'12px', color:'#444', alignSelf:'center'}}>{filteredLeads.length} leads</span>
                </div>

                {filteredLeads.length === 0 ? (
                  <div className="card" style={{padding:'40px', textAlign:'center'}}>
                    <p style={{color:'#444', fontSize:'14px', margin:0}}>
                      {leads.length === 0 ? 'No leads assigned yet. Ask your director to assign leads.' : 'No leads match your filters.'}
                    </p>
                  </div>
                ) : (
                  <div style={{display:'flex', flexDirection:'column', gap:'8px'}}>
                    {filteredLeads.map(lead => (
                      <LeadRow key={lead.id} lead={lead} repId={repId}
                        isExpanded={expandedLead === lead.id}
                        onToggle={(id) => setExpandedLead(expandedLead === id ? null : id)}
                        onLogged={handleLogged}
                        callLogs={callLogs[lead.id] || []}/>
                    ))}
                  </div>
                )}
              </div>
            )}

            {/* QUICK LOG — Manual Call Entry */}
            {tab === 'quicklog' && (
              <QuickLogForm repId={repId} onLogged={() => { loadLeads(); loadStats(); }}/>
            )}

            {/* CALLBACKS DUE */}
            {tab === 'callbacks' && (
              <div className="fadein">
                {callbackLeads.length === 0 ? (
                  <div className="card" style={{padding:'40px', textAlign:'center'}}>
                    <p style={{color:'#444', fontSize:'14px', margin:0}}>No callbacks due. Keep dialing.</p>
                  </div>
                ) : (
                  <div style={{display:'flex', flexDirection:'column', gap:'8px'}}>
                    {callbackLeads.map(lead => (
                      <LeadRow key={lead.id} lead={lead} repId={repId}
                        isExpanded={expandedLead === lead.id}
                        onToggle={(id) => setExpandedLead(expandedLead === id ? null : id)}
                        onLogged={handleLogged}
                        callLogs={callLogs[lead.id] || []}/>
                    ))}
                  </div>
                )}
              </div>
            )}

            {/* CALENDAR */}
            {tab === 'calendar' && (
              <div className="fadein">
                {!CALENDAR_ENDPOINT ? (
                  <div className="card" style={{padding:'40px', textAlign:'center'}}>
                    <p style={{color:'#444', fontSize:'14px', margin:'0 0 8px'}}>Calendar endpoint not configured yet.</p>
                    <p style={{color:'#333', fontSize:'12px', margin:0}}>Once the Google Apps Script is deployed, booked calls will appear here.</p>
                  </div>
                ) : calendarEvents.length === 0 ? (
                  <div className="card" style={{padding:'40px', textAlign:'center'}}>
                    <p style={{color:'#444', fontSize:'14px', margin:0}}>No calls booked for today.</p>
                  </div>
                ) : (
                  <div style={{display:'flex', flexDirection:'column', gap:'8px'}}>
                    {calendarEvents.map((evt, i) => (
                      <div key={i} className="card" style={{padding:'14px 18px', display:'flex', alignItems:'center', gap:'12px'}}>
                        <span style={{fontSize:'14px', fontWeight:800, color:'#00F0FF', fontFamily:'monospace', minWidth:'70px'}}>{evt.time}</span>
                        <div style={{width:'1px', height:'20px', background:'#1e1e1e'}}/>
                        <span style={{fontSize:'14px', fontWeight:700, color:'#fff'}}>{evt.title}</span>
                        {evt.type && <span className="niche-badge">{evt.type}</span>}
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {/* MY STATS */}
            {tab === 'stats' && (
              <div className="fadein">
                <div className="cc-stats-grid" style={{display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:'12px', marginBottom:'24px'}}>
                  <div className="stat-card">
                    <p className="stat-label">Calls Today</p>
                    <p className="stat-number">{stats.today}</p>
                  </div>
                  <div className="stat-card">
                    <p className="stat-label">Calls This Week</p>
                    <p className="stat-number">{stats.week}</p>
                  </div>
                  <div className="stat-card">
                    <p className="stat-label">Total Bookings</p>
                    <p className="stat-number" style={{color:'#22c55e'}}>{stats.booked}</p>
                  </div>
                  <div className="stat-card">
                    <p className="stat-label">Callbacks Pending</p>
                    <p className="stat-number" style={{color:'#F59E0B'}}>{stats.pending}</p>
                  </div>
                </div>
                <div className="card-glow" style={{padding:'20px'}}>
                  <p className="stat-label">Booking Rate</p>
                  <div style={{display:'flex', alignItems:'center', gap:'16px'}}>
                    <p style={{fontSize:'36px', fontWeight:900, color:'#22c55e', margin:0, fontFamily:'monospace'}}>{bookingRate}%</p>
                    <div style={{flex:1}}>
                      <div style={{height:'8px', background:'#1a1a1a', borderRadius:'4px', overflow:'hidden'}}>
                        <div style={{height:'100%', background:'#22c55e', width:`${Math.min(bookingRate, 100)}%`, borderRadius:'4px', transition:'width .5s ease'}}/>
                      </div>
                      <p style={{margin:'6px 0 0', fontSize:'11px', color:'#444'}}>{stats.booked} bookings / {stats.week} calls this week</p>
                    </div>
                  </div>
                </div>
              </div>
            )}
          </>
        )}
      </main>
    </div>
  );
};

/* ══════════════════════════════════════════════════════
   LEAD IMPORT TOOL (Director Dashboard tab)
══════════════════════════════════════════════════════ */
const SOURCE_TYPES = [
  { value: 'csv_import', label: 'CSV Import' },
  { value: 'scraper', label: 'Scraper' },
  { value: 'warm_import', label: 'Warm Leads' },
  { value: 'ghl_sync', label: 'GHL Sync' },
  { value: 'manual', label: 'Manual Entry' },
  { value: 'website', label: 'Website Form' },
];

const LeadImportTool = () => {
  const [file, setFile] = useState(null);
  const [preview, setPreview] = useState([]);
  const [importing, setImporting] = useState(false);
  const [progress, setProgress] = useState({ done: 0, total: 0, errors: 0 });
  const [done, setDone] = useState(false);
  const [dragOver, setDragOver] = useState(false);
  const [batchLabel, setBatchLabel] = useState('');
  const [sourceType, setSourceType] = useState('csv_import');
  const [sourceTag, setSourceTag] = useState('');
  const [batchNotes, setBatchNotes] = useState('');
  const [recentBatches, setRecentBatches] = useState([]);

  useEffect(() => { loadBatches(); }, []);

  const loadBatches = async () => {
    const { data } = await sb.from('import_batches').select('*').order('created_at', { ascending: false }).limit(10);
    setRecentBatches(data || []);
  };

  const parseCSV = (text) => {
    const lines = text.split('\n').filter(l => l.trim());
    if (lines.length < 2) return [];
    const headers = [];
    let inQuote = false, current = '';
    for (const ch of lines[0]) {
      if (ch === '"') { inQuote = !inQuote; continue; }
      if (ch === ',' && !inQuote) { headers.push(current.trim()); current = ''; continue; }
      current += ch;
    }
    headers.push(current.trim());

    return lines.slice(1).map(line => {
      const vals = []; inQuote = false; current = '';
      for (const ch of line) {
        if (ch === '"') { inQuote = !inQuote; continue; }
        if (ch === ',' && !inQuote) { vals.push(current.trim()); current = ''; continue; }
        current += ch;
      }
      vals.push(current.trim());
      const row = {};
      headers.forEach((h, i) => { row[h] = vals[i] || ''; });
      return row;
    });
  };

  const handleFile = (f) => {
    setFile(f); setDone(false);
    if (!batchLabel) setBatchLabel(f.name.replace(/\.csv$/i, ''));
    const reader = new FileReader();
    reader.onload = (e) => {
      const rows = parseCSV(e.target.result);
      setPreview(rows.slice(0, 5));
      setProgress({ done: 0, total: rows.length, errors: 0 });
      // Auto-detect source tag from niches in CSV
      const niches = [...new Set(rows.slice(0, 100).map(r => r['Niche']).filter(Boolean))];
      if (niches.length > 0 && !sourceTag) setSourceTag(niches.length === 1 ? niches[0] : niches.join(', '));
    };
    reader.readAsText(f);
  };

  const handleImport = async () => {
    if (!file || !batchLabel.trim()) { alert('Give this batch a name before importing.'); return; }
    setImporting(true);

    // Create the batch record first
    const { data: batchRecord, error: batchErr } = await sb.from('import_batches').insert({
      label: batchLabel.trim(),
      source_type: sourceType,
      filename: file.name,
      lead_count: progress.total,
      notes: batchNotes || null,
    }).select().single();

    if (batchErr) { console.error('Batch create error:', batchErr); }
    const batchId = batchRecord?.id || null;
    const tag = sourceTag.trim() || batchLabel.trim();

    const reader = new FileReader();
    reader.onload = async (e) => {
      const rows = parseCSV(e.target.result);
      const isWarm = rows[0] && 'Last Result' in rows[0];
      let imported = 0, errors = 0;

      for (let i = 0; i < rows.length; i += 200) {
        const chunk = rows.slice(i, i + 200).map(r => {
          if (isWarm) {
            return {
              business_name: r['Business Name'] || 'Unknown',
              niche: r['Niche'] || 'General',
              phone: r['Phone'] || null,
              website: r['Website'] || null,
              instagram: r['Socials'] || null,
              notes: [r['Notes'], r['Last Result'], r['Next Action']].filter(Boolean).join(' | '),
              status: r['Status']?.toLowerCase() === 'follow up' ? 'callback' : 'new',
              priority: 'HOT',
              source: 'warm_import',
              source_tag: tag,
              batch_id: batchId,
            };
          }
          const reviews = parseInt(r['Google Reviews'] || r['Review Count']) || 0;
          return {
            business_name: r['Business Name'] || 'Unknown',
            contact_name: r['Owner Name'] || r['Contact Name'] || null,
            niche: r['Niche'] || 'General',
            category: r['Category'] || null,
            city: r['City'] || null,
            address: r['Address'] || null,
            phone: r['Phone'] || null,
            website: r['Website'] || null,
            email: r['Email'] || null,
            instagram: r['Instagram'] || null,
            google_reviews: reviews,
            rating: parseFloat(r['Rating']) || null,
            priority: r['Priority'] || (reviews <= 19 ? 'HOT' : reviews <= 59 ? 'HIGH' : 'MEDIUM'),
            outreach_channel: r['Outreach Channel'] || null,
            status: 'new',
            notes: r['Notes'] || null,
            source: sourceType,
            source_tag: tag,
            batch_id: batchId,
          };
        });
        const { error } = await sb.from('leads').upsert(chunk, { onConflict: 'phone,niche', ignoreDuplicates: false });
        if (error) { console.error('Import batch error:', error); errors += chunk.length; } else { imported += chunk.length; }
        setProgress({ done: imported, total: rows.length, errors });
      }

      // Update batch with actual count
      if (batchId) await sb.from('import_batches').update({ lead_count: imported }).eq('id', batchId);

      setImporting(false);
      setDone(true);
      loadBatches();
    };
    reader.readAsText(file);
  };

  const deleteBatch = async (batch) => {
    if (!confirm(`Delete batch "${batch.label}" and all ${batch.lead_count} leads in it?`)) return;
    await sb.from('leads').delete().eq('batch_id', batch.id);
    await sb.from('import_batches').delete().eq('id', batch.id);
    loadBatches();
  };

  const inputStyle = { width:'100%', background:'#1a1a1a', border:'1px solid #333', borderRadius:'4px', padding:'10px 12px', color:'#fff', fontSize:'13px', fontFamily:'Inter,sans-serif', outline:'none' };
  const labelStyle = { display:'block', fontSize:'10px', color:'#888', fontWeight:700, marginBottom:'4px', textTransform:'uppercase', letterSpacing:'.06em' };

  return (
    <div className="fadein">
      {/* Batch Config */}
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'12px', marginBottom:'16px'}}>
        <div>
          <label style={labelStyle}>Batch Name *</label>
          <input value={batchLabel} onChange={e=>setBatchLabel(e.target.value)} placeholder="e.g. No-Website Scraper — Mar 24" style={inputStyle}/>
        </div>
        <div>
          <label style={labelStyle}>Source Type</label>
          <select value={sourceType} onChange={e=>setSourceType(e.target.value)} style={inputStyle}>
            {SOURCE_TYPES.map(s => <option key={s.value} value={s.value}>{s.label}</option>)}
          </select>
        </div>
        <div>
          <label style={labelStyle}>Source Tag</label>
          <input value={sourceTag} onChange={e=>setSourceTag(e.target.value)} placeholder="Auto-detected from CSV niches" style={inputStyle}/>
          <p style={{margin:'4px 0 0', fontSize:'10px', color:'#444'}}>Used for filtering — e.g. "Cleaning", "Hamilton No-Website", "Isaiah Warm"</p>
        </div>
        <div>
          <label style={labelStyle}>Notes (optional)</label>
          <input value={batchNotes} onChange={e=>setBatchNotes(e.target.value)} placeholder="Any context about this import" style={inputStyle}/>
        </div>
      </div>

      {/* Drop Zone */}
      <div className={`import-dropzone${dragOver?' drag-over':''}`}
        onDragOver={e=>{e.preventDefault();setDragOver(true);}}
        onDragLeave={()=>setDragOver(false)}
        onDrop={e=>{e.preventDefault();setDragOver(false);handleFile(e.dataTransfer.files[0]);}}
        onClick={()=>{const inp=document.createElement('input');inp.type='file';inp.accept='.csv';inp.onchange=e=>handleFile(e.target.files[0]);inp.click();}}>
        {file ? (
          <div>
            <p style={{color:'#00F0FF', fontSize:'14px', fontWeight:700, margin:'0 0 4px'}}>{file.name}</p>
            <p style={{color:'#444', fontSize:'12px', margin:0}}>{progress.total} rows detected · Click to change file</p>
          </div>
        ) : (
          <div>
            <p style={{color:'#666', fontSize:'14px', fontWeight:600, margin:'0 0 4px'}}>Drop a CSV file here or click to browse</p>
            <p style={{color:'#333', fontSize:'11px', margin:0}}>Supports cold lead CSVs and warm lead CSVs</p>
          </div>
        )}
      </div>

      {preview.length > 0 && (
        <div style={{marginTop:'16px'}}>
          <p style={{fontSize:'10px', fontWeight:700, color:'#444', letterSpacing:'.12em', textTransform:'uppercase', margin:'0 0 8px'}}>Preview (first 5 rows)</p>
          <div style={{overflowX:'auto', border:'1px solid #1e1e1e', borderRadius:'8px'}}>
            <table style={{width:'100%', borderCollapse:'collapse', fontSize:'11px'}}>
              <thead>
                <tr>{Object.keys(preview[0]).map(h => <th key={h} style={{padding:'8px 10px', background:'#0a0a0a', color:'#00F0FF', fontWeight:700, textAlign:'left', borderBottom:'1px solid #1e1e1e', whiteSpace:'nowrap'}}>{h}</th>)}</tr>
              </thead>
              <tbody>
                {preview.map((row, i) => (
                  <tr key={i}>{Object.values(row).map((v, j) => <td key={j} style={{padding:'6px 10px', color:'#888', borderBottom:'1px solid #111', maxWidth:'200px', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{v}</td>)}</tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {file && !done && (
        <div style={{marginTop:'16px', display:'flex', alignItems:'center', gap:'12px'}}>
          <button onClick={handleImport} disabled={importing || !batchLabel.trim()}
            className="btn-primary" style={{width:'auto', padding:'12px 28px', opacity: (importing || !batchLabel.trim()) ? .6 : 1}}>
            {importing ? `Importing... ${progress.done}/${progress.total}` : `Import ${progress.total} Leads`}
          </button>
          {importing && (
            <div style={{flex:1}}>
              <div style={{height:'6px', background:'#1a1a1a', borderRadius:'3px', overflow:'hidden'}}>
                <div style={{height:'100%', background:'#00F0FF', width:`${(progress.done/progress.total)*100}%`, borderRadius:'3px', transition:'width .3s'}}/>
              </div>
            </div>
          )}
        </div>
      )}

      {done && (
        <div className="card-glow fadein" style={{marginTop:'16px', padding:'16px 20px'}}>
          <p style={{color:'#22c55e', fontSize:'14px', fontWeight:700, margin:'0 0 4px'}}>Import Complete — Batch: {batchLabel}</p>
          <p style={{color:'#888', fontSize:'12px', margin:0}}>{progress.done} imported · {progress.errors} errors · {progress.total} total · Tagged: {sourceTag || batchLabel}</p>
        </div>
      )}

      {/* Recent Batches */}
      {recentBatches.length > 0 && (
        <div style={{marginTop:'28px'}}>
          <p style={{fontSize:'10px', fontWeight:700, color:'#444', letterSpacing:'.12em', textTransform:'uppercase', margin:'0 0 12px'}}>Recent Import Batches</p>
          <div style={{border:'1px solid #1e1e1e', borderRadius:'8px', overflow:'hidden'}}>
            <table style={{width:'100%', borderCollapse:'collapse', fontSize:'12px'}}>
              <thead>
                <tr>
                  <th style={{padding:'8px 12px', background:'#111', color:'#888', fontWeight:700, textAlign:'left', borderBottom:'2px solid #333', fontSize:'10px', textTransform:'uppercase', letterSpacing:'.04em'}}>Batch</th>
                  <th style={{padding:'8px 12px', background:'#111', color:'#888', fontWeight:700, textAlign:'left', borderBottom:'2px solid #333', fontSize:'10px', textTransform:'uppercase', letterSpacing:'.04em'}}>Source</th>
                  <th style={{padding:'8px 12px', background:'#111', color:'#888', fontWeight:700, textAlign:'left', borderBottom:'2px solid #333', fontSize:'10px', textTransform:'uppercase', letterSpacing:'.04em'}}>File</th>
                  <th style={{padding:'8px 12px', background:'#111', color:'#888', fontWeight:700, textAlign:'center', borderBottom:'2px solid #333', fontSize:'10px', textTransform:'uppercase', letterSpacing:'.04em'}}>Leads</th>
                  <th style={{padding:'8px 12px', background:'#111', color:'#888', fontWeight:700, textAlign:'left', borderBottom:'2px solid #333', fontSize:'10px', textTransform:'uppercase', letterSpacing:'.04em'}}>Date</th>
                  <th style={{padding:'8px 12px', background:'#111', color:'#888', fontWeight:700, textAlign:'center', borderBottom:'2px solid #333', fontSize:'10px', textTransform:'uppercase', letterSpacing:'.04em'}}>Actions</th>
                </tr>
              </thead>
              <tbody>
                {recentBatches.map(b => (
                  <tr key={b.id} style={{borderBottom:'1px solid #1a1a1a'}}>
                    <td style={{padding:'8px 12px', color:'#fff', fontWeight:600}}>{b.label}</td>
                    <td style={{padding:'8px 12px'}}><span style={{fontSize:'10px', padding:'2px 8px', borderRadius:'4px', background:'rgba(0,240,255,.1)', color:'#00F0FF', fontWeight:700}}>{SOURCE_TYPES.find(s=>s.value===b.source_type)?.label || b.source_type}</span></td>
                    <td style={{padding:'8px 12px', color:'#666', fontSize:'11px'}}>{b.filename || '—'}</td>
                    <td style={{padding:'8px 12px', textAlign:'center', color:'#fff', fontFamily:'monospace', fontWeight:700}}>{b.lead_count}</td>
                    <td style={{padding:'8px 12px', color:'#666', fontSize:'11px'}}>{new Date(b.created_at).toLocaleDateString('en-CA')}</td>
                    <td style={{padding:'8px 12px', textAlign:'center'}}>
                      <button onClick={()=>deleteBatch(b)} style={{background:'none', border:'none', color:'#ff4444', cursor:'pointer', fontSize:'11px', fontWeight:700}}>Delete Batch</button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
};

/* ══════════════════════════════════════════════════════
   LEAD ASSIGNMENT TOOL (Director Dashboard tab)
══════════════════════════════════════════════════════ */
/* ══════════════════════════════════════════════════════
   ALL LEADS TABLE — Full spreadsheet-style view for directors
══════════════════════════════════════════════════════ */
const AllLeadsTable = ({ reps }) => {
  const [leads, setLeads] = useState([]);
  const [callLogs, setCallLogs] = useState({});
  const [loading, setLoading] = useState(true);
  const [sortCol, setSortCol] = useState('business_name');
  const [sortDir, setSortDir] = useState('asc');
  const [filterNiche, setFilterNiche] = useState('all');
  const [filterStatus, setFilterStatus] = useState('all');
  const [filterPriority, setFilterPriority] = useState('all');
  const [filterRep, setFilterRep] = useState('all');
  const [filterSource, setFilterSource] = useState('all');
  const [filterBatch, setFilterBatch] = useState('all');
  const [search, setSearch] = useState('');
  const [page, setPage] = useState(0);
  const [editingLead, setEditingLead] = useState(null);
  const [saving, setSaving] = useState(false);
  const [deleting, setDeleting] = useState(null);
  const [groupBy, setGroupBy] = useState('none'); // none, niche, source_tag, city, priority, batch
  const [collapsedGroups, setCollapsedGroups] = useState(new Set());
  const [batches, setBatches] = useState([]);
  const PAGE_SIZE = 100;

  useEffect(() => { loadAll(); }, []);

  const loadAll = async () => {
    setLoading(true);
    let allLeads = [], from = 0;
    while (true) {
      const { data, error } = await sb.from('leads').select('*, reps(name)').order('created_at', { ascending: false }).range(from, from + 999);
      if (error || !data || data.length === 0) break;
      allLeads = allLeads.concat(data);
      if (data.length < 1000) break;
      from += 1000;
    }
    setLeads(allLeads);
    // Load latest call log per lead
    let allLogs = [], logFrom = 0;
    while (true) {
      const { data } = await sb.from('call_logs').select('*, reps:rep_id(name)').order('created_at', { ascending: false }).range(logFrom, logFrom + 999);
      if (!data || data.length === 0) break;
      allLogs = allLogs.concat(data);
      if (data.length < 1000) break;
      logFrom += 1000;
    }
    const logMap = {};
    allLogs.forEach(log => {
      if (!logMap[log.lead_id]) logMap[log.lead_id] = log;
    });
    setCallLogs(logMap);
    // Load batches for filter dropdown
    const { data: batchData } = await sb.from('import_batches').select('id, label, source_type, created_at').order('created_at', { ascending: false });
    setBatches(batchData || []);
    setLoading(false);
  };

  const handleSort = (col) => {
    if (sortCol === col) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
    else { setSortCol(col); setSortDir('asc'); }
    setPage(0);
  };

  // Derive unique source tags and sources from loaded leads
  const uniqueSources = [...new Set(leads.map(l => l.source).filter(Boolean))];
  const uniqueSourceTags = [...new Set(leads.map(l => l.source_tag).filter(Boolean))].sort();

  const filtered = leads
    .filter(l => filterNiche === 'all' || l.niche === filterNiche)
    .filter(l => filterStatus === 'all' || l.status === filterStatus)
    .filter(l => filterPriority === 'all' || l.priority === filterPriority)
    .filter(l => filterRep === 'all' || (filterRep === 'unassigned' ? !l.assigned_rep_id : l.assigned_rep_id === filterRep))
    .filter(l => filterSource === 'all' || l.source_tag === filterSource)
    .filter(l => filterBatch === 'all' || l.batch_id === filterBatch)
    .filter(l => !search || l.business_name?.toLowerCase().includes(search.toLowerCase()) || l.contact_name?.toLowerCase().includes(search.toLowerCase()) || l.phone?.includes(search) || l.city?.toLowerCase().includes(search.toLowerCase()) || l.source_tag?.toLowerCase().includes(search.toLowerCase()));

  const sorted = [...filtered].sort((a, b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (sortCol === 'assigned_rep') { va = a.reps?.name || ''; vb = b.reps?.name || ''; }
    if (sortCol === 'last_outcome') { va = callLogs[a.id]?.outcome || ''; vb = callLogs[b.id]?.outcome || ''; }
    if (sortCol === 'callback_date') { va = callLogs[a.id]?.callback_date || ''; vb = callLogs[b.id]?.callback_date || ''; }
    if (va == null) va = '';
    if (vb == null) vb = '';
    if (typeof va === 'number' && typeof vb === 'number') return sortDir === 'asc' ? va - vb : vb - va;
    return sortDir === 'asc' ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
  });

  // Group logic
  const getGroupKey = (lead) => {
    if (groupBy === 'niche') return lead.niche || 'Unknown';
    if (groupBy === 'source_tag') return lead.source_tag || 'No Source Tag';
    if (groupBy === 'city') return lead.city || 'Unknown City';
    if (groupBy === 'priority') return lead.priority || 'Unknown';
    return 'all';
  };

  const toggleGroup = (key) => {
    setCollapsedGroups(prev => {
      const next = new Set(prev);
      if (next.has(key)) next.delete(key); else next.add(key);
      return next;
    });
  };

  // Build grouped data for rendering
  const groups = groupBy !== 'none' ? (() => {
    const map = {};
    sorted.forEach(lead => {
      const key = getGroupKey(lead);
      if (!map[key]) map[key] = [];
      map[key].push(lead);
    });
    return Object.entries(map).sort((a, b) => b[1].length - a[1].length); // largest groups first
  })() : null;

  const paged = groupBy === 'none' ? sorted.slice(page * PAGE_SIZE, (page + 1) * PAGE_SIZE) : [];
  const totalPages = groupBy === 'none' ? Math.ceil(sorted.length / PAGE_SIZE) : 0;

  const groupColorMap = { HOT:'#ff6060', HIGH:'#F59E0B', MEDIUM:'#888' };

  const statusLabels = { new:'New', contacted:'Contacted', callback:'Callback', not_interested:'Not Interested', booked:'Booked', discovery_completed:'Discovery Done', no_show:'No Show', wrong_number:'Wrong Number', voicemail:'Voicemail' };
  const statusColors = { new:'#00F0FF', contacted:'#F59E0B', callback:'#F59E0B', not_interested:'#ff6060', booked:'#22c55e', discovery_completed:'#00F0FF', no_show:'#ff8800', wrong_number:'#ff6060', voicemail:'#888' };

  const thStyle = (col) => ({
    padding:'6px 12px', textAlign:'left', fontSize:'11px', fontWeight:700, letterSpacing:'.02em',
    color: sortCol === col ? '#00F0FF' : '#c0c0c0', cursor:'pointer', whiteSpace:'nowrap',
    borderBottom:'2px solid #333', borderRight:'1px solid #1a1a1a',
    background:'#111', position:'sticky', top:0, zIndex:1, userSelect:'none',
  });
  const tdStyle = { padding:'5px 12px', borderBottom:'1px solid #1a1a1a', borderRight:'1px solid #141414', fontSize:'12px', whiteSpace:'nowrap', color:'#ddd' };
  const rowNumStyle = { ...tdStyle, color:'#555', textAlign:'center', fontFamily:'monospace', fontSize:'11px', fontWeight:600, width:'40px', minWidth:'40px', background:'#0c0c0c', borderRight:'2px solid #222' };

  const saveLead = async (formData) => {
    setSaving(true);
    if (formData.id) {
      const { id, reps: _, created_at, updated_at, ...updates } = formData;
      await sb.from('leads').update(updates).eq('id', id);
    } else {
      const { id, reps: _, ...newLead } = formData;
      await sb.from('leads').insert(newLead);
    }
    setEditingLead(null);
    setSaving(false);
    await loadAll();
  };

  const deleteLead = async (id) => {
    setDeleting(id);
    await sb.from('call_logs').delete().eq('lead_id', id);
    await sb.from('lead_assignments').delete().eq('lead_id', id);
    await sb.from('leads').delete().eq('id', id);
    setDeleting(null);
    setLeads(prev => prev.filter(l => l.id !== id));
  };

  const EDITABLE_FIELDS = [
    { key:'business_name', label:'Business Name', required: true },
    { key:'contact_name', label:'Contact Name' },
    { key:'niche', label:'Niche', required: true },
    { key:'category', label:'Category' },
    { key:'city', label:'City' },
    { key:'address', label:'Address' },
    { key:'phone', label:'Phone' },
    { key:'website', label:'Website' },
    { key:'email', label:'Email' },
    { key:'instagram', label:'Instagram' },
    { key:'google_reviews', label:'Reviews', type:'number' },
    { key:'rating', label:'Rating', type:'number' },
    { key:'priority', label:'Priority', type:'select', options:['HOT','HIGH','MEDIUM'] },
    { key:'status', label:'Status', type:'select', options: Object.keys(statusLabels) },
    { key:'outreach_channel', label:'Outreach Channel' },
    { key:'notes', label:'Notes', type:'textarea' },
    { key:'source_tag', label:'Source Tag' },
    { key:'assigned_rep_id', label:'Assigned Rep', type:'select', options: reps.map(r=>({value:r.id, label:r.name})) },
  ];

  const LeadModal = ({ lead, onSave, onClose }) => {
    const [form, setForm] = useState(lead || { business_name:'', niche:'', priority:'HOT', status:'new', source:'manual' });
    const set = (k, v) => setForm(prev => ({...prev, [k]: v}));
    const inputStyle = { width:'100%', background:'#1a1a1a', border:'1px solid #333', borderRadius:'4px', padding:'8px 10px', color:'#fff', fontSize:'13px', fontFamily:'Inter,sans-serif', outline:'none' };
    return (
      <div style={{position:'fixed', inset:0, background:'rgba(0,0,0,.7)', zIndex:999, display:'flex', alignItems:'center', justifyContent:'center'}} onClick={onClose}>
        <div style={{background:'#111', border:'1px solid #333', borderRadius:'8px', padding:'24px', width:'600px', maxHeight:'80vh', overflowY:'auto'}} onClick={e=>e.stopPropagation()}>
          <h3 style={{margin:'0 0 16px', fontSize:'16px', color:'#fff', fontFamily:'Inter,sans-serif'}}>{lead?.id ? 'Edit Lead' : 'Add Lead'}</h3>
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'10px'}}>
            {EDITABLE_FIELDS.map(f => (
              <div key={f.key} style={{gridColumn: f.type==='textarea' ? '1 / -1' : undefined}}>
                <label style={{display:'block', fontSize:'10px', color:'#888', fontWeight:700, marginBottom:'3px', textTransform:'uppercase', letterSpacing:'.05em'}}>{f.label}{f.required ? ' *' : ''}</label>
                {f.type === 'select' ? (
                  <select value={form[f.key] || ''} onChange={e=>set(f.key, e.target.value || null)} style={inputStyle}>
                    <option value="">—</option>
                    {(Array.isArray(f.options) ? f.options : []).map(o => typeof o === 'object'
                      ? <option key={o.value} value={o.value}>{o.label}</option>
                      : <option key={o} value={o}>{f.key==='status' ? statusLabels[o] : o}</option>
                    )}
                  </select>
                ) : f.type === 'textarea' ? (
                  <textarea value={form[f.key] || ''} onChange={e=>set(f.key, e.target.value)} style={{...inputStyle, minHeight:'60px', resize:'vertical'}}/>
                ) : (
                  <input type={f.type || 'text'} value={form[f.key] ?? ''} onChange={e=>set(f.key, f.type==='number' ? (e.target.value ? Number(e.target.value) : null) : e.target.value)} style={inputStyle}/>
                )}
              </div>
            ))}
          </div>
          <div style={{display:'flex', gap:'8px', marginTop:'16px', justifyContent:'flex-end'}}>
            <button onClick={onClose} style={{padding:'8px 20px', borderRadius:'4px', border:'1px solid #333', background:'transparent', color:'#888', cursor:'pointer', fontSize:'12px', fontWeight:600}}>Cancel</button>
            <button onClick={()=>onSave(form)} disabled={saving || !form.business_name || !form.niche} style={{padding:'8px 20px', borderRadius:'4px', border:'none', background:'#00F0FF', color:'#000', cursor: saving?'wait':'pointer', fontSize:'12px', fontWeight:700, opacity: saving?.6:1}}>{saving ? 'Saving...' : (lead?.id ? 'Save Changes' : 'Add Lead')}</button>
          </div>
        </div>
      </div>
    );
  };

  if (loading) return <div style={{display:'flex', alignItems:'center', justifyContent:'center', padding:'60px 0'}}><svg style={{animation:'spin 1s linear infinite'}} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#00F0FF" strokeWidth="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg></div>;

  return (
    <div className="fadein">
      {editingLead !== null && <LeadModal lead={editingLead.id ? editingLead : null} onSave={saveLead} onClose={()=>setEditingLead(null)}/>}

      {/* Summary Cards */}
      <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(120px, 1fr))', gap:'8px', marginBottom:'16px'}}>
        <div className="card-glow" style={{padding:'12px 14px', textAlign:'center'}}>
          <p style={{margin:0, fontSize:'22px', fontWeight:900, color:'#fff', fontFamily:'monospace'}}>{leads.length}</p>
          <p style={{margin:'2px 0 0', fontSize:'9px', color:'#444', fontWeight:700, letterSpacing:'.1em', textTransform:'uppercase'}}>Total Leads</p>
        </div>
        <div className="card-glow" style={{padding:'12px 14px', textAlign:'center'}}>
          <p style={{margin:0, fontSize:'22px', fontWeight:900, color:'#22c55e', fontFamily:'monospace'}}>{leads.filter(l=>l.status==='booked').length}</p>
          <p style={{margin:'2px 0 0', fontSize:'9px', color:'#444', fontWeight:700, letterSpacing:'.1em', textTransform:'uppercase'}}>Booked</p>
        </div>
        <div className="card-glow" style={{padding:'12px 14px', textAlign:'center'}}>
          <p style={{margin:0, fontSize:'22px', fontWeight:900, color:'#F59E0B', fontFamily:'monospace'}}>{leads.filter(l=>l.status==='callback').length}</p>
          <p style={{margin:'2px 0 0', fontSize:'9px', color:'#444', fontWeight:700, letterSpacing:'.1em', textTransform:'uppercase'}}>Callbacks</p>
        </div>
        <div className="card-glow" style={{padding:'12px 14px', textAlign:'center'}}>
          <p style={{margin:0, fontSize:'22px', fontWeight:900, color:'#ff6060', fontFamily:'monospace'}}>{leads.filter(l=>l.priority==='HOT').length}</p>
          <p style={{margin:'2px 0 0', fontSize:'9px', color:'#444', fontWeight:700, letterSpacing:'.1em', textTransform:'uppercase'}}>HOT Leads</p>
        </div>
        <div className="card-glow" style={{padding:'12px 14px', textAlign:'center'}}>
          <p style={{margin:0, fontSize:'22px', fontWeight:900, color:'#ff8800', fontFamily:'monospace'}}>{leads.filter(l=>l.status==='no_show').length}</p>
          <p style={{margin:'2px 0 0', fontSize:'9px', color:'#444', fontWeight:700, letterSpacing:'.1em', textTransform:'uppercase'}}>No Shows</p>
        </div>
        <div className="card-glow" style={{padding:'12px 14px', textAlign:'center'}}>
          <p style={{margin:0, fontSize:'22px', fontWeight:900, color:'#00F0FF', fontFamily:'monospace'}}>{leads.filter(l=>l.status==='discovery_completed').length}</p>
          <p style={{margin:'2px 0 0', fontSize:'9px', color:'#444', fontWeight:700, letterSpacing:'.1em', textTransform:'uppercase'}}>Discoveries</p>
        </div>
        <div className="card-glow" style={{padding:'12px 14px', textAlign:'center'}}>
          <p style={{margin:0, fontSize:'22px', fontWeight:900, color:'#F59E0B', fontFamily:'monospace'}}>{leads.filter(l=>!l.assigned_rep_id).length}</p>
          <p style={{margin:'2px 0 0', fontSize:'9px', color:'#444', fontWeight:700, letterSpacing:'.1em', textTransform:'uppercase'}}>Unassigned</p>
        </div>
      </div>

      {/* Filters Row 1 */}
      <div style={{display:'flex', gap:'8px', marginBottom:'8px', flexWrap:'wrap', alignItems:'center'}}>
        <input value={search} onChange={e=>{setSearch(e.target.value);setPage(0);}} placeholder="Search name, phone, city, source..." className="field" style={{maxWidth:'240px', padding:'8px 12px', fontSize:'12px'}}/>
        <select value={filterNiche} onChange={e=>{setFilterNiche(e.target.value);setPage(0);}} className="field" style={{maxWidth:'150px', padding:'8px 12px', fontSize:'12px'}}>
          <option value="all">All Niches</option>
          {NICHE_LIST.map(n => <option key={n} value={n}>{n}</option>)}
        </select>
        <select value={filterPriority} onChange={e=>{setFilterPriority(e.target.value);setPage(0);}} className="field" style={{maxWidth:'120px', padding:'8px 12px', fontSize:'12px'}}>
          <option value="all">All Priority</option>
          <option value="HOT">HOT</option>
          <option value="HIGH">HIGH</option>
          <option value="MEDIUM">MEDIUM</option>
        </select>
        <select value={filterStatus} onChange={e=>{setFilterStatus(e.target.value);setPage(0);}} className="field" style={{maxWidth:'140px', padding:'8px 12px', fontSize:'12px'}}>
          <option value="all">All Status</option>
          {Object.entries(statusLabels).map(([k,v]) => <option key={k} value={k}>{v}</option>)}
        </select>
        <select value={filterRep} onChange={e=>{setFilterRep(e.target.value);setPage(0);}} className="field" style={{maxWidth:'150px', padding:'8px 12px', fontSize:'12px'}}>
          <option value="all">All Reps</option>
          <option value="unassigned">Unassigned</option>
          {reps.filter(r=>r.role!=='director').map(r => <option key={r.id} value={r.id}>{r.name}</option>)}
        </select>
        <button onClick={()=>setEditingLead({})} style={{marginLeft:'auto', padding:'6px 16px', borderRadius:'4px', border:'none', background:'#00F0FF', color:'#000', cursor:'pointer', fontSize:'11px', fontWeight:800, fontFamily:'Inter,sans-serif'}}>+ Add Lead</button>
        <span style={{fontSize:'12px', color:'#444', fontFamily:'monospace'}}>{sorted.length} results</span>
      </div>
      {/* Filters Row 2 — Source + Batch + Group By */}
      <div style={{display:'flex', gap:'8px', marginBottom:'14px', flexWrap:'wrap', alignItems:'center'}}>
        <select value={filterSource} onChange={e=>{setFilterSource(e.target.value);setPage(0);}} className="field" style={{maxWidth:'180px', padding:'8px 12px', fontSize:'12px'}}>
          <option value="all">All Sources</option>
          {uniqueSourceTags.map(t => <option key={t} value={t}>{t}</option>)}
        </select>
        <select value={filterBatch} onChange={e=>{setFilterBatch(e.target.value);setPage(0);}} className="field" style={{maxWidth:'220px', padding:'8px 12px', fontSize:'12px'}}>
          <option value="all">All Batches</option>
          {batches.map(b => <option key={b.id} value={b.id}>{b.label} ({new Date(b.created_at).toLocaleDateString('en-CA')})</option>)}
        </select>
        <div style={{display:'flex', alignItems:'center', gap:'4px', marginLeft:'8px'}}>
          <span style={{fontSize:'10px', color:'#555', fontWeight:700, textTransform:'uppercase', letterSpacing:'.06em'}}>Group:</span>
          {[['none','None'],['niche','Niche'],['source_tag','Source'],['city','City'],['priority','Priority']].map(([val, label]) => (
            <button key={val} onClick={()=>{setGroupBy(val);setCollapsedGroups(new Set());setPage(0);}}
              style={{padding:'4px 10px', borderRadius:'4px', fontSize:'10px', fontWeight:700, cursor:'pointer', border: groupBy===val ? '1px solid #00F0FF' : '1px solid #222', background: groupBy===val ? 'rgba(0,240,255,.1)' : 'transparent', color: groupBy===val ? '#00F0FF' : '#555', transition:'all .15s'}}>
              {label}
            </button>
          ))}
        </div>
      </div>

      {/* Spreadsheet Table */}
      <div style={{overflowX:'auto', border:'1px solid #333', borderRadius:'4px', maxHeight:'70vh', overflowY:'auto', background:'#0e0e0e'}}>
        <table style={{width:'100%', borderCollapse:'collapse', fontSize:'12px', minWidth:'1300px'}}>
          <thead>
            <tr>
              <th style={{...thStyle('_'), cursor:'default', width:'40px', minWidth:'40px', textAlign:'center', borderRight:'2px solid #333'}}>#</th>
              <th onClick={()=>handleSort('business_name')} style={thStyle('business_name')}>Business {sortCol==='business_name' ? (sortDir==='asc'?'↑':'↓') : ''}</th>
              <th onClick={()=>handleSort('contact_name')} style={thStyle('contact_name')}>Contact {sortCol==='contact_name' ? (sortDir==='asc'?'↑':'↓') : ''}</th>
              <th onClick={()=>handleSort('niche')} style={thStyle('niche')}>Niche {sortCol==='niche' ? (sortDir==='asc'?'↑':'↓') : ''}</th>
              <th onClick={()=>handleSort('city')} style={thStyle('city')}>City {sortCol==='city' ? (sortDir==='asc'?'↑':'↓') : ''}</th>
              <th onClick={()=>handleSort('phone')} style={thStyle('phone')}>Phone {sortCol==='phone' ? (sortDir==='asc'?'↑':'↓') : ''}</th>
              <th onClick={()=>handleSort('website')} style={thStyle('website')}>Website {sortCol==='website' ? (sortDir==='asc'?'↑':'↓') : ''}</th>
              <th onClick={()=>handleSort('email')} style={thStyle('email')}>Email {sortCol==='email' ? (sortDir==='asc'?'↑':'↓') : ''}</th>
              <th onClick={()=>handleSort('google_reviews')} style={thStyle('google_reviews')}>Reviews {sortCol==='google_reviews' ? (sortDir==='asc'?'↑':'↓') : ''}</th>
              <th onClick={()=>handleSort('rating')} style={thStyle('rating')}>Rating {sortCol==='rating' ? (sortDir==='asc'?'↑':'↓') : ''}</th>
              <th onClick={()=>handleSort('priority')} style={thStyle('priority')}>Priority {sortCol==='priority' ? (sortDir==='asc'?'↑':'↓') : ''}</th>
              <th onClick={()=>handleSort('status')} style={thStyle('status')}>Status {sortCol==='status' ? (sortDir==='asc'?'↑':'↓') : ''}</th>
              <th onClick={()=>handleSort('assigned_rep')} style={thStyle('assigned_rep')}>Assigned {sortCol==='assigned_rep' ? (sortDir==='asc'?'↑':'↓') : ''}</th>
              <th onClick={()=>handleSort('last_outcome')} style={thStyle('last_outcome')}>Last Call {sortCol==='last_outcome' ? (sortDir==='asc'?'↑':'↓') : ''}</th>
              <th onClick={()=>handleSort('callback_date')} style={thStyle('callback_date')}>Callback {sortCol==='callback_date' ? (sortDir==='asc'?'↑':'↓') : ''}</th>
              <th style={{...thStyle('_'), cursor:'default', textAlign:'center', borderRight:'none', width:'80px'}}>Actions</th>
            </tr>
          </thead>
          <tbody>
            {(() => {
              const renderRow = (lead, idx, globalIdx) => {
                const lastLog = callLogs[lead.id];
                const isEven = idx % 2 === 0;
                return (
                  <tr key={lead.id} style={{background: isEven ? '#0e0e0e' : '#131313', transition:'background .1s'}}
                    onMouseEnter={e=>e.currentTarget.style.background='#1a1a1a'}
                    onMouseLeave={e=>e.currentTarget.style.background= isEven ? '#0e0e0e' : '#131313'}>
                    <td style={rowNumStyle}>{globalIdx}</td>
                    <td style={{...tdStyle, color:'#fff', fontWeight:600, maxWidth:'220px', overflow:'hidden', textOverflow:'ellipsis'}}>{lead.business_name}</td>
                    <td style={{...tdStyle, color:'#aaa', maxWidth:'140px', overflow:'hidden', textOverflow:'ellipsis'}}>{lead.contact_name || '—'}</td>
                    <td style={tdStyle}><span className="niche-badge">{lead.niche}</span></td>
                    <td style={{...tdStyle, color:'#ccc'}}>{lead.city || '—'}</td>
                    <td style={{...tdStyle, fontFamily:'monospace', fontSize:'11px'}}>{lead.phone ? <a href={`tel:${lead.phone}`} style={{color:'#00F0FF', textDecoration:'none'}}>{lead.phone}</a> : <span style={{color:'#333'}}>—</span>}</td>
                    <td style={{...tdStyle, maxWidth:'180px', overflow:'hidden', textOverflow:'ellipsis'}}>{lead.website ? <a href={lead.website.startsWith('http') ? lead.website : `https://${lead.website}`} target="_blank" rel="noopener" style={{color:'#4da6ff', textDecoration:'underline', textDecorationColor:'#4da6ff44', fontSize:'11px'}}>{lead.website.replace(/^https?:\/\/(www\.)?/,'').replace(/\/$/,'').slice(0,30)}</a> : <span style={{color:'#333'}}>—</span>}</td>
                    <td style={{...tdStyle, color:'#aaa', maxWidth:'180px', overflow:'hidden', textOverflow:'ellipsis', fontSize:'11px'}}>{lead.email ? <a href={`mailto:${lead.email}`} style={{color:'#aaa', textDecoration:'none'}}>{lead.email}</a> : <span style={{color:'#333'}}>—</span>}</td>
                    <td style={{...tdStyle, textAlign:'center', color:'#fff', fontFamily:'monospace', fontWeight:600}}>{lead.google_reviews ?? '—'}</td>
                    <td style={{...tdStyle, textAlign:'center', color: lead.rating >= 4.5 ? '#22c55e' : lead.rating >= 4.0 ? '#F59E0B' : lead.rating ? '#ff6060' : '#333', fontFamily:'monospace', fontWeight:600}}>{lead.rating ?? '—'}</td>
                    <td style={{...tdStyle, textAlign:'center'}}><span className={`priority-${lead.priority.toLowerCase()}`}>{lead.priority}</span></td>
                    <td style={{...tdStyle, textAlign:'center'}}><span style={{fontSize:'10px', padding:'2px 8px', borderRadius:'4px', fontWeight:700, background: `${statusColors[lead.status] || '#555'}20`, color: statusColors[lead.status] || '#555'}}>{statusLabels[lead.status] || lead.status}</span></td>
                    <td style={{...tdStyle, color: lead.reps?.name ? '#00F0FF' : '#444', fontSize:'11px'}}>{lead.reps?.name || 'Unassigned'}</td>
                    <td style={tdStyle}>{lastLog ? <span style={{fontSize:'10px', color: OUTCOME_COLORS[lastLog.outcome] || '#555', fontWeight:600}}>{OUTCOME_LABELS[lastLog.outcome]}</span> : <span style={{color:'#333'}}>—</span>}</td>
                    <td style={{...tdStyle, fontFamily:'monospace', fontSize:'11px', color: lastLog?.callback_date ? (new Date(lastLog.callback_date) < new Date().setHours(0,0,0,0) ? '#ff6060' : '#F59E0B') : '#333'}}>{lastLog?.callback_date || '—'}</td>
                    <td style={{...tdStyle, borderRight:'none', textAlign:'center', whiteSpace:'nowrap'}}>
                      <button onClick={()=>setEditingLead(lead)} style={{background:'none', border:'none', color:'#00F0FF', cursor:'pointer', fontSize:'11px', fontWeight:700, padding:'2px 6px', marginRight:'4px'}} title="Edit">Edit</button>
                      <button onClick={()=>{if(confirm(`Delete "${lead.business_name}"?`)) deleteLead(lead.id);}} disabled={deleting===lead.id} style={{background:'none', border:'none', color:'#ff4444', cursor: deleting===lead.id?'wait':'pointer', fontSize:'11px', fontWeight:700, padding:'2px 6px', opacity: deleting===lead.id?.4:1}} title="Delete">Del</button>
                    </td>
                  </tr>
                );
              };

              if (groupBy === 'none') {
                return paged.map((lead, idx) => renderRow(lead, idx, page * PAGE_SIZE + idx + 1));
              }

              // Grouped view
              let globalIdx = 0;
              return groups.map(([groupKey, groupLeads]) => {
                const isCollapsed = collapsedGroups.has(groupKey);
                const hotCount = groupLeads.filter(l => l.priority === 'HOT').length;
                const bookedCount = groupLeads.filter(l => l.status === 'booked').length;
                const groupRows = [];

                // Group header row
                groupRows.push(
                  <tr key={`group-${groupKey}`} onClick={()=>toggleGroup(groupKey)} style={{cursor:'pointer', background:'#161616', borderBottom:'2px solid #333'}}>
                    <td colSpan={16} style={{padding:'10px 14px'}}>
                      <div style={{display:'flex', alignItems:'center', gap:'10px'}}>
                        <span style={{color:'#555', fontSize:'12px', fontWeight:700, width:'16px'}}>{isCollapsed ? '>' : 'v'}</span>
                        <span style={{color: groupColorMap[groupKey] || '#00F0FF', fontSize:'13px', fontWeight:800, fontFamily:'Inter,sans-serif'}}>{groupKey}</span>
                        <span style={{color:'#fff', fontSize:'12px', fontWeight:700, fontFamily:'monospace', background:'rgba(255,255,255,.08)', padding:'2px 8px', borderRadius:'4px'}}>{groupLeads.length}</span>
                        {hotCount > 0 && <span style={{fontSize:'10px', color:'#ff6060', fontWeight:700}}>HOT: {hotCount}</span>}
                        {bookedCount > 0 && <span style={{fontSize:'10px', color:'#22c55e', fontWeight:700}}>BOOKED: {bookedCount}</span>}
                      </div>
                    </td>
                  </tr>
                );

                // Lead rows (show first 50 per group to avoid browser lag at 30K)
                if (!isCollapsed) {
                  const visibleLeads = groupLeads.slice(0, 50);
                  visibleLeads.forEach((lead, idx) => {
                    globalIdx++;
                    groupRows.push(renderRow(lead, idx, globalIdx));
                  });
                  if (groupLeads.length > 50) {
                    groupRows.push(
                      <tr key={`more-${groupKey}`}>
                        <td colSpan={16} style={{padding:'8px 14px', textAlign:'center', color:'#555', fontSize:'11px', fontStyle:'italic', background:'#0c0c0c', borderBottom:'1px solid #1a1a1a'}}>
                          Showing 50 of {groupLeads.length} — use filters to narrow down
                        </td>
                      </tr>
                    );
                  }
                } else {
                  globalIdx += groupLeads.length;
                }

                return groupRows;
              });
            })()}
          </tbody>
        </table>
      </div>

      {/* Pagination — only in flat view */}
      {groupBy === 'none' && totalPages > 1 && (
        <div style={{display:'flex', alignItems:'center', justifyContent:'center', gap:'8px', marginTop:'14px'}}>
          <button onClick={()=>setPage(p=>Math.max(0,p-1))} disabled={page===0}
            style={{padding:'6px 14px', borderRadius:'6px', cursor: page===0?'not-allowed':'pointer', border:'1px solid #1e1e1e', background:'transparent', color: page===0?'#333':'#888', fontSize:'11px', fontWeight:700, fontFamily:'Inter,sans-serif'}}>Prev</button>
          <span style={{fontSize:'12px', color:'#555', fontFamily:'monospace'}}>Page {page+1} of {totalPages}</span>
          <button onClick={()=>setPage(p=>Math.min(totalPages-1,p+1))} disabled={page>=totalPages-1}
            style={{padding:'6px 14px', borderRadius:'6px', cursor: page>=totalPages-1?'not-allowed':'pointer', border:'1px solid #1e1e1e', background:'transparent', color: page>=totalPages-1?'#333':'#888', fontSize:'11px', fontWeight:700, fontFamily:'Inter,sans-serif'}}>Next</button>
        </div>
      )}
      {groupBy !== 'none' && (
        <div style={{display:'flex', alignItems:'center', justifyContent:'center', gap:'12px', marginTop:'14px'}}>
          <span style={{fontSize:'12px', color:'#555', fontFamily:'monospace'}}>{groups.length} groups · {sorted.length} total leads</span>
          <button onClick={()=>setCollapsedGroups(new Set(groups.map(g=>g[0])))} style={{padding:'4px 12px', borderRadius:'4px', border:'1px solid #222', background:'transparent', color:'#555', fontSize:'10px', fontWeight:700, cursor:'pointer'}}>Collapse All</button>
          <button onClick={()=>setCollapsedGroups(new Set())} style={{padding:'4px 12px', borderRadius:'4px', border:'1px solid #222', background:'transparent', color:'#555', fontSize:'10px', fontWeight:700, cursor:'pointer'}}>Expand All</button>
        </div>
      )}
    </div>
  );
};

const LeadAssignmentTool = ({ reps, isDirector, currentRepId }) => {
  const [leads, setLeads] = useState([]);
  const [loading, setLoading] = useState(true);
  const [selected, setSelected] = useState(new Set());
  const [assignTo, setAssignTo] = useState('');
  const [filterNiche, setFilterNiche] = useState('all');
  const [filterCity, setFilterCity] = useState('all');
  const [filterPriority, setFilterPriority] = useState('all');
  const [filterStatus, setFilterStatus] = useState('all');
  const [filterSource, setFilterSource] = useState('all');
  const [filterBatch, setFilterBatch] = useState('all');
  const [filterAssignment, setFilterAssignment] = useState('unassigned');
  const [search, setSearch] = useState('');
  const [assigning, setAssigning] = useState(false);
  const [rangeInput, setRangeInput] = useState('');
  const [bulkStatus, setBulkStatus] = useState('');
  const [bulkPriority, setBulkPriority] = useState('');
  const [batches, setBatches] = useState([]);
  const [page, setPage] = useState(0);
  const PAGE_SIZE = 200;

  useEffect(() => { loadLeads(); }, []);

  const loadLeads = async () => {
    setLoading(true);
    let all = [], from = 0;
    while (true) {
      let query = sb.from('leads').select('*, reps(name)').order('google_reviews', { ascending: true });
      if (!isDirector) query = query.eq('assigned_rep_id', currentRepId);
      query = query.range(from, from + 999);
      const { data } = await query;
      if (!data || data.length === 0) break;
      all = all.concat(data);
      if (data.length < 1000) break;
      from += 1000;
    }
    setLeads(all);
    const { data: batchData } = await sb.from('import_batches').select('id, label, created_at').order('created_at', { ascending: false });
    setBatches(batchData || []);
    setLoading(false);
  };

  const handleAssign = async () => {
    if (!assignTo || selected.size === 0) return;
    setAssigning(true);
    const ids = Array.from(selected);
    for (let i = 0; i < ids.length; i += 200) {
      const chunk = ids.slice(i, i + 200);
      await sb.from('leads').update({ assigned_rep_id: assignTo }).in('id', chunk);
      for (const id of chunk) {
        await sb.from('lead_assignments').upsert({ lead_id: id, rep_id: assignTo, assigned_by: reps.find(r=>r.role==='director')?.id || assignTo }, { onConflict: 'lead_id' });
      }
    }
    setSelected(new Set());
    setAssignTo('');
    await loadLeads();
    setAssigning(false);
  };

  const handleBulkStatus = async () => {
    if (!bulkStatus || selected.size === 0) return;
    setAssigning(true);
    const ids = Array.from(selected);
    for (let i = 0; i < ids.length; i += 200) {
      await sb.from('leads').update({ status: bulkStatus }).in('id', ids.slice(i, i + 200));
    }
    setBulkStatus('');
    setSelected(new Set());
    await loadLeads();
    setAssigning(false);
  };

  const handleBulkPriority = async () => {
    if (!bulkPriority || selected.size === 0) return;
    setAssigning(true);
    const ids = Array.from(selected);
    for (let i = 0; i < ids.length; i += 200) {
      await sb.from('leads').update({ priority: bulkPriority }).in('id', ids.slice(i, i + 200));
    }
    setBulkPriority('');
    setSelected(new Set());
    await loadLeads();
    setAssigning(false);
  };

  const handleBulkDelete = async () => {
    if (selected.size === 0) return;
    if (!confirm(`Delete ${selected.size} leads? This cannot be undone.`)) return;
    setAssigning(true);
    const ids = Array.from(selected);
    for (let i = 0; i < ids.length; i += 200) {
      const chunk = ids.slice(i, i + 200);
      await sb.from('call_logs').delete().in('lead_id', chunk);
      await sb.from('lead_assignments').delete().in('lead_id', chunk);
      await sb.from('leads').delete().in('id', chunk);
    }
    setSelected(new Set());
    await loadLeads();
    setAssigning(false);
  };

  const toggleSelect = (id) => {
    setSelected(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  };

  const selectRange = () => {
    if (!rangeInput.trim()) return;
    const parts = rangeInput.split(',').map(s => s.trim());
    const newSelected = new Set(selected);
    parts.forEach(part => {
      const match = part.match(/^(\d+)\s*[-–]\s*(\d+)$/);
      if (match) {
        const start = Math.max(1, parseInt(match[1])) - 1;
        const end = Math.min(filtered.length, parseInt(match[2]));
        for (let i = start; i < end; i++) newSelected.add(filtered[i].id);
      } else {
        const idx = parseInt(part) - 1;
        if (idx >= 0 && idx < filtered.length) newSelected.add(filtered[idx].id);
      }
    });
    setSelected(newSelected);
    setRangeInput('');
  };

  const selectAllFiltered = () => setSelected(new Set(filtered.map(l => l.id)));
  const selectPage = () => {
    const newSel = new Set(selected);
    paged.forEach(l => newSel.add(l.id));
    setSelected(newSel);
  };

  const uniqueCities = [...new Set(leads.map(l => l.city).filter(Boolean))].sort();
  const uniqueSourceTags = [...new Set(leads.map(l => l.source_tag).filter(Boolean))].sort();
  const statusLabels = { new:'New', contacted:'Contacted', callback:'Callback', not_interested:'Not Interested', booked:'Booked', discovery_completed:'Discovery Done', no_show:'No Show', wrong_number:'Wrong Number', voicemail:'Voicemail' };

  const filtered = leads
    .filter(l => filterNiche === 'all' || l.niche === filterNiche)
    .filter(l => filterCity === 'all' || l.city === filterCity)
    .filter(l => filterPriority === 'all' || l.priority === filterPriority)
    .filter(l => filterStatus === 'all' || l.status === filterStatus)
    .filter(l => filterSource === 'all' || l.source_tag === filterSource)
    .filter(l => filterBatch === 'all' || l.batch_id === filterBatch)
    .filter(l => filterAssignment === 'all' ? true : filterAssignment === 'unassigned' ? !l.assigned_rep_id : l.assigned_rep_id === filterAssignment)
    .filter(l => !search || l.business_name?.toLowerCase().includes(search.toLowerCase()) || l.contact_name?.toLowerCase().includes(search.toLowerCase()) || l.phone?.includes(search) || l.city?.toLowerCase().includes(search.toLowerCase()));

  const paged = filtered.slice(page * PAGE_SIZE, (page + 1) * PAGE_SIZE);
  const totalPages = Math.ceil(filtered.length / PAGE_SIZE);

  const repLeadCounts = {};
  leads.forEach(l => { if (l.assigned_rep_id) repLeadCounts[l.assigned_rep_id] = (repLeadCounts[l.assigned_rep_id] || 0) + 1; });

  const thStyle = { padding:'8px 12px', textAlign:'left', fontSize:'11px', fontWeight:700, color:'#00F0FF', borderBottom:'2px solid #333', background:'#0a0a0a', position:'sticky', top:0, zIndex:1, whiteSpace:'nowrap', letterSpacing:'.02em' };
  const tdStyle = { padding:'6px 12px', borderBottom:'1px solid #1a1a1a', fontSize:'12px', whiteSpace:'nowrap', color:'#ddd' };
  const rowNumStyle = { ...tdStyle, color:'#555', textAlign:'center', fontFamily:'monospace', fontSize:'11px', fontWeight:600, width:'40px', background:'#0c0c0c', borderRight:'2px solid #222' };

  if (loading) return <div style={{display:'flex', alignItems:'center', justifyContent:'center', padding:'60px 0'}}><svg style={{animation:'spin 1s linear infinite'}} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#00F0FF" strokeWidth="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg></div>;

  /* ─── REP VIEW ─── */
  if (!isDirector) {
    const myLeads = leads.filter(l => l.assigned_rep_id === currentRepId);
    const callbacksDue = myLeads.filter(l => l.status === 'callback').length;
    const hotLeads = myLeads.filter(l => l.priority === 'HOT').length;
    return (
      <div className="fadein">
        <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(140px, 1fr))', gap:'10px', marginBottom:'20px'}}>
          <div className="card-glow" style={{padding:'16px', textAlign:'center'}}>
            <p style={{margin:0, fontSize:'28px', fontWeight:900, color:'#fff', fontFamily:'monospace'}}>{myLeads.length}</p>
            <p style={{margin:'4px 0 0', fontSize:'10px', color:'#888', fontWeight:700, letterSpacing:'.08em', textTransform:'uppercase'}}>Your Leads</p>
          </div>
          <div className="card-glow" style={{padding:'16px', textAlign:'center'}}>
            <p style={{margin:0, fontSize:'28px', fontWeight:900, color:'#ff6060', fontFamily:'monospace'}}>{hotLeads}</p>
            <p style={{margin:'4px 0 0', fontSize:'10px', color:'#888', fontWeight:700, letterSpacing:'.08em', textTransform:'uppercase'}}>HOT Leads</p>
          </div>
          <div className="card-glow" style={{padding:'16px', textAlign:'center'}}>
            <p style={{margin:0, fontSize:'28px', fontWeight:900, color:'#F59E0B', fontFamily:'monospace'}}>{callbacksDue}</p>
            <p style={{margin:'4px 0 0', fontSize:'10px', color:'#888', fontWeight:700, letterSpacing:'.08em', textTransform:'uppercase'}}>Callbacks Due</p>
          </div>
          <div className="card-glow" style={{padding:'16px', textAlign:'center'}}>
            <p style={{margin:0, fontSize:'28px', fontWeight:900, color:'#22c55e', fontFamily:'monospace'}}>{myLeads.filter(l=>l.status==='booked').length}</p>
            <p style={{margin:'4px 0 0', fontSize:'10px', color:'#888', fontWeight:700, letterSpacing:'.08em', textTransform:'uppercase'}}>Booked</p>
          </div>
        </div>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search your leads..." className="field" style={{maxWidth:'300px', marginBottom:'14px', padding:'10px 14px', fontSize:'13px'}}/>
        <div style={{overflowX:'auto', border:'1px solid #1e1e1e', borderRadius:'10px', maxHeight:'65vh', overflowY:'auto'}}>
          <table style={{width:'100%', borderCollapse:'collapse', fontSize:'13px'}}>
            <thead>
              <tr>
                <th style={thStyle}>#</th>
                <th style={thStyle}>Business</th>
                <th style={thStyle}>Niche</th>
                <th style={thStyle}>City</th>
                <th style={thStyle}>Phone</th>
                <th style={thStyle}>Priority</th>
                <th style={thStyle}>Status</th>
                <th style={{...thStyle, textAlign:'center'}}>Action</th>
              </tr>
            </thead>
            <tbody>
              {myLeads
                .filter(l => !search || l.business_name?.toLowerCase().includes(search.toLowerCase()) || l.city?.toLowerCase().includes(search.toLowerCase()) || l.phone?.includes(search))
                .sort((a,b) => {
                  const pOrder = {HOT:0, HIGH:1, MEDIUM:2};
                  if (pOrder[a.priority] !== pOrder[b.priority]) return (pOrder[a.priority]??3) - (pOrder[b.priority]??3);
                  return (a.google_reviews||0) - (b.google_reviews||0);
                })
                .map((lead, idx) => (
                <tr key={lead.id} style={{background: idx%2===0 ? '#0e0e0e' : '#131313'}}
                  onMouseEnter={e=>e.currentTarget.style.background='#1a1a1a'}
                  onMouseLeave={e=>e.currentTarget.style.background=idx%2===0?'#0e0e0e':'#131313'}>
                  <td style={rowNumStyle}>{idx+1}</td>
                  <td style={{...tdStyle, color:'#fff', fontWeight:600}}>{lead.business_name}</td>
                  <td style={tdStyle}><span className="niche-badge">{lead.niche}</span></td>
                  <td style={tdStyle}>{lead.city || '—'}</td>
                  <td style={{...tdStyle, fontFamily:'monospace', fontSize:'11px'}}>{lead.phone ? <a href={`tel:${lead.phone}`} style={{color:'#00F0FF', textDecoration:'none'}}>{lead.phone}</a> : '—'}</td>
                  <td style={{...tdStyle, textAlign:'center'}}><span className={`priority-${lead.priority?.toLowerCase()}`}>{lead.priority}</span></td>
                  <td style={{...tdStyle, textAlign:'center'}}><span style={{fontSize:'10px', padding:'2px 8px', borderRadius:'4px', fontWeight:700, background:'rgba(0,240,255,.08)', color:'#00F0FF'}}>{statusLabels[lead.status]||lead.status}</span></td>
                  <td style={{...tdStyle, textAlign:'center'}}><button style={{padding:'5px 14px', borderRadius:'5px', border:'none', background:'#00F0FF', color:'#000', fontSize:'11px', fontWeight:800, cursor:'pointer'}}>Log Call</button></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        {myLeads.length === 0 && <p style={{textAlign:'center', padding:'40px', color:'#555', fontSize:'14px'}}>No leads assigned to you yet. Check back soon.</p>}
      </div>
    );
  }

  /* ─── DIRECTOR VIEW ─── */
  return (
    <div className="fadein">
      {/* Rep Workload Cards */}
      <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(150px, 1fr))', gap:'10px', marginBottom:'20px'}}>
        {reps.filter(r=>r.role!=='director').map(rep => (
          <div key={rep.id} className="card" style={{padding:'14px 16px', textAlign:'center', cursor:'pointer', border: filterAssignment===rep.id ? '1px solid #00F0FF' : '1px solid #1e1e1e'}}
            onClick={()=>{ setFilterAssignment(filterAssignment===rep.id ? 'all' : rep.id); setPage(0); }}>
            <p style={{margin:0, fontSize:'13px', fontWeight:700, color:'#fff'}}>{rep.name}</p>
            <p style={{margin:'4px 0 0', fontSize:'22px', fontWeight:900, color:'#00F0FF', fontFamily:'monospace'}}>{repLeadCounts[rep.id] || 0}</p>
            <p style={{margin:'2px 0 0', fontSize:'9px', color:'#444', fontWeight:700, letterSpacing:'.1em', textTransform:'uppercase'}}>Leads</p>
          </div>
        ))}
        <div className="card" style={{padding:'14px 16px', textAlign:'center', cursor:'pointer', border: filterAssignment==='unassigned' ? '1px solid #F59E0B' : '1px solid #1e1e1e'}}
          onClick={()=>{ setFilterAssignment(filterAssignment==='unassigned' ? 'all' : 'unassigned'); setPage(0); }}>
          <p style={{margin:0, fontSize:'13px', fontWeight:700, color:'#888'}}>Unassigned</p>
          <p style={{margin:'4px 0 0', fontSize:'22px', fontWeight:900, color:'#F59E0B', fontFamily:'monospace'}}>{leads.filter(l=>!l.assigned_rep_id).length}</p>
          <p style={{margin:'2px 0 0', fontSize:'9px', color:'#444', fontWeight:700, letterSpacing:'.1em', textTransform:'uppercase'}}>Leads</p>
        </div>
      </div>

      {/* Bulk Action Bar */}
      {selected.size > 0 && (
        <div className="card-glow fadein" style={{padding:'14px 18px', marginBottom:'16px', display:'flex', alignItems:'center', gap:'10px', flexWrap:'wrap'}}>
          <span style={{fontSize:'14px', fontWeight:800, color:'#fff', fontFamily:'monospace'}}>{selected.size}</span>
          <span style={{fontSize:'12px', color:'#888', fontWeight:600}}>selected</span>
          <div style={{width:'1px', height:'20px', background:'#333', margin:'0 4px'}}/>
          <select value={assignTo} onChange={e=>setAssignTo(e.target.value)} className="field" style={{maxWidth:'160px', padding:'6px 10px', fontSize:'12px'}}>
            <option value="">Assign to...</option>
            {reps.filter(r=>r.role!=='director').map(r => <option key={r.id} value={r.id}>{r.name}</option>)}
          </select>
          <button onClick={handleAssign} disabled={!assignTo || assigning}
            style={{padding:'6px 16px', borderRadius:'5px', cursor: assignTo?'pointer':'not-allowed', border:'none', background: assignTo?'#00F0FF':'#1e1e1e', color: assignTo?'#000':'#444', fontWeight:800, fontSize:'11px', letterSpacing:'.04em'}}>{assigning ? 'Assigning...' : 'Assign'}</button>
          <div style={{width:'1px', height:'20px', background:'#333', margin:'0 4px'}}/>
          <select value={bulkStatus} onChange={e=>setBulkStatus(e.target.value)} className="field" style={{maxWidth:'140px', padding:'6px 10px', fontSize:'12px'}}>
            <option value="">Set status...</option>
            {Object.entries(statusLabels).map(([k,v]) => <option key={k} value={k}>{v}</option>)}
          </select>
          <button onClick={handleBulkStatus} disabled={!bulkStatus || assigning} style={{padding:'6px 12px', borderRadius:'5px', cursor: bulkStatus?'pointer':'not-allowed', border:'1px solid #333', background:'transparent', color: bulkStatus?'#F59E0B':'#333', fontWeight:700, fontSize:'10px'}}>Apply</button>
          <select value={bulkPriority} onChange={e=>setBulkPriority(e.target.value)} className="field" style={{maxWidth:'120px', padding:'6px 10px', fontSize:'12px'}}>
            <option value="">Set priority...</option>
            <option value="HOT">HOT</option>
            <option value="HIGH">HIGH</option>
            <option value="MEDIUM">MEDIUM</option>
          </select>
          <button onClick={handleBulkPriority} disabled={!bulkPriority || assigning} style={{padding:'6px 12px', borderRadius:'5px', cursor: bulkPriority?'pointer':'not-allowed', border:'1px solid #333', background:'transparent', color: bulkPriority?'#F59E0B':'#333', fontWeight:700, fontSize:'10px'}}>Apply</button>
          <div style={{width:'1px', height:'20px', background:'#333', margin:'0 4px'}}/>
          <button onClick={handleBulkDelete} disabled={assigning} style={{padding:'6px 12px', borderRadius:'5px', cursor:'pointer', border:'1px solid #ff4444', background:'transparent', color:'#ff4444', fontWeight:700, fontSize:'10px'}}>Delete</button>
          <button onClick={()=>setSelected(new Set())} style={{padding:'6px 12px', borderRadius:'5px', cursor:'pointer', border:'1px solid #222', background:'transparent', color:'#555', fontWeight:700, fontSize:'10px', marginLeft:'auto'}}>Clear Selection</button>
        </div>
      )}

      {/* Filters Row 1 */}
      <div style={{display:'flex', gap:'8px', marginBottom:'8px', flexWrap:'wrap', alignItems:'center'}}>
        <input value={search} onChange={e=>{setSearch(e.target.value);setPage(0);}} placeholder="Search name, phone, city..." className="field" style={{maxWidth:'220px', padding:'8px 12px', fontSize:'12px'}}/>
        <select value={filterNiche} onChange={e=>{setFilterNiche(e.target.value);setPage(0);}} className="field" style={{maxWidth:'150px', padding:'8px 12px', fontSize:'12px'}}>
          <option value="all">All Niches</option>
          {NICHE_LIST.map(n => <option key={n} value={n}>{n}</option>)}
