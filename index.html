<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Premmisus — Sales Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Roboto:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com/3.4.1"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { accent: '#00F0FF' }, fontFamily: { sans: ['Inter','sans-serif'], body: ['Roboto','system-ui','sans-serif'], mono: ['JetBrains Mono','monospace'] } } },
    };
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; background: #000; font-family: 'Roboto', system-ui, sans-serif; color: #fff; }
    h1, h2, h3 { font-family: 'Inter', sans-serif; }
    .tag, .tag-red, .rep-label, .sech h3, .mistake-label, .plabel, .if-label, .dot, .rep-label { font-family: 'JetBrains Mono', monospace; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0a0a0a; }
    ::-webkit-scrollbar-thumb { background: rgba(0,240,255,.25); border-radius: 2px; }

    .card {
      background: #0d0d0d; border: 1px solid #1e1e1e; border-radius: 12px;
      transition: border-color .2s, box-shadow .2s;
    }
    .card:hover { border-color: rgba(0,240,255,.22); box-shadow: 0 0 28px rgba(0,240,255,.06); }

    .card-glow {
      background: #0d0d0d; border: 1px solid rgba(0,240,255,.22);
      border-radius: 12px; box-shadow: 0 0 24px rgba(0,240,255,.07);
    }

    .hub-card {
      background: #080808; border: 1px solid #1a1a1a; border-radius: 16px;
      cursor: pointer; transition: border-color .25s, box-shadow .25s, transform .2s;
      position: relative; overflow: hidden;
    }
    .hub-card:hover {
      border-color: rgba(0,240,255,.4);
      box-shadow: 0 0 48px rgba(0,240,255,.1), 0 0 0 1px rgba(0,240,255,.05);
      transform: translateY(-2px);
    }
    .hub-card::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse 80% 50% at 0% 0%, rgba(0,240,255,.04) 0%, transparent 60%);
      pointer-events: none;
    }

    .field {
      width: 100%; background: #0d0d0d; border: 1px solid #252525;
      border-radius: 8px; padding: 12px 16px; color: #fff;
      font-size: 14px; font-family: 'Roboto', sans-serif; outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .field:focus { border-color: rgba(0,240,255,.5); box-shadow: 0 0 0 3px rgba(0,240,255,.08); }
    .field::placeholder { color: #444; }

    .divider { height: 1px; background: linear-gradient(90deg, transparent, rgba(0,240,255,.35), transparent); }

    .tag {
      font-size: 10px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
      padding: 3px 10px; border-radius: 4px;
      border: 1px solid rgba(0,240,255,.4); color: #00F0FF; background: rgba(0,240,255,.05);
      display: inline-block;
    }
    .tag-red {
      font-size: 10px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
      padding: 3px 10px; border-radius: 4px;
      border: 1px solid rgba(255,80,80,.35); color: #ff8080; background: rgba(255,80,80,.06);
      display: inline-block;
    }
    .dot {
      width: 28px; height: 28px; border-radius: 50%;
      border: 1px solid rgba(0,240,255,.5); color: #00F0FF;
      font-size: 11px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      background: rgba(0,240,255,.05);
    }
    .nav-active {
      background: rgba(0,240,255,.08) !important;
      border-left: 2px solid #00F0FF !important;
      color: #00F0FF !important;
    }
    .btn-primary {
      background: #00F0FF; color: #000; font-weight: 800; font-size: 14px;
      letter-spacing: .06em; text-transform: uppercase;
      border: none; border-radius: 8px; padding: 14px 28px;
      cursor: pointer; width: 100%;
      transition: opacity .2s, box-shadow .2s; font-family: 'Inter', sans-serif;
    }
    .btn-primary:hover { opacity: .88; box-shadow: 0 0 24px rgba(0,240,255,.35); }

    .btn-back {
      background: transparent; color: #555; font-weight: 700; font-size: 11px;
      letter-spacing: .1em; text-transform: uppercase;
      border: 1px solid #1e1e1e; border-radius: 7px; padding: 7px 14px;
      cursor: pointer; transition: color .2s, border-color .2s;
      font-family: 'Inter', sans-serif; display: flex; align-items: center; gap: 7px;
    }
    .btn-back:hover { color: #00F0FF; border-color: rgba(0,240,255,.3); }

    .btn-pdf {
      background: transparent; color: #00F0FF; font-weight: 700; font-size: 12px;
      letter-spacing: .1em; text-transform: uppercase;
      border: 1px solid rgba(0,240,255,.4); border-radius: 7px; padding: 9px 18px;
      cursor: pointer; transition: background .2s, box-shadow .2s;
      font-family: 'Inter', sans-serif; display: flex; align-items: center; gap: 8px; white-space: nowrap;
    }
    .btn-pdf:hover { background: rgba(0,240,255,.08); box-shadow: 0 0 16px rgba(0,240,255,.15); }

    .rep-block {
      background: rgba(0,240,255,.05); border-left: 3px solid #00F0FF;
      border-radius: 0 8px 8px 0; padding: 13px 16px; margin: 6px 0;
    }
    .rep-label {
      font-size: 9px; font-weight: 800; letter-spacing: .22em; text-transform: uppercase;
      color: #00F0FF; display: flex; align-items: center; gap: 5px; margin-bottom: 6px;
    }
    .rep-label::before { content:''; width:5px; height:5px; border-radius:50%; background:#00F0FF; display:inline-block; }
    .rep-text { color: #f0f0f0; font-size: 14px; line-height: 1.65; font-style: italic; margin: 0; font-family: 'Roboto', sans-serif; }

    .if-branch { border-left: 2px solid rgba(0,240,255,.2); margin-left:10px; padding-left:14px; margin-top:6px; margin-bottom:4px; }
    .if-label { font-size:10px; font-weight:700; color:#4a4a4a; text-transform:uppercase; letter-spacing:.1em; display:block; margin-bottom:4px; }
    .plabel { font-size:10px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:#00F0FF; margin:12px 0 2px; padding-top:4px; display:block; }

    .sech { display:flex; align-items:center; gap:10px; margin:20px 0 10px; }
    .sech h3 { margin:0; font-size:11px; font-weight:800; letter-spacing:.18em; text-transform:uppercase; color:#00F0FF; white-space:nowrap; }
    .sech-line { flex:1; height:1px; background:linear-gradient(90deg,rgba(0,240,255,.35),transparent); }

    .mistake-block { background:rgba(255,68,68,.05); border:1px solid rgba(255,68,68,.15); border-radius:8px; padding:10px 14px; margin:6px 0; }
    .mistake-label { font-size:9px; font-weight:800; letter-spacing:.2em; text-transform:uppercase; color:#ff6060; display:block; margin-bottom:4px; }
    .mistake-text { color:#ccc; font-size:13.5px; line-height:1.6; font-style:italic; margin:0; }

    .sms-block { background:rgba(255,255,255,.02); border:1px solid #1e1e1e; border-radius:10px; padding:14px 16px; }
    .sms-bubble { background:rgba(0,240,255,.07); border:1px solid rgba(0,240,255,.15); border-radius:12px 12px 12px 3px; padding:12px 15px; color:#e0e0e0; font-size:13.5px; line-height:1.65; margin-top:8px; }

    .grid-bg {
      background-image: linear-gradient(rgba(0,240,255,.025) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0,240,255,.025) 1px, transparent 1px);
      background-size: 48px 48px;
    }
    .login-glare { background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(0,240,255,.1) 0%, transparent 70%); }

    @keyframes pulse-c { 0%,100%{opacity:1} 50%{opacity:.35} }
    .pulse { width:6px;height:6px;border-radius:50%;background:#00F0FF;animation:pulse-c 2s infinite;box-shadow:0 0 6px rgba(0,240,255,.8); }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    @keyframes fadein { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .fadein { animation: fadein .35s ease forwards; }

    /* Range sliders */
    input[type=range] {
      -webkit-appearance: none; appearance: none;
      width: 100%; height: 4px; border-radius: 2px; outline: none; cursor: pointer;
      border: none; padding: 0; margin: 4px 0;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 16px; height: 16px; border-radius: 50%;
      background: #00F0FF; cursor: pointer;
      box-shadow: 0 0 8px rgba(0,240,255,.5);
    }
    input[type=range]::-moz-range-thumb {
      width: 16px; height: 16px; border-radius: 50%;
      background: #00F0FF; cursor: pointer; border: none;
      box-shadow: 0 0 8px rgba(0,240,255,.5);
    }

    /* ── MOBILE ── */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed !important; left: -260px; top: 0; bottom: 0;
        width: 260px !important; z-index: 200; transition: left .25s ease;
        box-shadow: 4px 0 24px rgba(0,0,0,.6);
      }
      .sidebar.sidebar-open { left: 0 !important; }
      .sidebar-overlay { display: block !important; }
      .mobile-menu-btn { display: flex !important; }
      .mobile-hide { display: none !important; }
      .closes-tracker-full { display: none !important; }
      .closes-tracker-mini { display: flex !important; }
      .hub-card { min-height: auto !important; }
      .top-bar-title { display: none !important; }

      /* Chat widget mobile */
      .chat-widget { bottom: 70px !important; right: 14px !important; }
      .chat-panel { position: fixed !important; width: calc(100vw - 28px) !important; right: 14px !important; left: 14px !important; bottom: 134px !important; max-height: 55vh !important; }

      /* Home hub grid → single column */
      .hub-grid {
        grid-template-columns: 1fr !important;
        grid-template-areas:
          "coldcall"
          "scripts"
          "foundation"
          "outreach"
          "postcall"
          "ladder"
          "handoff"
          "aitools"
          "training"
          "director"
          "newupdates" !important;
        gap: 12px !important;
      }

      /* Home hero shrink */
      .hub-hero { padding: 24px 16px 20px !important; }
      .hub-hero h1 { font-size: 24px !important; }
      .hub-hero .hub-subtitle { font-size: 13px !important; }
      .hub-hero .hub-shortcuts { display: none !important; }

      /* Home header */
      .home-header { padding: 10px 14px !important; }

      /* Home footer */
      .home-footer { padding: 12px 16px !important; flex-direction: column !important; gap: 6px !important; text-align: center !important; }

      /* Section main content areas */
      .section-main { padding: 16px 14px !important; }

      /* Director dashboard grids */
      .dir-summary-grid { grid-template-columns: repeat(2, 1fr) !important; }
      .dir-rep-stats { grid-template-columns: repeat(2, 1fr) !important; }
      .dir-rep-header { flex-direction: column !important; align-items: flex-start !important; gap: 8px !important; }

      /* Rep filter mobile */
      .dir-rep-filter { flex-direction: column !important; align-items: stretch !important; }
      .dir-rep-filter select { max-width: 100% !important; }

      /* Hub card padding */
      .hub-card { padding: 20px !important; }

      /* General content padding reduction */
      .content-padded { padding-left: 14px !important; padding-right: 14px !important; }

      /* Ladder mobile */
      .ladder-grid { grid-template-columns: 1fr !important; }
      .ladder-tier-stats { flex-direction: column !important; align-items: flex-start !important; gap: 12px !important; }
    }
    @media (max-width: 480px) {
      .print-area { padding: 16px 14px !important; }
      h1, h2 { font-size: 22px !important; }
      .card, .card-glow { padding: 14px 14px !important; }
      .rep-block { padding: 10px 12px !important; }

      /* Even tighter on small phones */
      .hub-grid { gap: 10px !important; }
      .hub-card { padding: 16px !important; }
      .hub-card h2 { font-size: 17px !important; }
      .hub-card p { font-size: 12px !important; }
      .hub-hero { padding: 20px 14px 16px !important; }
      .hub-hero h1 { font-size: 20px !important; }

      /* Director stats even smaller */
      .dir-summary-grid { grid-template-columns: 1fr 1fr !important; gap: 8px !important; }
      .dir-rep-stats { grid-template-columns: 1fr 1fr !important; gap: 8px !important; }
    }
    .stack-service-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; border-radius: 8px; cursor: pointer;
      transition: background .15s;
    }
    .stack-service-row:hover { background: rgba(0,240,255,.04); }
    .win-block { background:rgba(34,197,94,.05); border:1px solid rgba(34,197,94,.15); border-radius:8px; padding:10px 14px; margin:6px 0; }
    .win-label { font-size:9px; font-weight:800; letter-spacing:.2em; text-transform:uppercase; color:#22c55e; display:block; margin-bottom:4px; font-family:'JetBrains Mono', monospace; }
    .stat-pill { background: #0d0d0d; border: 1px solid rgba(0,240,255,.2); border-radius: 8px; padding: 10px 18px; }
    @media (max-width: 768px) {
      .service-grid { grid-template-columns: 1fr !important; }
    }

    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 199; }
    .mobile-menu-btn { display: none; }

    /* ── GLOBAL SIDEBAR ── */
    .global-sidebar {
      position: fixed; left: -280px; top: 0; bottom: 0; width: 280px; z-index: 300;
      background: #050505; border-right: 1px solid #111;
      transition: left .25s ease; overflow-y: auto;
      box-shadow: 4px 0 32px rgba(0,0,0,.8);
    }
    .global-sidebar.open { left: 0; }
    .global-sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 299; }
    .global-sidebar-overlay.open { display: block; }
    .gs-category { padding: 6px 0; }
    .gs-category-label {
      display: flex; align-items: center; gap: 8px; padding: 8px 20px;
      font-size: 9px; font-weight: 800; letter-spacing: .2em; text-transform: uppercase;
      color: #444; cursor: pointer; transition: color .15s;
    }
    .gs-category-label:hover { color: #00F0FF; }
    .gs-item {
      display: flex; align-items: center; gap: 10px; padding: 9px 20px 9px 36px;
      font-size: 12px; font-weight: 600; color: #555; cursor: pointer;
      border: none; background: none; width: 100%; text-align: left;
      font-family: 'Inter', sans-serif; transition: all .15s;
    }
    .gs-item:hover { color: #00F0FF; background: rgba(0,240,255,.03); }
    .gs-item.active { color: #00F0FF; background: rgba(0,240,255,.06); border-left: 2px solid #00F0FF; }
    .hamburger-btn {
      background: none; border: 1px solid #1e1e1e; border-radius: 7px;
      padding: 7px 10px; cursor: pointer; color: #555; transition: all .15s;
      display: flex; align-items: center; gap: 6px; font-size: 11px;
      font-family: 'Inter', sans-serif; font-weight: 700;
    }
    .hamburger-btn:hover { color: #00F0FF; border-color: rgba(0,240,255,.3); }

    /* ── COLD CALL SYSTEM ── */
    .priority-hot {
      border: 1px solid rgba(255,68,68,.4); color: #ff6060;
      background: rgba(255,68,68,.06); font-size: 9px; font-weight: 800;
      padding: 2px 8px; border-radius: 4px; letter-spacing: .1em;
      font-family: 'JetBrains Mono', monospace;
    }
    .priority-high {
      border: 1px solid rgba(245,158,11,.4); color: #F59E0B;
      background: rgba(245,158,11,.06); font-size: 9px; font-weight: 800;
      padding: 2px 8px; border-radius: 4px; letter-spacing: .1em;
      font-family: 'JetBrains Mono', monospace;
    }
    .priority-medium {
      border: 1px solid rgba(0,240,255,.4); color: #00F0FF;
      background: rgba(0,240,255,.06); font-size: 9px; font-weight: 800;
      padding: 2px 8px; border-radius: 4px; letter-spacing: .1em;
      font-family: 'JetBrains Mono', monospace;
    }
    .lead-row {
      background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 10px;
      padding: 14px 18px; cursor: pointer; transition: all .2s;
    }
    .lead-row:hover { border-color: rgba(0,240,255,.25); background: #0d0d0d; }
    .lead-row.expanded { border-color: rgba(0,240,255,.4); box-shadow: 0 0 20px rgba(0,240,255,.05); }
    .lead-row.callback-overdue { border-left: 3px solid #ff6060; }
    .lead-row.callback-today { border-left: 3px solid #F59E0B; }
    .niche-badge {
      font-size: 9px; font-weight: 700; padding: 2px 8px; border-radius: 4px;
      background: rgba(255,255,255,.04); border: 1px solid #1e1e1e; color: #666;
      font-family: 'JetBrains Mono', monospace; letter-spacing: .06em;
    }
    .call-tab {
      padding: 8px 18px; border-radius: 7px; cursor: pointer; border: 1px solid;
      font-size: 12px; font-weight: 700; font-family: 'Inter', sans-serif;
      transition: all .15s; background: transparent;
    }
    .call-tab.active { background: rgba(0,240,255,.08); border-color: rgba(0,240,255,.4); color: #00F0FF; }
    .call-tab:not(.active) { border-color: #1e1e1e; color: #555; }
    .call-tab:not(.active):hover { border-color: rgba(0,240,255,.2); color: #888; }
    .stat-card {
      background: #0d0d0d; border: 1px solid rgba(0,240,255,.22);
      border-radius: 12px; padding: 18px 20px;
      box-shadow: 0 0 24px rgba(0,240,255,.04);
    }
    .stat-number {
      font-size: 28px; font-weight: 900; color: #fff; margin: 0;
      font-family: 'JetBrains Mono', monospace;
    }
    .stat-label {
      font-size: 10px; font-weight: 700; letter-spacing: .15em;
      text-transform: uppercase; color: #00F0FF; margin: 0 0 8px;
    }
    .import-dropzone {
      border: 2px dashed #1e1e1e; border-radius: 12px; padding: 40px;
      text-align: center; cursor: pointer; transition: all .2s;
    }
    .import-dropzone:hover, .import-dropzone.drag-over {
      border-color: rgba(0,240,255,.4); background: rgba(0,240,255,.03);
    }
    .assign-checkbox {
      width: 16px; height: 16px; accent-color: #00F0FF; cursor: pointer;
    }
    .call-history-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .outcome-no_answer { background: #555; }
    .outcome-voicemail_left { background: #F59E0B; }
    .outcome-callback_requested { background: #F59E0B; }
    .outcome-not_interested { background: #ff6060; }
    .outcome-booked_call { background: #22c55e; }
    .outcome-discovery_completed { background: #00F0FF; }
    .outcome-no_show { background: #ff8800; }
    .outcome-wrong_number { background: #ff6060; }
    @media (max-width: 768px) {
      .cc-stats-grid { grid-template-columns: repeat(2, 1fr) !important; }
      .cc-filter-bar { flex-direction: column !important; }
      .lead-row-header { flex-direction: column !important; align-items: flex-start !important; gap: 8px !important; }

      body { background:#fff !important; color:#000 !important; }

      .rep-block { background:#eef9ff !important; border-left-color:#3399cc !important; }
      .rep-label { color:#006699 !important; }
      .rep-text { color:#111 !important; }
      .plabel,.sech h3 { color:#006699 !important; }
      .sech-line,.divider { background:#ccc !important; }
      .tag { border-color:#99c !important; color:#339 !important; background:#eef !important; }

      .dot { border-color:#69c !important; color:#069 !important; background:#e8f4fb !important; }

/* ─── PDF DOWNLOAD ─── */
const downloadPDF = (title) => {
  const el = document.querySelector('.print-area');
  if (!el) { window.print(); return; }
  if (typeof html2pdf === 'undefined') { window.print(); return; }
  // Temporarily hide no-print elements inside the print area
  const hidden = [];
  el.querySelectorAll('.no-print').forEach(n => { hidden.push([n, n.style.display]); n.style.display = 'none'; });
  const opt = {
    margin: [10, 10, 10, 10],
    filename: `Premmisus-${(title || 'Sales-Portal').replace(/[^a-zA-Z0-9-]/g, '-')}.pdf`,
    image: { type: 'jpeg', quality: 0.97 },
    html2canvas: { scale: 2, useCORS: true, backgroundColor: '#000000', logging: false, windowWidth: 960 },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
    pagebreak: { mode: ['css', 'legacy'] },
  };
  html2pdf().set(opt).from(el).save().then(() => {
    hidden.forEach(([n, d]) => { n.style.display = d; });
  }).catch(() => {
    hidden.forEach(([n, d]) => { n.style.display = d; });
    window.print();
  });
};

/* ─── NOTES PAD ─── */
const NotesPad = ({ storageKey }) => {
  const repName  = (() => { try { return localStorage.getItem('pmss_user')  || 'Rep'; } catch { return 'Rep'; } })();
  const repEmail = (() => { try { return localStorage.getItem('pmss_email') || '';    } catch { return '';    } })();
  const expiryKey = `${storageKey}_expires`;

  const [open,         setOpen]         = useState(false);
  const [text,         setText]         = useState(() => { try { return localStorage.getItem(storageKey) || ''; } catch { return ''; } });
  const [expiresAt,    setExpiresAt]    = useState(() => { try { return parseInt(localStorage.getItem(expiryKey)||'0',10); } catch { return 0; } });
  const [now,          setNow]          = useState(Date.now());
  const [uploading,    setUploading]    = useState(false);
  const [uploadResult, setUploadResult] = useState(null); // null | {url,title} | 'error'

  useEffect(() => { const t = setInterval(() => setNow(Date.now()), 30000); return () => clearInterval(t); }, []);

  const hasNotes    = text.trim().length > 0;
  const msLeft      = expiresAt > 0 ? expiresAt - now : 0;
  const daysLeft    = Math.floor(msLeft / 86400000);
  const hoursLeft   = Math.floor((msLeft % 86400000) / 3600000);
  const isExpiring  = msLeft > 0 && msLeft < 86400000 * 2; // < 2 days
  const isExpired   = expiresAt > 0 && msLeft <= 0 && hasNotes;
  const timerColor  = isExpired ? '#ff4444' : isExpiring ? '#F59E0B' : '#2e2e2e';
  const timerText   = isExpired
    ? '⚠ Expired — upload to save!'
    : expiresAt > 0 && hasNotes
      ? `Clears in ${daysLeft}d ${hoursLeft}h — upload to save permanently`
      : '';

  const handleChange = (e) => {
    const val = e.target.value;
    setText(val);
    try { localStorage.setItem(storageKey, val); } catch {}
    if (val.trim() && !expiresAt) {
      const exp = Date.now() + NOTES_EXPIRY_DAYS * 86400000;
      try { localStorage.setItem(expiryKey, exp); } catch {}
      setExpiresAt(exp);
    }
    if (!val.trim()) {
      try { localStorage.removeItem(expiryKey); } catch {}
      setExpiresAt(0);
    }
  };

  const handleUpload = async () => {
    if (!hasNotes || PORTAL_AUTH_WEBHOOK === 'PASTE_AUTH_SCRIPT_URL_HERE') {
      alert('Upload endpoint not configured yet. Paste your Apps Script URL into the portal code.');
      return;
    }
    setUploading(true);
    const sectionLabel = storageKey.replace('notes_','').replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
    try {
      const res = await fetch(PORTAL_AUTH_WEBHOOK, {
        method:'POST',
        body: JSON.stringify({ action:'uploadNotes', repName, repEmail, notes:[{ section: sectionLabel, text }] }),
      });
      const data = await res.json();
      if (data.success) {
        setUploadResult({ url: data.docUrl, title: data.docTitle });
        setText('');
        try { localStorage.removeItem(storageKey); localStorage.removeItem(expiryKey); } catch {}
        setExpiresAt(0);
      } else {
        setUploadResult('error');
      }
    } catch { setUploadResult('error'); }
    setUploading(false);
  };

  const borderColor = isExpired ? 'rgba(255,68,68,.35)' : isExpiring ? 'rgba(245,158,11,.25)' : '#1a1a1a';

  return (
    <div className="no-print" style={{marginTop:'32px', border:`1px solid ${borderColor}`, borderRadius:'10px', overflow:'hidden', transition:'border-color .3s'}}>
      <button onClick={() => setOpen(p => !p)} style={{width:'100%', display:'flex', alignItems:'center', justifyContent:'space-between', padding:'11px 16px', background:'#080808', border:'none', cursor:'pointer', outline:'none', transition:'background .2s'}}
        onMouseEnter={e => e.currentTarget.style.background='#0d0d0d'}
        onMouseLeave={e => e.currentTarget.style.background='#080808'}>
        <div style={{display:'flex', alignItems:'center', gap:'8px'}}>
          <span style={{fontSize:'10px', fontWeight:800, letterSpacing:'.18em', textTransform:'uppercase', fontFamily:'JetBrains Mono, monospace', color:hasNotes?'#00F0FF':'#333'}}>My Notes</span>
          {hasNotes && <div style={{width:'5px', height:'5px', borderRadius:'50%', background:'#00F0FF', boxShadow:'0 0 6px rgba(0,240,255,.8)'}}/>}
          {timerText && <span style={{fontSize:'9px', color: timerColor, fontFamily:'JetBrains Mono, monospace', letterSpacing:'.06em'}}>{timerText}</span>}
          {!hasNotes && <span style={{fontSize:'10px', color:'#2a2a2a'}}>— notes save for {NOTES_EXPIRY_DAYS} days then auto-clear</span>}
        </div>
        <span style={{fontSize:'12px', color:'#333', display:'inline-block', transform:open?'rotate(90deg)':'rotate(0deg)', transition:'transform .2s'}}>▸</span>
      </button>
      {open && (
        <>
          <textarea value={text} onChange={handleChange}
            placeholder={`Jot anything down — tweaks, reminders, things to remember. Saves automatically. Clears in ${NOTES_EXPIRY_DAYS} days unless you upload to Google Drive.`}
            style={{width:'100%', minHeight:'140px', background:'#0a0a0a', border:'none', borderTop:'1px solid #1a1a1a', padding:'14px 16px', color:'#ccc', fontSize:'13px', lineHeight:1.65, fontFamily:'Roboto, sans-serif', resize:'vertical', outline:'none', boxSizing:'border-box', display:'block'}}
          />
          <div style={{padding:'10px 14px', background:'#060606', borderTop:'1px solid #111', display:'flex', alignItems:'center', justifyContent:'space-between', gap:'10px', flexWrap:'wrap'}}>
            <span style={{fontSize:'9px', color: timerColor, fontFamily:'JetBrains Mono, monospace', letterSpacing:'.08em'}}>
              {isExpired ? '⚠ EXPIRED' : expiresAt > 0 && hasNotes ? `↻ Local copy clears in ${daysLeft}d ${hoursLeft}h` : hasNotes ? 'Not yet saved — type to start timer' : ''}
            </span>
            {hasNotes && !uploadResult && (
              <button onClick={handleUpload} disabled={uploading} style={{background:'none', border:'1px solid rgba(0,240,255,.3)', borderRadius:'6px', padding:'5px 14px', cursor:uploading?'wait':'pointer', color:'#00F0FF', fontSize:'10px', fontWeight:700, fontFamily:'JetBrains Mono, monospace', letterSpacing:'.1em', textTransform:'uppercase', transition:'background .2s', opacity:uploading?.6:1}}>
                {uploading ? 'Uploading...' : '↑ Save to Google Drive'}
              </button>
            )}
            {uploadResult && uploadResult !== 'error' && (
              <span style={{fontSize:'10px', color:'#22c55e', fontFamily:'JetBrains Mono, monospace'}}>
                ✓ Saved — <a href={uploadResult.url} target="_blank" rel="noreferrer" style={{color:'#00F0FF'}}>Open in Google Docs</a>
              </span>
            )}
            {uploadResult === 'error' && (
              <span style={{fontSize:'10px', color:'#ff4444', fontFamily:'JetBrains Mono, monospace'}}>Upload failed — try again</span>
            )}
          </div>
        </>
      )}
    </div>
  );
};

/* ─── TIER SYSTEM ─── */
const getTierInfo = (closes) => {
  if (closes < 10) return {

    // Also log to Google Sheets (backup)
    try {
      await fetch(HANDOFF_WEBHOOK, {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify({
          repName: userName,
          repEmail: userEmail || '',
          businessName: form.company,
          niche: form.niche,
          painPoint: form.painPoint,
          nextStep: form.nextStep,
          notes: form.notes,
        }),
      });
    } catch {}
    setSending(false);
    if (supabaseOk) {
      setSubmitted(true);
    } else {
      setSendError('Handoff failed to save. Check your connection and try again.');
    }
  };
  const handleCopy = () => {
    navigator.clipboard.writeText(pingText);
    setCopied(true);
    setTimeout(() => setCopied(false), 2000);
  };
  const handleReset = () => { setForm(empty); setSubmitted(false); setCopied(false); };

    <label style={{display:'block', fontSize:'10px', fontWeight:700, letterSpacing:'.15em', textTransform:'uppercase', color:'#555', marginBottom:'6px'}}>{txt}</label>

          </div>
          <div>
            {fieldLabel('Niche')}
            <input className="field" placeholder="e.g. HVAC, Plumbing, Construction"
              value={form.niche} onChange={e=>setForm(p=>({...p,niche:e.target.value}))}/>
          </div>
          <div>
            {fieldLabel('Pain Point Uncovered')}
            <textarea className="field" rows={3} placeholder='e.g. "Hates current Meta ads, leads are low quality"' required

          </div>
          <div>
            {fieldLabel('Next Step')}
            <select className="field" value={form.nextStep} onChange={e=>setForm(p=>({...p,nextStep:e.target.value}))}>
              <option>Meet Booked</option>
              <option>Invoice Sent</option>
              <option>Follow-up Pending</option>
              <option>Closed — Won</option>
            </select>
          </div>
          <div>
            {fieldLabel('Notes (optional)')}
            <textarea className="field" rows={2} placeholder="Any additional context..."
              style={{resize:'vertical'}}
              value={form.notes} onChange={e=>setForm(p=>({...p,notes:e.target.value}))}/>
          </div>
          <div style={{paddingTop:'4px'}}>
            <button type="submit" className="btn-primary" disabled={sending} style={{display:'flex', alignItems:'center', justifyContent:'center', gap:'8px', opacity: sending ? .6 : 1}}>
              <Icon name="send" size={14}/> {sending ? 'Logging...' : 'Generate Ping'}
            </button>
          </div>
        </form>
      ) : (
        <div style={{maxWidth:'620px', display:'flex', flexDirection:'column', gap:'12px'}} className="fadein">
          <div className="card-glow" style={{padding:'20px'}}>
            <div style={{display:'flex', alignItems:'center', gap:'8px', marginBottom:'14px'}}>
              <div style={{width:'8px', height:'8px', borderRadius:'50%', background:'#22c55e', boxShadow:'0 0 8px rgba(34,197,94,.5)'}}/>

          </div>
          <div style={{display:'flex', gap:'10px'}}>
            <button onClick={handleCopy} className="btn-pdf" style={{flex:1, justifyContent:'center'}}>
              <Icon name={copied ? 'check' : 'copy'} size={13}/>
              {copied ? 'Copied!' : 'Copy Ping'}
            </button>
            <button onClick={handleReset} className="btn-back" style={{flex:1, justifyContent:'center', color: '#555'}}>

          </div>
        </div>

/* ══════════════════════════════════════════════════════
   PANEL: DISCOVERY CALL FRAMEWORK

const DiscoveryCallPanel = () => (
  <div className="print-area" style={{maxWidth:'820px',margin:'0 auto',padding:'32px 28px'}}>

      <span className="tag">DISCOVERY CALL</span>
    </div>
    <h2 style={{fontSize:'24px',fontWeight:900,margin:'0 0 6px',letterSpacing:'-.02em'}}>Discovery Call Framework</h2>
    <Body>This is the agenda for a booked Google Meet with a prospect who already agreed to talk. Total runtime: ~15 minutes. Control the frame — you lead, they follow.</Body>

    <div style={{display:'flex',gap:'8px',flexWrap:'wrap',marginTop:'12px'}}>
      <span className="tag" style={{fontSize:'9px'}}>~15 MIN TOTAL</span>
      <span className="tag" style={{fontSize:'9px'}}>GOOGLE MEET</span>
      <span className="tag" style={{fontSize:'9px'}}>SCREEN SHARE READY</span>
    </div>

    <div className="divider" style={{margin:'20px 0'}} />

    <SecH>Phase 1 — The Warm-Up (2 min)</SecH>
    <PLabel>Goal</PLabel>
    <Body>Build rapport. Confirm what they know. Set the agenda so you control the frame.</Body>

    <Rep>
      Hey [Name], appreciate you jumping on — I know you're busy running [Business Name], so I'll keep this tight. Before I show you anything, I want to understand your business first. That way I'm not wasting your time showing you stuff that doesn't apply. Sound good?
    </Rep>

    <IfBlock label="If they start asking about pricing immediately">
      <Rep>
        Great question — I'll get to pricing, I promise. But I want to make sure I'm recommending the right thing first. Some of our clients only need one piece, others need the full system. Let me ask a couple quick questions so I don't oversell you.

    <div style={{height:'16px'}} />

    <SecH>Phase 2 — Discovery Questions (5 min)</SecH>
    <PLabel>Goal</PLabel>
    <Body>Uncover their pain, current situation, and what success looks like. Let them talk — your job is to listen and take notes.</Body>

    <div className="card" style={{padding:'18px 20px',marginTop:'8px'}}>
      <SubH>Question 1 — Current Lead Gen</SubH>

    </div>

    <div className="card" style={{padding:'18px 20px',marginTop:'8px'}}>
      <SubH>Question 2 — Job Value</SubH>
      <Rep>What's your average job worth? Like a typical residential job — what does that look like revenue-wise?</Rep>
      <div style={{marginTop:'4px'}}>
        <Body><strong style={{color:'#fff'}}>Why:</strong> You need this number to calculate ROI later. "If each job is $500 and we bring you 20 leads a month..."</Body>
      </div>
    </div>

    <div className="card" style={{padding:'18px 20px',marginTop:'8px'}}>
      <SubH>Question 3 — Lead Volume</SubH>
      <Rep>How many leads are you getting per month right now? Roughly — doesn't have to be exact.</Rep>
      <div style={{marginTop:'4px'}}>
        <Body><strong style={{color:'#fff'}}>Listen for:</strong> Low numbers = they need Foundation 1.0. High numbers but poor conversion = they need Authority 2.0.</Body>
      </div>
    </div>

    <div className="card" style={{padding:'18px 20px',marginTop:'8px'}}>
      <SubH>Question 4 — The Missed Call Problem</SubH>

      <div style={{marginTop:'4px'}}>
        <Body><strong style={{color:'#fff'}}>This is the Vapi opener.</strong> If they say "I try to call back later" or "my wife handles it" — they're losing leads. Seed the AI receptionist here.</Body>
      </div>
    </div>

    <div className="card" style={{padding:'18px 20px',marginTop:'8px'}}>
      <SubH>Question 5 — Past Agency Experience</SubH>
      <Rep>Have you worked with a marketing agency before? What happened?</Rep>
      <div style={{marginTop:'4px'}}>
        <Body><strong style={{color:'#fff'}}>Listen for:</strong> "They locked me into a contract" = hit the ownership hook hard. "It didn't work" = ask what specifically didn't work. "Never" = clean slate, easier close.</Body>
      </div>
    </div>

    <div className="card" style={{padding:'18px 20px',marginTop:'8px'}}>

    <div style={{height:'16px'}} />

    <SecH>Phase 3 — The Demo (3 min)</SecH>
    <PLabel>Goal</PLabel>

    <ul style={{padding:0,margin:0}}>
      <Li>Show the homepage — point out their branding, services, reviews section</Li>
      <Li>Click through to the contact form — "This is where leads come in"</Li>
      <Li>Explain the AI response: "The second someone fills this out, they get a text back in under 30 seconds. While you're on a job site, we're already qualifying that lead for you."</Li>
      <Li>Show the CRM view if applicable: "Every lead lands here. You can see who called, who booked, who needs follow-up — all in one place."</Li>
    </ul>

    <IfBlock label="If they say: 'This looks amazing'">
      <Rep>

      </Rep>
    </IfBlock>

    <IfBlock label="If they want changes to the preview">
      <Rep>

      </Rep>
    </IfBlock>

    <div style={{height:'16px'}} />

    <SecH>Phase 4 — The Recommendation (2 min)</SecH>
    <PLabel>Goal</PLabel>
    <Body>Based on their answers from Phase 2, recommend the right tier. Don't present all tiers — present THE tier that fits them.</Body>

    <Rep>
      Based on everything you've told me, here's what I'd recommend for [Business Name]...
    </Rep>

    <div className="card-glow" style={{padding:'18px 20px',marginTop:'12px'}}>

      <ul style={{padding:0,margin:0}}>
        <Li><strong style={{color:'#fff'}}>No website at all</strong> → Website Package (Offer 0.5) — $1,000 one-time. "Let's get you online first. You can't run ads to something that doesn't exist."</Li>
        <Li><strong style={{color:'#fff'}}>Has website, no leads</strong> → Foundation 1.0 — $1,599/mo. "You've got the foundation, but nobody's finding you. We fix that with ads, SEO, and our AI follow-up system."</Li>
        <Li><strong style={{color:'#fff'}}>Has some marketing, poor quality</strong> → Authority System 2.0 — $2,999/mo. "You're spending money but not seeing results. We rebuild the pipeline — ads, CRM, nurturing, the works."</Li>
        <Li><strong style={{color:'#fff'}}>Wants everything / ready to dominate</strong> → Market Domination 3.0 — $5,999/mo. "This is a full marketing department for a fraction of the cost. Social media, content, reputation management — we run it all."</Li>
      </ul>
    </div>

    <PLabel>Price Anchor</PLabel>
    <Rep>
      For context — hiring even a part-time marketing person would run you $3,000-$5,000 a month, and that's one person doing one thing. This is a full system — ads, AI, CRM, SEO, everything — for [recommended price].
    </Rep>

    <div style={{height:'16px'}} />

    <SecH>Phase 5 — The Close (3 min)</SecH>
    <PLabel>Goal</PLabel>
    <Body>Get a yes or get a clear next step. No "let me think about it" without a follow-up locked in.</Body>

    <Rep>
      So here's what the next step looks like — I'll send over the agreement, we get your ad accounts set up this week, and the first campaigns go live within 5-7 business days. You'll start seeing leads before the month is out. Does that work for you?
    </Rep>

    <IfBlock label="If they say: 'Let me think about it'">
      <Rep>
        Totally understand — it's a big decision. What specifically do you want to think about? Is it the price, the timing, or something else? I'd rather address it now so you're not sitting on a question all week.
      </Rep>
    </IfBlock>

    <IfBlock label="If they say: 'I need to talk to my partner'">
      <Rep>
        Makes sense. Want to bring them on a quick 10-minute call? I can walk them through the same thing — that way you're not playing telephone. I'm free [two specific times].
      </Rep>
    </IfBlock>

    <IfBlock label="If they say yes">
      <Rep>
        Amazing. I'll send the agreement over right now. Once that's signed, I'll get your onboarding started today. You'll hear from me within 24 hours with your setup checklist.
      </Rep>
    </IfBlock>

    <div className="divider" style={{margin:'24px 0'}} />

    <SecH>Red Flag Indicators</SecH>
    <Body>Signs the prospect isn't qualified. Don't force a close — protect your time.</Body>

    <div className="mistake-block" style={{marginBottom:'6px'}}>
      <span className="mistake-label">RED FLAG</span>
      <p className="mistake-text">"Can you do it for free first and I'll pay you later?" — They don't value what you do. Walk away.</p>
    </div>
    <div className="mistake-block" style={{marginBottom:'6px'}}>
      <span className="mistake-label">RED FLAG</span>
      <p className="mistake-text">"My nephew does my website" — They're not ready to invest in professional marketing. Offer 0.5 max.</p>
    </div>
    <div className="mistake-block" style={{marginBottom:'6px'}}>
      <span className="mistake-label">RED FLAG</span>
      <p className="mistake-text">"I don't really need more customers right now" — If they're not trying to grow, there's no sale. Unless they have a missed-call problem (Vapi play).</p>
    </div>
    <div className="mistake-block" style={{marginBottom:'6px'}}>
      <span className="mistake-label">RED FLAG</span>
      <p className="mistake-text">They reschedule 3+ times or show up 15+ minutes late — Low respect for your time signals low respect for the partnership.</p>
    </div>

    <div className="divider" style={{margin:'24px 0'}} />

    <SecH>Transition Phrases Between Phases</SecH>
    <ul style={{padding:0,margin:0}}>
      <Li><strong style={{color:'#fff'}}>Warm-Up → Discovery:</strong> "Alright, let me ask you a few quick questions so I can figure out what actually makes sense for you."</Li>
      <Li><strong style={{color:'#fff'}}>Discovery → Demo:</strong> "Okay, I've got a solid picture. Let me show you what we've already started building."</Li>
      <Li><strong style={{color:'#fff'}}>Demo → Recommendation:</strong> "So based on what you told me and what you just saw — here's what I'd recommend."</Li>
      <Li><strong style={{color:'#fff'}}>Recommendation → Close:</strong> "The ROI math is pretty clear. Want to get this started?"</Li>
    </ul>

    <NotesPad storageKey="notes_discovery_call" />
  </div>
);

/* ══════════════════════════════════════════════════════
   VIEW: LOGIN
══════════════════════════════════════════════════════ */
const LoginView = ({ onLogin }) => {
  // Default to 'signin' if already registered on this device, else 'register'
  const isRegistered = () => { try { return !!localStorage.getItem('pmss_code'); } catch { return false; } };
  const [tab, setTab]         = useState(isRegistered() ? 'signin' : 'register');
  const [regForm, setRegForm] = useState({ name:'', email:'', password:'', code:'' });
  const [sigForm, setSigForm] = useState({
    email:    (() => { try { return localStorage.getItem('pmss_email') || ''; } catch { return ''; } })(),
    password: '',
  });
  const [showRegPass, setShowRegPass] = useState(false);
  const [showSigPass, setShowSigPass] = useState(false);
  const [loading, setLoading] = useState(false);
  const [error, setError]     = useState('');

  // ── Register (Supabase Auth + invite code) ───────────────────
  const handleRegister = async (e) => {
    e.preventDefault();
    setError(''); setLoading(true);
    const code = regForm.code.trim().toUpperCase();
    if (!code.startsWith('PMSS-') || code.length < 8) {
      setError('Invalid code format. Codes look like PMSS-YOURNAME-01.');
      setLoading(false); return;
    }
    const repName = regForm.name.trim() || regForm.email.split('@')[0] || 'Rep';
    try {
      const { data: authData, error: authErr } = await sb.auth.signUp({
        email: regForm.email.trim(),
        password: regForm.password,
      });
      if (authErr) throw authErr;
      const role = DIRECTOR_EMAILS.includes(regForm.email.trim().toLowerCase()) ? 'director' : 'rep';
      const { data: repData, error: repErr } = await sb.from('reps').insert({
        auth_id: authData.user.id,
        name: repName,
        email: regForm.email.trim(),
        invite_code: code,
        role: role,
      }).select().single();
      if (repErr) throw repErr;
      try {
        localStorage.setItem('pmss_user', repName);
        localStorage.setItem('pmss_email', regForm.email);
        localStorage.setItem('pmss_code', code);
      } catch {}
      try { fetch(`${PORTAL_AUTH_WEBHOOK}?action=validateCode&code=${encodeURIComponent(code)}&name=${encodeURIComponent(repName)}&email=${encodeURIComponent(regForm.email)}`, { mode:'no-cors' }); } catch {}
      setLoading(false);
      onLogin(repName, regForm.email, code, repData.id, role);
    } catch (err) {
      setError(err.message || 'Registration failed. Try again.');
      setLoading(false);
    }
  };

  // ── Sign In (Supabase Auth) ─────────────────────────────────
  const handleSignIn = async (e) => {
    e.preventDefault();
    setError(''); setLoading(true);
    try {
      const { data: authData, error: authErr } = await sb.auth.signInWithPassword({
        email: sigForm.email.trim(),
        password: sigForm.password,
      });
      if (authErr) throw authErr;
      const { data: repData, error: repErr } = await sb.from('reps')
        .select('*')
        .eq('auth_id', authData.user.id)
        .single();
      if (repErr) throw repErr;
      try {
        localStorage.setItem('pmss_user', repData.name);
        localStorage.setItem('pmss_email', repData.email);
        localStorage.setItem('pmss_code', repData.invite_code);
      } catch {}
      setLoading(false);
      onLogin(repData.name, repData.email, repData.invite_code, repData.id, repData.role);
    } catch (err) {
      setError(err.message || 'Sign in failed. Check your email and password.');
      setLoading(false);
    }
  };

  const inputField = ({ label, icon, type, placeholder, value, onChange, autoComplete, upperCase, showToggle, onToggle, showingText }) => (
    <div>
      <label style={{display:'block', fontSize:'10px', fontWeight:700, letterSpacing:'.15em', textTransform:'uppercase', color:'#555', marginBottom:'6px', fontFamily:'JetBrains Mono, monospace'}}>{label}</label>
      <div style={{position:'relative'}}>
        <div style={{position:'absolute', left:'12px', top:'50%', transform:'translateY(-50%)', color:'#444', pointerEvents:'none'}}><Icon name={icon} size={14}/></div>
        <input className="field" style={{paddingLeft:'38px', paddingRight: showToggle?'42px':'16px', textTransform: upperCase?'uppercase':'none', letterSpacing: upperCase?'.08em':'normal'}}
          type={showingText ? 'text' : type} placeholder={placeholder} value={value} autoComplete={autoComplete}
          onChange={onChange} required/>
        {showToggle && (
          <button type="button" onClick={onToggle}
            style={{position:'absolute', right:'12px', top:'50%', transform:'translateY(-50%)', background:'none', border:'none', color:'#555', cursor:'pointer', padding:0, display:'flex'}}>
            <Icon name={showingText?'eyeOff':'eye'} size={14}/>
          </button>
        )}
      </div>
    </div>
  );

  const spinner = <svg style={{animation:'spin 1s linear infinite'}} width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>;

  return (
    <div style={{minHeight:'100vh', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', background:'#000', position:'relative', overflow:'hidden'}}>
      <div className="grid-bg" style={{position:'absolute', inset:0, opacity:.6, pointerEvents:'none'}}/>
      <div className="login-glare" style={{position:'absolute', inset:0, pointerEvents:'none'}}/>
      <div style={{position:'relative', zIndex:10, width:'100%', maxWidth:'420px', padding:'0 24px'}}>

        {/* Logo */}
        <div style={{display:'flex', flexDirection:'column', alignItems:'center', marginBottom:'36px'}}>
          <div style={{marginBottom:'16px'}}><Logo height={52}/></div>
          <p style={{fontSize:'10px', fontWeight:700, letterSpacing:'.3em', textTransform:'uppercase', color:'#444', margin:0, fontFamily:'JetBrains Mono, monospace'}}>Sales Operations Portal</p>
          <div className="divider" style={{width:'80px', marginTop:'12px'}}/>
        </div>

        <div className="card-glow" style={{padding:'32px'}}>

          {/* Tabs */}
          <div style={{display:'flex', gap:'4px', marginBottom:'28px', background:'#0a0a0a', borderRadius:'8px', padding:'4px'}}>
            {[['signin','Sign In'],['register','Register']].map(([key, label]) => (
              <button key={key} type="button" onClick={() => { setTab(key); setError(''); }}
                style={{flex:1, padding:'8px 0', borderRadius:'6px', border:'none', cursor:'pointer', fontFamily:'Inter, sans-serif', fontSize:'13px', fontWeight:700, transition:'all .2s',
                  background: tab===key ? '#141414' : 'transparent',
                  color: tab===key ? '#fff' : '#444',
                  boxShadow: tab===key ? '0 0 0 1px #252525' : 'none',
                }}>{label}</button>
            ))}
          </div>

          {/* Error */}
          {error && (
            <div style={{background:'rgba(255,68,68,.08)', border:'1px solid rgba(255,68,68,.25)', borderRadius:'8px', padding:'10px 14px', marginBottom:'16px'}}>
              <p style={{margin:0, fontSize:'12px', color:'#ff6060', fontFamily:'Roboto, sans-serif'}}>{error}</p>
            </div>
          )}

          {/* ── SIGN IN TAB ── */}
          {tab === 'signin' && (
            <form onSubmit={handleSignIn} autoComplete="on" style={{display:'flex', flexDirection:'column', gap:'16px'}}>
              {inputField({ label:'Email Address', icon:'mail', type:'email', placeholder:'you@premmisus.com', value:sigForm.email, onChange:e=>setSigForm(p=>({...p,email:e.target.value})), autoComplete:'username' })}
              {inputField({ label:'Password', icon:'lock', type:'password', placeholder:'••••••••••', value:sigForm.password, onChange:e=>setSigForm(p=>({...p,password:e.target.value})), autoComplete:'current-password', showToggle:true, onToggle:()=>setShowSigPass(p=>!p), showingText:showSigPass })}
              <div style={{paddingTop:'4px'}}>
                <button type="submit" className="btn-primary" disabled={loading}>
                  {loading ? <span style={{display:'flex', alignItems:'center', justifyContent:'center', gap:'8px'}}>{spinner} Signing in...</span> : 'Sign In →'}
                </button>
              </div>
              <p style={{margin:0, textAlign:'center', fontSize:'12px', color:'#333', fontFamily:'Roboto, sans-serif'}}>
                New device?{' '}
                <button type="button" onClick={() => { setTab('register'); setError(''); }}
                  style={{background:'none', border:'none', color:'#00F0FF', cursor:'pointer', fontSize:'12px', fontFamily:'Roboto, sans-serif', padding:0, textDecoration:'underline'}}>
                  Register with your invite code
                </button>
              </p>
            </form>
          )}

          {/* ── REGISTER TAB ── */}
          {tab === 'register' && (
            <form onSubmit={handleRegister} autoComplete="on" style={{display:'flex', flexDirection:'column', gap:'16px'}}>
              {inputField({ label:'Full Name', icon:'user', type:'text', placeholder:'Your full name', value:regForm.name, onChange:e=>setRegForm(p=>({...p,name:e.target.value})), autoComplete:'name' })}
              {inputField({ label:'Email Address', icon:'mail', type:'email', placeholder:'you@premmisus.com', value:regForm.email, onChange:e=>setRegForm(p=>({...p,email:e.target.value})), autoComplete:'username' })}
              {inputField({ label:'Password', icon:'lock', type:'password', placeholder:'Create a password', value:regForm.password, onChange:e=>setRegForm(p=>({...p,password:e.target.value})), autoComplete:'new-password', showToggle:true, onToggle:()=>setShowRegPass(p=>!p), showingText:showRegPass })}
              {inputField({ label:'Invite Code', icon:'key', type:'text', placeholder:'e.g. PMSS-YOURNAME-01', value:regForm.code, onChange:e=>setRegForm(p=>({...p,code:e.target.value})), autoComplete:'off', upperCase:true })}
              <div style={{paddingTop:'4px'}}>
                <button type="submit" className="btn-primary" disabled={loading}>
                  {loading ? <span style={{display:'flex', alignItems:'center', justifyContent:'center', gap:'8px'}}>{spinner} Verifying...</span> : 'Create Account →'}
                </button>
              </div>
              <p style={{margin:0, textAlign:'center', fontSize:'12px', color:'#333', fontFamily:'Roboto, sans-serif'}}>
                Already registered?{' '}
                <button type="button" onClick={() => { setTab('signin'); setError(''); }}
                  style={{background:'none', border:'none', color:'#00F0FF', cursor:'pointer', fontSize:'12px', fontFamily:'Roboto, sans-serif', padding:0, textDecoration:'underline'}}>
                  Sign in instead
                </button>
              </p>
            </form>
          )}

        </div>
        <p style={{textAlign:'center', color:'#2a2a2a', fontSize:'11px', marginTop:'20px', letterSpacing:'.15em', textTransform:'uppercase', fontFamily:'JetBrains Mono, monospace'}}>Premmisus · Internal Access Only</p>
      </div>
    </div>
  );
};

const HEADLINES = [
  ['We Built the', 'Sales Command'],
  ['We\'re Building', 'Something Big'],
  ['Outwork Everyone.', 'Out-Close Everyone.'],
  ['The System', 'Sells Itself'],
  ['Your Pipeline.', 'Your Paycheck.'],

const RotatingHeadline = () => {
  const [idx, setIdx] = useState(0);
  const [fade, setFade] = useState(true);

  useEffect(() => {
    const interval = setInterval(() => {
      setFade(false);
      setTimeout(() => {
        setIdx(prev => (prev + 1) % HEADLINES.length);
        setFade(true);
      }, 400);
    }, 4000);
    return () => clearInterval(interval);
  }, []);

  return (
    <h1 style={{fontSize:'clamp(28px, 5vw, 52px)', fontWeight:900, color:'#fff', margin:'0 0 16px', lineHeight:1.05, letterSpacing:'-.04em', textTransform:'uppercase', fontFamily:'Inter, sans-serif', minHeight:'2.2em', transition:'opacity .4s ease', opacity: fade ? 1 : 0}}>
      {HEADLINES[idx][0]}<br/>
      <span style={{background:'linear-gradient(135deg, #fff 40%, #00F0FF 100%)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>{HEADLINES[idx][1]}</span>
    </h1>
  );
};

const ScriptBlock = ({ touch, timing, children, variant = 'default' }) => {
  const [copied, setCopied] = useState(false);
  const handleCopy = () => {
    navigator.clipboard.writeText(children);
    setCopied(true);
    setTimeout(() => setCopied(false), 2000);
  };
  const borderColor = variant === 'preview' ? '#007AFF' : '#00F0FF';
  const bg = variant === 'preview' ? 'rgba(0,122,255,.06)' : 'rgba(0,240,255,.05)';
  return (
    <div style={{ marginBottom: '12px' }}>
      {(touch || timing) && (
        <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '6px' }}>
          {touch && <span style={{ fontSize: '10px', fontWeight: 800, color: '#fff', letterSpacing: '.1em', textTransform: 'uppercase' }}>{touch}</span>}
          {timing && <span style={{ fontSize: '9px', fontWeight: 700, color: '#444', background: '#111', padding: '2px 7px', borderRadius: '4px', letterSpacing: '.1em', textTransform: 'uppercase' }}>{timing}</span>}
          {variant === 'preview' && <span style={{ fontSize: '9px', fontWeight: 800, color: '#007AFF', letterSpacing: '.12em', textTransform: 'uppercase' }}>Preview Opener</span>}
        </div>
      )}
      <div style={{ position: 'relative', borderLeft: `3px solid ${borderColor}`, background: bg, borderRadius: '0 8px 8px 0', padding: '14px 44px 14px 16px' }}>
        <p style={{ color: '#e0e0e0', fontSize: '14px', lineHeight: 1.7, margin: 0, fontStyle: 'italic', whiteSpace: 'pre-wrap' }}>{children}</p>
        <button onClick={handleCopy} style={{ position: 'absolute', top: '10px', right: '10px', background: 'transparent', border: '1px solid #252525', borderRadius: '6px', padding: '5px', cursor: 'pointer', color: copied ? '#00F0FF' : '#444', display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'color .15s' }}>
          <Icon name={copied ? 'check' : 'copy'} size={12} />
        </button>
      </div>
    </div>
  );
};

const ChatWidget = ({ userName, userEmail, currentView, repId, userRole }) => {

  const [open, setOpen] = useState(false);
  const [msgs, setMsgs] = useState([{ role:'assistant', content: greeting }]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [unread, setUnread] = useState(false);
  const [toolsUsed, setToolsUsed] = useState([]);

  const inputRef = useRef(null);

  useEffect(() => { if (bottomRef.current) bottomRef.current.scrollIntoView({ behavior:'smooth' }); }, [msgs, loading, feedbackIdx]);
  useEffect(() => { if (open) { setUnread(false); if (inputRef.current) inputRef.current.focus(); } }, [open]);

  const send = async () => {
    if (!input.trim() || loading) return;
    const userMsg = { role:'user', content: input.trim() };
    const next = [...msgs, userMsg];
    setMsgs(next); setInput(''); setLoading(true);
    setFeedbackIdx(null);
    try {
      const sysPrompt = COACH_SYSTEM(userName || 'Rep', currentView || 'home');

        { role: 'user', parts: [{ text: sysPrompt }] },
        { role: 'model', parts: [{ text: 'Understood. I am the Premmisus AI Sales Coach. How can I help?' }] },
        ...next.filter(m => m.role !== 'system').map(m => ({
          role: m.role === 'assistant' ? 'model' : 'user',
          parts: [{ text: m.content }],
        })),
      ];
      const res = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=AIzaSyDnmdZOb4V3nZ1cjlCwzOtGvkwPJIi5SnU', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: geminiMessages, generationConfig: { maxOutputTokens: 1024, temperature: 0.7 } }),
      });
      const data = await res.json();
      const reply = data?.candidates?.[0]?.content?.parts?.[0]?.text || 'Sorry, I couldn\'t generate a response. Try again.';
      setMsgs(p => [...p, { role:'assistant', content: reply }]);

  const copyMsg = (content, idx) => {
    navigator.clipboard.writeText(content).catch(() => {});
    setCopyFlash(idx);
    setTimeout(() => setCopyFlash(null), 1500);
  };

  const saveToNotes = (content, idx) => {
    const key = `notes_${currentView || 'home'}`;
    const ts = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    const block = `\n\n— AI Coach [${ts}] —\n${content}`;
    try {
      const existing = localStorage.getItem(key) || '';
      localStorage.setItem(key, existing + block);
      // refresh expiry
      const expKey = `${key}_expires`;
      if (!localStorage.getItem(expKey)) {
        localStorage.setItem(expKey, Date.now() + NOTES_EXPIRY_DAYS * 86400000);
      }
    } catch {}
    setNoteFlash(idx);
    setTimeout(() => setNoteFlash(null), 1800);
  };

  const openFeedback = (idx) => {
    setFeedbackIdx(feedbackIdx === idx ? null : idx);
    setFeedbackText('');
    setFeedbackStatus('');
  };

  const submitFeedback = async (aiContent) => {
    setFeedbackStatus('sending');
    const payload = {
      action: 'sendFeedback',
      rep: userName || 'Unknown Rep',
      email: userEmail || '',
      view: currentView || 'home',
      aiResponse: aiContent,
      comment: feedbackText,
      timestamp: new Date().toISOString(),
    };
    try {
      await fetch(PORTAL_AUTH_WEBHOOK, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
        mode: 'no-cors',
      });
      setFeedbackStatus('sent');
      setTimeout(() => { setFeedbackIdx(null); setFeedbackStatus(''); setFeedbackText(''); }, 2000);
    } catch {
      setFeedbackStatus('error');
    }
  };

  const actionBtn = (label, onClick, active) => (
    <button onClick={onClick} style={{
      background: active ? 'rgba(0,240,255,.15)' : 'transparent',
      border: `1px solid ${active ? 'rgba(0,240,255,.35)' : '#1e1e1e'}`,
      borderRadius:'4px', padding:'2px 7px', color: active ? '#00F0FF' : '#444',
      fontSize:'10px', fontWeight:600, cursor:'pointer', fontFamily:'JetBrains Mono,monospace',
      letterSpacing:'.04em', transition:'all .15s', lineHeight:'18px',
    }}>{label}</button>
  );

  return (
    <div style={{position:'fixed', bottom:'24px', right:'24px', zIndex:400, fontFamily:'Inter,sans-serif'}} className="no-print chat-widget">
      {open && (
        <div style={{position:'absolute', bottom:'64px', right:0, width:'360px', background: isDirector ? 'rgba(34,197,94,.12)' : 'rgba(0,240,255,.12)', border: `2px solid ${isDirector ? 'rgba(34,197,94,.5)' : 'rgba(0,240,255,.5)'}`, borderRadius:'14px', boxShadow: `0 0 60px ${isDirector ? 'rgba(34,197,94,.2)' : 'rgba(0,240,255,.2)'}, 0 12px 40px rgba(0,0,0,.7)`, display:'flex', flexDirection:'column', overflow:'hidden', maxHeight:'560px', backdropFilter:'blur(20px)', WebkitBackdropFilter:'blur(20px)'}} className="fadein chat-panel">

          {/* Header */}
          <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', padding:'11px 14px', borderBottom: `1px solid ${isDirector ? 'rgba(34,197,94,.3)' : 'rgba(0,240,255,.3)'}`, background: isDirector ? 'rgba(34,197,94,.15)' : 'rgba(0,240,255,.15)', flexShrink:0}}>
            <div style={{display:'flex', alignItems:'center', gap:'8px'}}>
              <div style={{width:'7px', height:'7px', borderRadius:'50%', background: isDirector ? '#22c55e' : '#00F0FF', boxShadow: `0 0 8px ${isDirector ? 'rgba(34,197,94,.9)' : 'rgba(0,240,255,.9)'}`}}/>
              <span style={{fontSize:'12px', fontWeight:800, color:'#fff', letterSpacing:'.04em'}}>{isDirector ? 'AI Command Center' : 'AI Sales Coach'}</span>
              <span style={{fontSize:'9px', fontWeight:700, color: isDirector ? '#22c55e' : '#00F0FF', background: isDirector ? 'rgba(34,197,94,.08)' : 'rgba(0,240,255,.08)', border: `1px solid ${isDirector ? 'rgba(34,197,94,.2)' : 'rgba(0,240,255,.2)'}`, borderRadius:'3px', padding:'1px 6px', letterSpacing:'.1em', textTransform:'uppercase'}}>{isDirector ? 'L3' : 'Live'}</span>
            </div>
            <div style={{display:'flex', alignItems:'center', gap:'6px'}}>
              <button onClick={() => { setMsgs([{role:'assistant', content: greeting}]); setFeedbackIdx(null); setToolsUsed([]); }} title="Clear chat" style={{background:'transparent', border:'none', cursor:'pointer', color:'#333', fontSize:'13px', padding:'2px 4px', lineHeight:1}}>↺</button>
            </div>
          </div>

          {/* Messages */}
          <div style={{flex:1, overflowY:'auto', padding:'12px', display:'flex', flexDirection:'column', gap:'9px'}}>
            {msgs.map((m, i) => (
              <div key={i} style={{display:'flex', flexDirection:'column', alignItems:m.role==='user'?'flex-end':'flex-start'}}>
                {m.toolsUsed && m.toolsUsed.length > 0 && (
                  <div style={{marginBottom:'4px', display:'flex', flexWrap:'wrap', gap:'3px', maxWidth:'90%'}}>
                    {m.toolsUsed.map((t, ti) => {
                      const toolName = t.match(/\[([^\]]+)\]/)?.[1] || 'tool';
                      return <span key={ti} style={{fontSize:'8px', fontWeight:700, padding:'2px 6px', borderRadius:'3px', background:'rgba(34,197,94,.08)', border:'1px solid rgba(34,197,94,.2)', color:'#22c55e', fontFamily:'JetBrains Mono,monospace', letterSpacing:'.05em'}}>{toolName}</span>;
                    })}
                  </div>
                )}
                <div style={{maxWidth:'90%', padding:'9px 12px', borderRadius:m.role==='user'?'10px 10px 3px 10px':'10px 10px 10px 3px', background:m.role==='user'?'rgba(0,240,255,.1)':'#111', border:m.role==='user'?'1px solid rgba(0,240,255,.22)':'1px solid #1e1e1e', color:m.role==='user'?'#d0f5ff':'#ccc', fontSize:'13px', lineHeight:1.55, whiteSpace:'pre-wrap', wordBreak:'break-word'}}>
                  {m.content}
                </div>
                {/* Action row — assistant messages only, skip the greeting */}
                {m.role === 'assistant' && i > 0 && (
                  <div style={{display:'flex', gap:'4px', marginTop:'5px', marginLeft:'2px'}}>
                    {actionBtn(copyFlash===i ? '✓ Copied' : 'Copy', () => copyMsg(m.content, i), copyFlash===i)}
                    {actionBtn(noteFlash===i ? '✓ Saved' : '+ Notes', () => saveToNotes(m.content, i), noteFlash===i)}
                    {actionBtn(feedbackIdx===i ? '✕ Cancel' : 'Feedback', () => openFeedback(i), feedbackIdx===i)}
                  </div>
                )}
                {/* Inline feedback form */}
                {feedbackIdx === i && (
                  <div style={{marginTop:'6px', marginLeft:'2px', width:'100%', maxWidth:'320px', background:'#0d0d0d', border:'1px solid #252525', borderRadius:'8px', padding:'10px', display:'flex', flexDirection:'column', gap:'7px'}}>
                    <p style={{margin:0, fontSize:'10px', color:'#555', fontFamily:'JetBrains Mono,monospace', letterSpacing:'.08em', textTransform:'uppercase', fontWeight:700}}>What happened on the call?</p>
                    <textarea
                      value={feedbackText}
                      onChange={e => setFeedbackText(e.target.value)}
                      placeholder="e.g. Client was nervous about price. Used the reframe above — they stayed on the call. Worked great."

                      style={{background:'#111', border:'1px solid #1e1e1e', borderRadius:'6px', padding:'8px 10px', color:'#ccc', fontSize:'12px', fontFamily:'Roboto,sans-serif', resize:'none', outline:'none', lineHeight:1.5}}

                      <button

                        disabled={feedbackStatus==='sending'||feedbackStatus==='sent'}
                        style={{flex:1, padding:'6px 0', background: feedbackStatus==='sent'?'rgba(0,240,255,.15)':feedbackStatus==='error'?'rgba(255,68,68,.1)':'rgba(0,240,255,.1)', border:`1px solid ${feedbackStatus==='sent'?'rgba(0,240,255,.4)':feedbackStatus==='error'?'rgba(255,68,68,.3)':'rgba(0,240,255,.25)'}`, borderRadius:'6px', color: feedbackStatus==='sent'?'#00F0FF':feedbackStatus==='error'?'#ff6060':'#7dd8e8', fontSize:'11px', fontWeight:700, cursor:'pointer', fontFamily:'Inter,sans-serif'}}>

              onInput={e=>{e.target.style.height='auto'; e.target.style.height=Math.min(e.target.scrollHeight,80)+'px';}}/>
            <button onClick={send} disabled={loading||!input.trim()}
              style={{width:'34px', height:'34px', flexShrink:0, borderRadius:'8px', background:(input.trim()&&!loading)?'#00F0FF':'#111', border:`1px solid ${(input.trim()&&!loading)?'#00F0FF':'#1e1e1e'}`, color:(input.trim()&&!loading)?'#000':'#333', cursor:(input.trim()&&!loading)?'pointer':'default', display:'flex', alignItems:'center', justifyContent:'center', transition:'all .15s'}}>

          </div>

      {/* Floating toggle button */}
      <button onClick={() => setOpen(p=>!p)}
        style={{width:'50px', height:'50px', borderRadius:'50%', background:open?'#0d0d0d': isDirector ? '#22c55e' : '#00F0FF', border:open? `1px solid ${isDirector ? 'rgba(34,197,94,.35)' : 'rgba(0,240,255,.35)'}` : `2px solid ${isDirector ? '#22c55e' : '#00F0FF'}`, color:open? (isDirector ? '#22c55e' : '#00F0FF') :'#000', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'22px', boxShadow:open? `0 0 20px ${isDirector ? 'rgba(34,197,94,.12)' : 'rgba(0,240,255,.12)'}` : `0 0 28px ${isDirector ? 'rgba(34,197,94,.45)' : 'rgba(0,240,255,.45)'}`, transition:'all .2s', position:'relative'}}

        {open ? '✕' : isDirector ? '⌘' : '⚡'}

      </button>
    </div>
  );
};

/* ══════════════════════════════════════════════════════
   COLD CALL CENTER — CALL LOGGER (inline form)
══════════════════════════════════════════════════════ */
const CallLogger = ({ lead, repId, onLogged }) => {
  const [outcome, setOutcome] = useState('');
  const [notes, setNotes] = useState('');
  const [callbackDate, setCallbackDate] = useState('');
  const [saving, setSaving] = useState(false);

  const handleSubmit = async () => {
    if (!outcome) return;
    setSaving(true);
    try {
      await sb.from('call_logs').insert({ lead_id: lead.id, rep_id: repId, outcome, notes: notes || null, callback_date: callbackDate || null, business_name: lead.business_name || null });
      const statusMap = { no_answer:'contacted', voicemail_left:'voicemail', callback_requested:'callback', not_interested:'not_interested', booked_call:'booked', discovery_completed:'discovery_completed', no_show:'no_show', wrong_number:'wrong_number' };
      await sb.from('leads').update({ status: statusMap[outcome] || 'contacted', updated_at: new Date().toISOString() }).eq('id', lead.id);
      if (CALL_LOG_WEBHOOK) {
        fetch(CALL_LOG_WEBHOOK, { method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ businessName: lead.business_name, contactName: lead.contact_name, phone: lead.phone, niche: lead.niche, city: lead.city, outcome, notes, callbackDate, priority: lead.priority, source: 'Cold Call', timestamp: new Date().toISOString() })
        }).catch(()=>{});
      }
      onLogged(lead.id, outcome, statusMap[outcome]);
      setOutcome(''); setNotes(''); setCallbackDate('');
    } catch (err) { console.error('Call log error:', err); }
    setSaving(false);
  };

  return (
    <div style={{marginTop:'14px', padding:'16px', background:'rgba(0,240,255,.03)', border:'1px solid rgba(0,240,255,.15)', borderRadius:'10px'}} className="fadein">
      <p style={{margin:'0 0 12px', fontSize:'10px', fontWeight:800, letterSpacing:'.2em', textTransform:'uppercase', color:'#00F0FF'}}>Log Call</p>
      <div style={{display:'flex', gap:'10px', flexWrap:'wrap', marginBottom:'12px'}}>
        {Object.entries(OUTCOME_LABELS).map(([key, label]) => (
          <button key={key} onClick={()=>setOutcome(key)}
            style={{padding:'7px 14px', borderRadius:'7px', cursor:'pointer', fontSize:'11px', fontWeight:700, fontFamily:'Inter,sans-serif', transition:'all .15s',
              background: outcome===key ? `${OUTCOME_COLORS[key]}18` : 'transparent',
              border: `1px solid ${outcome===key ? OUTCOME_COLORS[key]+'66' : '#1e1e1e'}`,
              color: outcome===key ? OUTCOME_COLORS[key] : '#555',
            }}>{label}</button>
        ))}
      </div>
      {outcome === 'callback_requested' && (
        <div style={{marginBottom:'12px'}}>
          <label style={{fontSize:'10px', fontWeight:700, color:'#444', letterSpacing:'.1em', textTransform:'uppercase', display:'block', marginBottom:'4px'}}>Callback Date</label>
          <input type="date" value={callbackDate} onChange={e=>setCallbackDate(e.target.value)}
            className="field" style={{maxWidth:'200px', colorScheme:'dark'}}/>
        </div>
      )}
      <textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Quick notes (optional)..."
        className="field" style={{minHeight:'60px', resize:'vertical', marginBottom:'12px'}} rows={2}/>
      <button onClick={handleSubmit} disabled={!outcome || saving}
        style={{padding:'10px 24px', borderRadius:'8px', cursor: (!outcome||saving)?'not-allowed':'pointer', border:'none',
          background: outcome ? '#00F0FF' : '#1e1e1e', color: outcome ? '#000' : '#444',
          fontWeight:800, fontSize:'12px', fontFamily:'Inter,sans-serif', letterSpacing:'.06em', textTransform:'uppercase',
          opacity: saving ? .6 : 1, transition:'all .15s',
        }}>{saving ? 'Saving...' : 'Log Call'}</button>
    </div>
  );
};

const QuickLogForm = ({ repId, onLogged }) => {
  const [form, setForm] = useState({ businessName:'', contactName:'', phone:'', niche:'', city:'', callType:'cold_call', outcome:'', notes:'', callbackDate:'' });

  const [history, setHistory] = useState([]);

  const CALL_TYPES = { cold_call:'Cold Call', discovery_call:'Discovery Call', follow_up:'Follow-Up', inbound:'Inbound Call' };

  const handleSubmit = async () => {
    if (!form.outcome || !form.businessName) return;
    setSaving(true);
    try {
      // Check if lead exists in Supabase by business name
      const { data: existing } = await sb.from('leads').select('id').ilike('business_name', form.businessName).limit(1);
      let leadId = existing && existing.length > 0 ? existing[0].id : null;

      // If no existing lead, create one
      if (!leadId) {
        const { data: newLead } = await sb.from('leads').insert({
          business_name: form.businessName,
          contact_name: form.contactName,
          phone: form.phone,
          niche: form.niche || 'Other',
          city: form.city,
          priority: 'HIGH',
          status: form.outcome === 'booked_call' ? 'booked' : form.outcome === 'no_show' ? 'no_show' : form.outcome === 'discovery_completed' ? 'discovery_completed' : 'contacted',
          assigned_rep_id: repId,
          google_reviews: 0,
          rating: 0,
        }).select('id').single();
        leadId = newLead?.id;
      } else {
        // Update existing lead status
        const statusMap = { no_answer:'contacted', voicemail_left:'voicemail', callback_requested:'callback', not_interested:'not_interested', booked_call:'booked', discovery_completed:'discovery_completed', no_show:'no_show', wrong_number:'wrong_number' };
        await sb.from('leads').update({ status: statusMap[form.outcome] || 'contacted', updated_at: new Date().toISOString() }).eq('id', leadId);
      }

      // Log the call
      if (leadId) {
        await sb.from('call_logs').insert({ lead_id: leadId, rep_id: repId, outcome: form.outcome, notes: form.notes || null, callback_date: form.callbackDate || null, business_name: form.businessName || null });
      }

      // Push to Google Sheet
      if (CALL_LOG_WEBHOOK) {
        fetch(CALL_LOG_WEBHOOK, { method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ businessName: form.businessName, contactName: form.contactName, phone: form.phone, niche: form.niche, city: form.city, outcome: form.outcome, notes: form.notes, callbackDate: form.callbackDate, priority: '', source: CALL_TYPES[form.callType] || 'Manual Entry', timestamp: new Date().toISOString() })

      setHistory(prev => [{ ...form, timestamp: new Date().toISOString() }, ...prev]);
      setForm({ businessName:'', contactName:'', phone:'', niche:'', city:'', callType:'cold_call', outcome:'', notes:'', callbackDate:'' });
      setSaved(true);
      setTimeout(() => setSaved(false), 2000);

    <div className="fadein">
      <div className="card-glow" style={{padding:'24px', marginBottom:'20px'}}>
        <p style={{margin:'0 0 20px', fontSize:'10px', fontWeight:800, letterSpacing:'.2em', textTransform:'uppercase', color:'#00F0FF'}}>Log a Call</p>

        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'12px', marginBottom:'16px'}}>
          <div>
            <label style={{fontSize:'10px', fontWeight:700, color:'#444', letterSpacing:'.1em', textTransform:'uppercase', display:'block', marginBottom:'4px'}}>Business Name *</label>
            <input value={form.businessName} onChange={e=>setForm(p=>({...p, businessName:e.target.value}))} placeholder="King Quality Cleaning" style={fieldStyle} className="field"/>
          </div>
          <div>
            <label style={{fontSize:'10px', fontWeight:700, color:'#444', letterSpacing:'.1em', textTransform:'uppercase', display:'block', marginBottom:'4px'}}>Contact Name</label>
            <input value={form.contactName} onChange={e=>setForm(p=>({...p, contactName:e.target.value}))} placeholder="Farid" style={fieldStyle} className="field"/>
          </div>
          <div>
            <label style={{fontSize:'10px', fontWeight:700, color:'#444', letterSpacing:'.1em', textTransform:'uppercase', display:'block', marginBottom:'4px'}}>Phone</label>
            <input value={form.phone} onChange={e=>setForm(p=>({...p, phone:e.target.value}))} placeholder="(437) 770-8080" style={fieldStyle} className="field"/>
          </div>
          <div>
            <label style={{fontSize:'10px', fontWeight:700, color:'#444', letterSpacing:'.1em', textTransform:'uppercase', display:'block', marginBottom:'4px'}}>City</label>
            <input value={form.city} onChange={e=>setForm(p=>({...p, city:e.target.value}))} placeholder="Richmond Hill" style={fieldStyle} className="field"/>

            <select value={form.niche} onChange={e=>setForm(p=>({...p, niche:e.target.value}))} style={fieldStyle} className="field">

            <select value={form.callType} onChange={e=>setForm(p=>({...p, callType:e.target.value}))} style={fieldStyle} className="field">
              {Object.entries(CALL_TYPES).map(([k,v]) => <option key={k} value={k}>{v}</option>)}

                  border: `1px solid ${form.outcome===key ? OUTCOME_COLORS[key]+'66' : '#1e1e1e'}`,

        {form.outcome === 'callback_requested' && (

const ColdCallView = ({ userName, userEmail, onHome, onLogout, totalCloses, totalPoints, addClose, undoClose, repId, isDirector }) => {
  const [tab, setTab] = useState('list');
  const [leads, setLeads] = useState([]);
  const [callLogs, setCallLogs] = useState({});
  const [loading, setLoading] = useState(true);
  const [expandedLead, setExpandedLead] = useState(null);
  const [searchQuery, setSearchQuery] = useState('');
  const [quickFilter, setQuickFilter] = useState('all');
  const [filterNiche, setFilterNiche] = useState('all');
  const [filterPriority, setFilterPriority] = useState('all');
  const [filterStatus, setFilterStatus] = useState('all');
  const [calendarEvents, setCalendarEvents] = useState([]);
  const [stats, setStats] = useState({ today: 0, week: 0, booked: 0, pending: 0 });

  const loadLeads = async () => {
    setLoading(true);
    let allLeads = [], from = 0;
    while (true) {
      let query = sb.from('leads').select('*');
      if (!isDirector) query = query.eq('assigned_rep_id', repId);
      query = query.order('google_reviews', { ascending: true }).range(from, from + 999);
      const { data, error } = await query;
      if (error || !data || data.length === 0) break;
      allLeads = allLeads.concat(data);
      if (data.length < 1000) break;
      from += 1000;
    }

    if (allLeads.length > 0) {
      let allLogs = [], logFrom = 0;
      while (true) {
        const { data: logsData } = await sb.from('call_logs').select('*').order('created_at', { ascending: false }).range(logFrom, logFrom + 999);
        if (!logsData || logsData.length === 0) break;
        allLogs = allLogs.concat(logsData);
        if (logsData.length < 1000) break;
        logFrom += 1000;
      }
      const logsMap = {};
      allLogs.forEach(log => {
        if (!logsMap[log.lead_id]) logsMap[log.lead_id] = [];
        logsMap[log.lead_id].push(log);
      });
      setCallLogs(logsMap);
    }

    setLeads(allLeads);
    setLoading(false);
  };

  const loadStats = async () => {
    const now = new Date();
    const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate()).toISOString();
    const weekStart = new Date(now.getFullYear(), now.getMonth(), now.getDate() - now.getDay()).toISOString();
    let logQuery = sb.from('call_logs').select('*', { count: 'exact' });
    if (!isDirector) logQuery = logQuery.eq('rep_id', repId);
    const { count: todayCount } = await logQuery.gte('created_at', todayStart);
    const { count: weekCount } = await sb.from('call_logs').select('*', { count: 'exact' }).eq('rep_id', repId).gte('created_at', weekStart);
    const { count: bookedCount } = await sb.from('call_logs').select('*', { count: 'exact' }).eq('rep_id', repId).eq('outcome', 'booked_call');
    const today = new Date().toISOString().split('T')[0];
    const { count: pendingCount } = await sb.from('call_logs').select('*', { count: 'exact' }).eq('rep_id', repId).eq('outcome', 'callback_requested').gte('callback_date', today);
    setStats({ today: todayCount || 0, week: weekCount || 0, booked: bookedCount || 0, pending: pendingCount || 0 });
  };

  const loadCalendar = async () => {
